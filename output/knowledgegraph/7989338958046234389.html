<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图谱预览</title>
<style>
  :root {
    --bg: #0f1420;
    --panel: #171d2b;
    --panel-2: #1e2637;
    --line: #2a3548;
    --text: #e6ebf5;
    --muted: #8a97ad;
    --l0: #f5a623;
    --l1: #4a9eff;
    --l2: #35d0a5;
    --accent: #6c8cff;
    --shadow: 0 6px 24px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    padding: 14px 22px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 18px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: .5px; }
  header .meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; }
  header .meta b { color: var(--text); font-weight: 500; }
  .switcher { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .switcher select {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .layout { flex: 1; display: flex; min-height: 0; }
  .canvas-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
    background:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.035) 1px, transparent 0);
    background-size: 22px 22px;
  }
  #canvas { position: relative; }
  svg.edges { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
  .node {
    position: absolute;
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 10px 14px;
    border-radius: 12px;
    background: var(--panel-2);
    border: none;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    max-width: 230px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .node:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .node.selected { box-shadow: 0 0 0 2px var(--accent), var(--shadow); }
  .node .label { font-size: 14px; font-weight: 600; line-height: 1.35; }
  .node .badges { display: flex; flex-wrap: wrap; gap: 5px; }
  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    background: rgba(255,255,255,.08);
    color: var(--muted);
    white-space: nowrap;
  }
  .badge.tag { background: rgba(245,166,35,.18); color: var(--l0); }
  .node .label { display: flex; align-items: flex-start; gap: 7px; }
  .node .dot {
    flex-shrink: 0; width: 9px; height: 9px; border-radius: 50%;
    margin-top: 4px;
  }
  .node[data-level="0"] .dot { background: var(--l0); }
  .node[data-level="1"] .dot { background: var(--l1); }
  .node[data-level="2"] .dot { background: var(--l2); }
  .node .toggle {
    position: absolute;
    right: -11px; top: 50%;
    transform: translateY(-50%);
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 3;
  }
  .node .toggle:hover { color: var(--text); border-color: var(--accent); }
  .detail {
    width: 380px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--line);
    overflow-y: auto;
    padding: 22px;
  }
  .detail.empty { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; text-align: center; }
  .detail h2 { font-size: 18px; margin-bottom: 6px; line-height: 1.4; }
  .detail .dl { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .detail .chip {
    font-size: 11px; padding: 3px 9px; border-radius: 20px;
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--line);
  }
  .detail .sec-title {
    font-size: 12px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .8px; margin: 18px 0 10px; border-bottom: 1px solid var(--line); padding-bottom: 6px;
  }
  .seg {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .seg .txt { font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-line; }
  .seg .hashes { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
  .seg .hash {
    margin-top: 8px; font-size: 10.5px; color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    word-break: break-all; display: flex; align-items: center; gap: 6px;
  }
  .seg .hash::before { content: "#"; color: var(--l2); font-weight: 700; }
  .node-hash {
    font-size: 10.5px; color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    word-break: break-all; margin-bottom: 4px;
  }
  .empty-hint { color: var(--muted); font-size: 12.5px; font-style: italic; }
  .proj-tag {
    display: inline-block; font-size: 12px; color: var(--l0);
    background: rgba(245,166,35,.12); border: 1px solid rgba(245,166,35,.3);
    padding: 4px 10px; border-radius: 8px; margin-bottom: 10px;
  }
  /* 批注编辑区（节点详情面板内） */
  .cmt-box { margin-top: 6px; }
  .cmt-box textarea {
    width: 100%; min-height: 62px; resize: vertical;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 11px; font-size: 13px; line-height: 1.6; outline: none;
    font-family: inherit;
  }
  .cmt-box textarea:focus { border-color: var(--accent); }
  .cmt-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .btn {
    font-size: 12.5px; padding: 6px 13px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
    transition: all .12s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.ghost { background: transparent; color: var(--muted); }
  .cmt-saved { font-size: 11.5px; color: var(--l2); }
  /* 有意见的节点右上角标记 */
  .node .cmt-flag {
    position: absolute; left: -7px; top: -7px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--l0); color: #1a1200; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.4); z-index: 4;
  }
  /* 底部反馈栏 */
  .feedback-bar {
    position: fixed; left: 0; right: 380px; bottom: 0;
    background: var(--panel); border-top: 1px solid var(--line);
    padding: 10px 22px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 -4px 20px rgba(0,0,0,.3); z-index: 20;
  }
  .feedback-bar .fb-page {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 12px; font-size: 13px; outline: none; font-family: inherit;
  }
  .feedback-bar .fb-page:focus { border-color: var(--accent); }
  .feedback-bar .fb-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .feedback-bar .fb-count b { color: var(--l0); }
  .canvas-wrap { padding-bottom: 56px; }
  .toast {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    background: var(--l2); color: #04231a; padding: 10px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .25s;
    pointer-events: none; z-index: 50; box-shadow: var(--shadow);
  }
  .toast.show { opacity: 1; }
  .legend { display: flex; gap: 16px; font-size: 11.5px; color: var(--muted); align-items: center; }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }
</style>
</head>
<body>
<header>
  <h1>📚 知识图谱预览</h1>
  <div class="meta" id="meta"></div>
  <div class="legend">
    <span><i style="background:var(--l0)"></i>层级0 主题</span>
    <span><i style="background:var(--l1)"></i>层级1 分类</span>
    <span><i style="background:var(--l2)"></i>层级2 知识点</span>
  </div>
  <div class="switcher" id="switcher" style="display:none">
    <label style="font-size:12px;color:var(--muted)">选择课程</label>
    <select id="lessonSelect"></select>
  </div>
</header>
<div class="layout">
  <div class="canvas-wrap">
    <div id="canvas">
      <svg class="edges" id="edges"></svg>
    </div>
  </div>
  <div class="detail empty" id="detail">点击左侧任意节点查看详细内容</div>
</div>

<div class="feedback-bar">
  <input class="fb-page" id="pageComment" type="text"
         placeholder="对本课程的整体修改意见（页面级）…如：空域知识下 6 个子节点顺序需调整" />
  <span class="fb-count" id="fbCount">未添加意见</span>
  <button class="btn ghost" id="clearBtn">清空</button>
  <button class="btn primary" id="copyBtn">📋 复制修改意见</button>
</div>
<div class="toast" id="toast"></div>

<script>
// 数据由 render.py 注入：数组，每项 { lessonId, meta:{textbookId,unitId,lessonId}, graph:{nodes,edges} }
const DATASETS = [{"lessonId": "7989338958046234389", "meta": {"lessonId": "7989338958046234389"}, "graph": {"nodes": [{"id": "7989338958046234389", "label": "任务3 了解常见病虫害及农药基础知识", "level": 0, "dataHash": "fm-doc-id-2fb5193a5f703095", "displayCode": "UAS_P4T3", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234389_n1", "label": "常见作物病虫害知识", "level": 1, "dataHash": "fm-doc-id-7c01e0b83736925e", "knowledgeCategory": "事实性", "cognitiveDimension": "记忆", "tags": "重点"}, {"id": "7989338958046234389_n2", "label": "常见水稻病虫害", "level": 2, "dataHash": "fm-doc-id-7924dc489cd8a919", "description": [{"text": "水稻病虫害非常多，有恶苗病、纹枯病、稻瘟病、稻曲病、水稻黑粉病、谷枯病、稻纵卷叶螟、稻飞虱等，以下举例介绍。", "dataHash": "fm-doc-id-f56735b0b7bc0b3d"}, {"text": "（1）水稻病害——稻瘟病（图4.3.1）。稻瘟病在水稻整个生育期都可能产生，危害水稻的各个部位，其中以穗颈瘟、叶瘟最为常见，危害较大。穗颈瘟和枝梗瘟发生在穗颈、穗轴、枝梗上，病斑不规则，呈褐色或灰黑色。穗颈受害早的，形成白穗，颈易折断。枝梗受害早的，则形成花白穗；受害迟的，谷粒不充实，粒重降低。", "dataHash": "fm-doc-id-3f4836b722f571f3"}, {"text": "稻瘟病防治办法：登记防治稻瘟病的药剂有三环唑可湿性粉剂、嘧菌酯、春雷霉素、蜡质芽孢杆菌、多菌灵、福美双、咪鲜胺等。", "dataHash": "fm-doc-id-52e6d12088d8db13"}, {"text": "（2）水稻虫害——水稻螟虫。水稻螟虫是一类钻蛀性害虫的统称，主要包括鳞翅目螟蛾科的二化螟、三化螟，鳞翅目夜蛾科的大螟等，是我国水稻主产区最为常见、危害最烈的一类害虫，俗称“钻心虫”或“蛀心虫”（图4.3.2）。", "dataHash": "fm-doc-id-60ee209b7ab0c2a6"}, {"text": "水稻螟虫防治方法：\n①50%杀螟松乳油、50%巴丹水溶剂、50%甲胺磷乳剂或50%1605乳油，每亩用100mL，加水150kg～200kg泼浇；\n②每亩用40%乐果乳油150mL，50%乐果乳油100mL，加水200kg～300kg泼浇，或每亩用药量减半，兑水50kg喷雾；\n③在蚁螟孵化高峰前1～2天，每亩用50%嘧啶氧磷乳油60mL～80mL，兑水75kg～100kg喷雾；\n④每亩用50%易卫杀可溶性粉剂50g～100g，兑水喷雾；\n⑤每亩用50%速灭松乳油75mL～100mL，兑水喷雾；\n⑥每亩用5%安克力颗粒剂2kg撒施。轻发生，每亩用1.8%阿维菌素50mL或2.0%阿维菌素45mL，兑水15kg～30 kg（视水稻生长情况和虫情酌情增加用水量），间隔15天再喷一次即可；重发生，每亩用1.8%阿维菌素75 mL～100mL或2.0%阿维菌素70mL～100mL单打，间隔10天再喷一次即可。", "dataHash": "fm-doc-id-0a904f6e9234433c", "sourceHashes": [{"text": "水稻螟虫防治方法：", "dataHash": "fm-doc-id-0a904f6e9234433c"}, {"text": "①50%杀螟松乳油、50%巴丹水溶剂、50%甲胺磷乳剂或50%1605乳油，每亩用100mL，加水150kg～200kg泼浇；", "dataHash": "fm-doc-id-4b5f35d0983f050f"}, {"text": "②每亩用40%乐果乳油150mL，50%乐果乳油100mL，加水200kg～300kg泼浇，或每亩用药量减半，兑水50kg喷雾；", "dataHash": "fm-doc-id-4ba4d367f0608a86"}, {"text": "③在蚁螟孵化高峰前1～2天，每亩用50%嘧啶氧磷乳油60mL～80mL，兑水75kg～100kg喷雾；", "dataHash": "fm-doc-id-10d92395f45ee1ae"}, {"text": "④每亩用50%易卫杀可溶性粉剂50g～100g，兑水喷雾；", "dataHash": "fm-doc-id-dec78946eda0f2dd"}, {"text": "⑤每亩用50%速灭松乳油75mL～100mL，兑水喷雾；", "dataHash": "fm-doc-id-19426205eeaeecd0"}, {"text": "⑥每亩用5%安克力颗粒剂2kg撒施。轻发生，每亩用1.8%阿维菌素50mL或2.0%阿维菌素45mL，兑水15kg～30 kg（视水稻生长情况和虫情酌情增加用水量），间隔15天再喷一次即可；重发生，每亩用1.8%阿维菌素75 mL～100mL或2.0%阿维菌素70mL～100mL单打，间隔10天再喷一次即可。", "dataHash": "fm-doc-id-1087a78be10225f3"}]}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234389_n3", "label": "常见小麦病虫害", "level": 2, "dataHash": "fm-doc-id-72a9d5c19ec27d1d", "description": [{"text": "小麦病虫害包括小麦蚜虫、黏虫、吸浆虫、红蜘蛛、小麦白粉病、赤霉病、黑穗病、纹枯病、全蚀病等，以下举例介绍。", "dataHash": "fm-doc-id-3499f9a849eba41d"}, {"text": "（1）小麦病害——赤霉病（图4.3.3）。小麦赤霉病在全国各地均有分布，主要发生在长江中下游冬麦区和东北春麦区。近年来，它又成为江淮和黄淮冬麦区的常发病害。赤霉病在小麦生长的各个阶段都能为害，苗期侵染引起苗腐，中、后期侵染引起秆腐和穗腐，尤以穗腐危害性最大。一般扬花期侵染，灌浆期显症，成熟期成灾。", "dataHash": "fm-doc-id-51fc4daaec0edfa1"}, {"text": "赤霉病防治方法：用25%氰烯菌酯悬浮剂，一般年份在小麦抽穗扬花期使用，每亩100mL，机动弥雾机用水15kg，手动喷雾机用水30 kg～40kg，若遇重发年份，7～10天后补喷一次，预防和治疗效果极佳（对赤霉病发病后有部分治疗作用的药剂）；用50%多菌灵或70%甲基托布津可湿性粉800～1200倍液喷雾，或25%丙环唑乳油10 mL～15mL，隔5～7天防治一次，也可用机动弥雾机喷药。此外，小麦生长的中后期是赤霉病、麦蚜、灰飞虱、黏虫混发期，加入10%吡虫啉可湿性粉剂每亩20g～30g，再加入98%磷酸二氢钾100g～150 g或尿素，既防治了害虫，也预防了干热风。", "dataHash": "fm-doc-id-c15e8e7954ea4243"}, {"text": "（2）小麦虫害——黏虫。黏虫成虫体色呈淡黄色或淡灰褐色，体长17mm～20mm，翅展35mm～45 mm，触角丝状，前翅中央近前缘有两个淡黄色圆斑，外侧环形圆斑较大，后翅正面呈暗褐，反面呈淡褐，缘毛呈白色。雄蛾较小，体色较深，其尾端经挤压后，可伸出1对鳃盖形的抱握器，抱握器顶端具一长刺。雌蛾腹部末端有一尖形的产卵器（图4.3.4）。", "dataHash": "fm-doc-id-7491785b6cf417e6"}, {"text": "早期防治，每亩可选用5%氟虫脲（卡死克）乳油50mL～75mL，或25%灭幼脲悬浮剂30mL～40mL，或20%除虫脲悬浮剂5mL～10 mL，兑水50kg均匀喷雾；后期达标防治时，每亩可选用50%辛硫磷乳油、77.5%敌敌畏乳油、40%毒死蜱（乐斯本）乳油75mL～100mL，或4.5%高效氯氰菊酯乳油50mL+77.5%敌敌畏乳油50 mL，兑水50kg均匀喷雾。", "dataHash": "fm-doc-id-e3deb6b647298adc"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234389_n4", "label": "常见柑橘病虫害", "level": 2, "dataHash": "fm-doc-id-ca47a7b866cacc8d", "description": [{"text": "柑橘病虫害包括潜叶蛾、木虱、红蜘蛛、柑橘凤蝶、星天牛、实蝇、柑橘溃疡病、炭疽病、黄龙病、煤烟病等，以下举例介绍。", "dataHash": "fm-doc-id-87cc567890262885"}, {"text": "（1）柑橘病害——炭疽病（图4.3.5）。柑橘炭疽病可危害叶、枝、花、果实等部位。叶受害可产生叶斑型和叶枯型两种病斑。花发病后呈褐色，腐烂，易落花。果实受害出现黄褐色凹陷的病斑，呈圆形或近圆形。", "dataHash": "fm-doc-id-bf84031f807995ca"}, {"text": "柑橘炭疽病防治方法：在增强树势的前提下，喷药保护，于各次梢抽梢期、幼果期定期喷药。一般在5～6月幼果期和9月发病盛期，每隔15天喷药一次，连续2～3次。药剂可选用哈茨木霉菌叶部型300倍+10%多抗霉素可湿性粉剂1000倍，或喷施12%松脂酸铜乳油800倍。", "dataHash": "fm-doc-id-0c46436d6cd75c04"}, {"text": "（2）柑橘虫害——红蜘蛛。柑橘红蜘蛛又名柑橘全爪螨。成螨、若螨和幼螨刺吸叶片、嫩梢及果实表皮，但以叶片受害最重。被害叶面呈现失绿白斑点，严重时全叶灰白，失去光泽，造成大量落叶，影响树势和产量。它是柑橘常发性、暴发性的头号害虫（图4.3.6）。", "dataHash": "fm-doc-id-61896dacc00e5922"}, {"text": "柑橘红蜘蛛防治：拜沃95%矿物油200倍+0.3%印楝素600～800倍。保护和利用田间食螨瓢虫捕食。", "dataHash": "fm-doc-id-af495902164edc6b"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234389_n5", "label": "常见苹果病虫害", "level": 2, "dataHash": "fm-doc-id-9b547f4f27c93f06", "description": [{"text": "苹果病虫害包括轮纹病、褐斑病、黑星病、花叶病、苹果树干腐病、苹果绵蚜、红蜘蛛、盲蝽蟓、小卷叶蛾、金纹细蛾等，以下举例介绍。", "dataHash": "fm-doc-id-bc756b2e3e366ecd"}, {"text": "（1）苹果病害——褐斑病。主要危害叶片，也侵染果实。叶片染病，树冠下部和内膛最先发病。发病初期，叶片出现黑褐色小疱疹或针芒状暗褐色病斑。后期，病叶变黄脱落。因苹果树品种和发病期不同，病斑一般有同心轮纹型、针芒型、混合型（图4.3.7）。", "dataHash": "fm-doc-id-d453eb793dd45524"}, {"text": "苹果褐斑病防治：药剂用波尔多液、多抗霉素、丙森锌、代森锰锌、腐霉利、多菌灵等。", "dataHash": "fm-doc-id-0fb69668c83d5f73"}, {"text": "（2）苹果虫害——苹果绵蚜。苹果绵蚜别名赤蚜、血色蚜、白毛虫，主要侵害苹果树的伤疤、缝隙及根部等处，吸取大量养分，影响果树生长发育和花芽分化，缩短树龄，减低产量。虫体被大量白色绵状物包裹，农药难以黏着，防治困难（图4.3.8）。", "dataHash": "fm-doc-id-e5a572ef88073837"}, {"text": "苹果绵蚜防治：地下防治，利用雨后或果园灌水后，全园地面喷洒一次40%毒死蜱乳油400～600倍液，并浅耕4 cm～5 cm。树上防治，可喷洒40%毒死蜱微乳剂1000～1500倍液，或25%吡虫啉2000倍液+45%毒死蜱1000倍液等。", "dataHash": "fm-doc-id-f20ab5b7fd901a79"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234389_n6", "label": "农药基础知识", "level": 1, "dataHash": "fm-doc-id-75689e7ed18b36ee", "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234389_n7", "label": "认识农药", "level": 2, "dataHash": "fm-doc-id-63251940417b03d6", "description": [{"text": "农药是用于预防、消灭或者控制危害农业、林业的病、虫、草和其他有害生物以及有目的地调节植物、昆虫生长的化学合成物质，或者来源于生物、其他天然物质的一种物质或者几种物质的混合物及其制剂。", "dataHash": "fm-doc-id-e2b218131230ac1a"}, {"text": "（1）农药的分类：农药品种很多，按照防治对象可以分为杀虫剂、除草剂、杀菌剂等（图4.3.9）。", "dataHash": "fm-doc-id-fdaed2c90db6271d"}, {"text": "（2）农药标签的认识：农药标签包含农药三证号、作物、防治对象、制剂用药量、使用方法、注意事项、厂家及电话、中毒急救、紧急救助电话、毒性标识和颜色条带等信息（图4.3.10）。", "dataHash": "fm-doc-id-535020a31b3c5a39"}, {"text": "（3）包装底部不同颜色条带的含义：红色代表杀虫剂，绿色代表除草剂，黑色代表杀菌剂，黄色代表植物生长调节剂，无颜色的代表肥料（图4.3.11）。", "dataHash": "fm-doc-id-4032ce081141c5ef"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234389_n8", "label": "农药剂型", "level": 2, "dataHash": "fm-doc-id-457397ee6f6bc830", "description": [{"text": "农药剂型分为粉剂、可湿性粉剂、粒剂、乳油、悬浮剂、胶体剂、水剂、气雾剂、油剂、烟剂、油悬浮剂、微囊悬浮-悬浮制剂、超低容量液剂、可分散油悬浮剂、水分散粒剂等。", "dataHash": "fm-doc-id-7d78438bd9a89cc7"}, {"text": "粉剂：不需要加水，工效高，在高山或饮水困难的地区使用较好。在叶面上附着性差。飞机喷洒时应二次配制成“母粉”，随其他材料如肥料等一起施用。", "dataHash": "fm-doc-id-b7657cdaaaeb0a28"}, {"text": "可湿性粉剂：药效比同一种农药的粉剂好，便于包装、运输。容易吸湿结块，所以储存环境需要干燥。", "dataHash": "fm-doc-id-2db42fec73b6da98"}, {"text": "乳油：入水后可分散成乳状液的油状均相液体农药剂型。", "dataHash": "fm-doc-id-d7cc585f3bc74e07"}, {"text": "悬浮剂：固体原药分散、悬浮在含有多种助剂的水相介质中，形成能流动的高浓度黏稠剂型。", "dataHash": "fm-doc-id-5840f7ff10544e15"}, {"text": "油悬浮剂：载体油通常作为增效剂使用，使得油悬浮剂具有了更好的喷雾持留性、扩散性和叶面吸收性。", "dataHash": "fm-doc-id-5b97e96423fbe9cd"}, {"text": "微囊悬浮-悬浮剂：农药产品中，有“微囊悬浮剂”，也有“微囊悬浮-悬浮剂”，两者并非同一种剂型。微囊悬浮-悬浮剂一般是复配剂，一种成分为微囊化，另一种成分为悬浮剂，两者混合到一起稳定后即形成“微囊悬浮-悬浮剂”。微囊悬浮剂一般指单剂或复配成分全部微囊化后形成的制剂。", "dataHash": "fm-doc-id-ddce2f5cf7cf383d"}, {"text": "超低容量液剂：超低容量液剂同油剂，但为高含量的农药原药加入少量溶剂组成，有的还加入少量助溶剂、稳定剂等，有效成分浓度可高达80%以上。", "dataHash": "fm-doc-id-7bc2e590ad539425"}, {"text": "可分散油悬浮剂：指用一类经过试验可作为增效助剂且不污染作物的油类作为稀释载体的一种剂型。油类包括植物油（及其衍生物）或矿物油等。", "dataHash": "fm-doc-id-da4f00a08f4f371c"}, {"text": "水分散粒剂：又称干流动剂、水悬性颗粒剂。入水后，自动崩解，分散成悬浮液。", "dataHash": "fm-doc-id-7d6bfeadf56a29d9"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234389_n9", "label": "安全科学使用农药", "level": 2, "dataHash": "fm-doc-id-6cfad0b23cbc8b40", "description": [{"text": "（1）安全使用农药的五个黄金守则。", "dataHash": "fm-doc-id-ff0051b7ab5825aa"}, {"text": "时刻小心谨慎：使用农药时要小心谨慎，远离儿童和周围的人；不进食、喝水、抽烟，正确处置农药的运转和使用过程中产生的废弃物；避免高温时间施药，有效避暑，且防止药液蒸腾中毒。", "dataHash": "fm-doc-id-ffe3940d6666b5db"}, {"text": "阅读并正确理解农药标签：农药标签包含产品特性、风险和使用方法等重要的信息；包含紧急事故正确的处理方法；要理解标签上象形图的含义。", "dataHash": "fm-doc-id-bf70356ba3e945b2"}, {"text": "注意个人卫生：眼睛和皮肤溅到药液后，应立即用清水冲洗；喷药作业后，应彻底清洗身体与衣物，防护服应同其他衣服分开清洗。", "dataHash": "fm-doc-id-e7b56c69c877edf2"}, {"text": "施药器械及时维护：定期保养喷洒设备及其他配药设备；每次喷药后的管路残留可能影响下次作业，并导致出现药害、堵塞、腐蚀管路等情况；作业完成后，倒入清水，清洗喷洒系统装载装置，校准喷洒系统。", "dataHash": "fm-doc-id-782d36b4f2b5afd3"}, {"text": "佩戴防护设备：穿戴防护服设备，如眼罩、口罩、面罩等；注意防晒；配药时戴手套或面罩；依照标签建议，特殊情况应佩戴帽子、面罩、防护眼镜和防水围裙。", "dataHash": "fm-doc-id-30c82fff9987c594"}, {"text": "（2）科学合理地使用农药。", "dataHash": "fm-doc-id-359d8cb1e1545533"}, {"text": "根据病虫害特点选择恰当时间用药。选择合适时间进行施药。例如，对一些食叶性的害虫，可以在其密度明显上升，尚未造成危害之前，开始喷施，这样可取得比较明显的杀虫植保效果。", "dataHash": "fm-doc-id-af5fd733ee22f6c6"}, {"text": "针对需要防治的对象，对症（病、虫、草）下药。根据不同的防治作物对象与植物问题特点来选择具体的防治所需用药。例如，菊酯类的农药能防治很多害虫，但对螨类害虫效果不明显。", "dataHash": "fm-doc-id-4941bb28aea01746"}, {"text": "掌握农药的使用方法和用量，合理运用。根据病虫害发生规律，选用适当方法如撒毒土、拌种、喷雾等。采用正确的方法可以充分发挥农药的防治效果，而且能避免或减少杀伤有益生物。", "dataHash": "fm-doc-id-3f8746eebb121a2d"}, {"text": "科学合理地复配药剂和混用农药。科学合理复配和混合使用农药，可以提高防治效果，扩大防治范围，延缓病、虫、草害产生抗药性，降低防治成本。农药是化工药剂，错误的混用可能导致农药相互反应，降低药效。", "dataHash": "fm-doc-id-88c4c9b67e937ab2"}, {"text": "定期更换使用农药。同一个地方长期连续使用单一品种的农药，很容易使当地有害生物产生抗药性，需要定期更换农药。", "dataHash": "fm-doc-id-9d623f89cda5b94a"}, {"text": "正确掌握农药的药效作用时间与安全间隔期。各种药剂因其药用效果不同，分解、消失的速度不同，以及作物的生长趋势和季节等不同，具有不同的安全间隔期。", "dataHash": "fm-doc-id-7af84564486a224f"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "课程思政"}, {"id": "7989338958046234389_n10", "label": "无人机施药前准备", "level": 2, "dataHash": "fm-doc-id-0aeb2c4ee8a2b1d7", "description": [{"text": "（1）作业前的基本田间病虫情调查。", "dataHash": "fm-doc-id-2ca949436c7b2630"}, {"text": "作业前对病虫情的了解是对整体作业效果的负责，是用药记录的一部分。经济作物每次打药都应该附带用药记录。可以从以下维度参考评价田间情况：", "dataHash": "fm-doc-id-db0702fc1eae5f78"}, {"text": "询问农户：上次施药时间、用药基本情况、田间病虫情况、长势基本情况等。", "dataHash": "fm-doc-id-52c5858c548e2507"}, {"text": "询问零售商：近期该地区病虫压力、最近的药方是否管用、农药的销售情况。", "dataHash": "fm-doc-id-06e8a1ff642e8f4a"}, {"text": "根据自身能力观察田间表现、学习专业病虫知识、掌握主动施药方法。", "dataHash": "fm-doc-id-e1ef1cf6c0b368bf"}, {"text": "（2）病虫害严重情况下的处理意见。", "dataHash": "fm-doc-id-833ec2a36e688315"}, {"text": "评估病虫害情况：仔细观察并记录病虫害的种类、严重程度以及分布情况。", "dataHash": "fm-doc-id-0f08e6beae09a9b8"}, {"text": "咨询专家：分析病虫害情况，迅速咨询当地农业技术专家或植保部门，了解针对当前病虫害的最佳防治方法和推荐使用的农药种类。", "dataHash": "fm-doc-id-dc76c7cd951b611a"}, {"text": "选择适当的农药：根据病虫害的评估结果和专家的建议，选择适合的农药进行防治。注意选择对目标病虫害有效且对作物安全的农药，并遵循农药的使用说明和安全操作规程。", "dataHash": "fm-doc-id-5f567c4561067974"}, {"text": "（3）无人机作业安全注意事项。", "dataHash": "fm-doc-id-f832e58dd0f2f728"}, {"text": "注意附近的敏感对象。例如，作业区域周边存在蜜蜂、桑树和鱼塘等敏感对象，则有可能因农药影响敏感对象存活，从而发生经济纠纷。这时需考虑以下几个因素，切不可强行作业。一是风向，应使敏感对象处于上风向，降低风险；二是药剂，应挑选合适的农药降低对敏感对象的威胁；三是边界，应留出足够的安全边界。", "dataHash": "fm-doc-id-384ecb0674b731d6"}, {"text": "对待药剂需谨慎。作业时，要警惕没有标签的农药。不可使用高毒、剧毒农药，因药液浓度较高极易发生人员中毒。", "dataHash": "fm-doc-id-27c992f66321a244"}, {"text": "特定作业要注意。除草剂喷雾时，要注意风向、风速、周边作物等。", "dataHash": "fm-doc-id-713348483e2cad65"}, {"text": "杜绝高温作业。轻则影响药效，导致人员中暑；重则导致人员中毒。", "dataHash": "fm-doc-id-19cd9ee203d6a20b"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234389_n11", "label": "农药配置方法", "level": 2, "dataHash": "fm-doc-id-905e69f879677c39", "description": [{"text": "（1）稀释法。", "dataHash": "fm-doc-id-3f8fe8b1c796a12c"}, {"text": "常用的农药配置方法是稀释法。其中，二次稀释法被誉为最科学的方法。农林农药行业提倡使用二次稀释法。二次稀释法步骤：第一步，用少量水或稀释载体稀释混合农药制剂形成母液或母粉；第二步，根据所需农药浓度，将母液或母粉再稀释到所需浓度（图4.3.12）。", "dataHash": "fm-doc-id-ff5078d38272fb8b"}, {"text": "少量水混合农药—搅拌均匀形成母液—二次稀释混合搅拌，达到所需药液浓度。", "dataHash": "fm-doc-id-35c45f7da880dcad"}, {"text": "（2）农药的混配。", "dataHash": "fm-doc-id-bc1805d4257c020e"}, {"text": "农药的合理混用，不仅可以提高防治效果，而且可以延缓病虫产生抗药性。针对不同病虫害，采用农药混用，还可以减少施药次数，从而降低劳动成本。", "dataHash": "fm-doc-id-26dc739970bb758f"}, {"text": "·农药混配顺序：农药混配顺序要准确。叶面肥与农药等的混配顺序通常为：依次加入微肥、水溶肥、可湿性粉剂、水分散粒剂、悬浮剂、微乳剂、水乳剂、水、乳油（原则上农药混配不要超过三种），每加入一种要充分搅拌均匀，然后再加入下一种。先加水后加药，进行完美的二次稀释。无论混配什么药剂都应该注意“现配现用、不宜久放”（图4.3.13）。", "dataHash": "fm-doc-id-14a514c298d4d509"}, {"text": "农药混配原则：配好药液后应马上使用，在最短的时间内喷完。有些农药产品悬浮性和分散性不够好，药液容易发生沉淀、分层等现象，使药效逐步降低，甚至产生药害。", "dataHash": "fm-doc-id-64c57a41043f47c7"}, {"text": "农药混配注意事项：一是混用品种之间不产生不良的化学反应（如水解、碱解、酸解等），也不影响药液的物理性状，要保证正常药效或增效作用；二是不同农药品种混用后不能使作物产生药害；三是除酸碱性外，很多农药品种不能与含金属离子的药物混用；四是具有交互抗性的农药不宜混用；五是生物农药不能与杀菌剂混用。", "dataHash": "fm-doc-id-f5f2c9bc3cadba8a"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}], "edges": [{"source": "7989338958046234389", "target": "7989338958046234389_n1", "type": "父子", "description": "任务3 了解常见病虫害及农药基础知识包含常见作物病虫害知识"}, {"source": "7989338958046234389_n1", "target": "7989338958046234389_n2", "type": "父子", "description": "常见作物病虫害知识包含常见水稻病虫害"}, {"source": "7989338958046234389_n1", "target": "7989338958046234389_n3", "type": "父子", "description": "常见作物病虫害知识包含常见小麦病虫害"}, {"source": "7989338958046234389_n1", "target": "7989338958046234389_n4", "type": "父子", "description": "常见作物病虫害知识包含常见柑橘病虫害"}, {"source": "7989338958046234389_n1", "target": "7989338958046234389_n5", "type": "父子", "description": "常见作物病虫害知识包含常见苹果病虫害"}, {"source": "7989338958046234389", "target": "7989338958046234389_n6", "type": "父子", "description": "任务3 了解常见病虫害及农药基础知识包含农药基础知识"}, {"source": "7989338958046234389_n6", "target": "7989338958046234389_n7", "type": "父子", "description": "农药基础知识包含认识农药"}, {"source": "7989338958046234389_n6", "target": "7989338958046234389_n8", "type": "父子", "description": "农药基础知识包含农药剂型"}, {"source": "7989338958046234389_n6", "target": "7989338958046234389_n9", "type": "父子", "description": "农药基础知识包含安全科学使用农药"}, {"source": "7989338958046234389_n6", "target": "7989338958046234389_n10", "type": "父子", "description": "农药基础知识包含无人机施药前准备"}, {"source": "7989338958046234389_n6", "target": "7989338958046234389_n11", "type": "父子", "description": "农药基础知识包含农药配置方法"}]}}];

const COL_W = 300;      // 层级横向间距
const NODE_H = 62;      // 单节点占位高度
const V_GAP = 16;       // 兄弟节点垂直间距
const canvas = document.getElementById('canvas');
const edgesSvg = document.getElementById('edges');
const detail = document.getElementById('detail');
const metaEl = document.getElementById('meta');

let current = null;      // 当前数据集
let nodeMap = {};        // id -> node
let childrenMap = {};    // id -> [childId]
let elMap = {};          // id -> DOM 元素（用于读取真实坐标画线）
let collapsed = new Set();
let selectedId = null;

// 批注存储：按 lessonId 分组。{ [lessonId]: { nodes: {nodeId:{label,level,text}}, page: "" } }
// 存在内存中（纯静态页，无需后端）。切换 lesson 不丢，复制时汇总所有有意见的 lesson。
const feedback = {};
function fbFor(lessonId) {
  if (!feedback[lessonId]) feedback[lessonId] = { nodes: {}, page: "" };
  return feedback[lessonId];
}

function buildTree(graph) {
  nodeMap = {};
  childrenMap = {};
  graph.nodes.forEach(n => { nodeMap[n.id] = n; childrenMap[n.id] = []; });
  graph.edges.forEach(e => {
    if (childrenMap[e.source]) childrenMap[e.source].push(e.target);
  });
  // 根 = level 0，或无入边的节点
  const hasParent = new Set(graph.edges.map(e => e.target));
  return graph.nodes.filter(n => n.level === 0 || !hasParent.has(n.id)).map(n => n.id);
}

// 递归布局：用节点真实高度 node._h 计算占位，返回子树总高度，写入 node._x/_y。
// node._y 为该节点顶端 y 坐标；节点垂直居中对齐其子树跨度。
function layout(id, depth, cursorY) {
  const node = nodeMap[id];
  node._x = depth * COL_W;
  const selfH = (node._h || NODE_H) + V_GAP;
  const kids = collapsed.has(id) ? [] : childrenMap[id];
  if (kids.length === 0) {
    node._y = cursorY;
    return selfH;
  }
  let y = cursorY;
  let total = 0;
  kids.forEach(k => {
    const h = layout(k, depth + 1, y);
    y += h; total += h;
  });
  // 父节点中心对齐首末子节点中心
  const first = nodeMap[kids[0]];
  const last = nodeMap[kids[kids.length - 1]];
  const kidsMid = (first._y + (first._h || NODE_H) / 2 + last._y + (last._h || NODE_H) / 2) / 2;
  node._y = kidsMid - (node._h || NODE_H) / 2;
  // 子树可能比父节点自身矮，取较大者
  return Math.max(total, selfH);
}

function render() {
  // 清空旧节点（保留 svg）
  [...canvas.querySelectorAll('.node')].forEach(n => n.remove());
  elMap = {};
  const roots = buildTree(current.graph);

  // —— 阶段一：建节点并入 DOM（先不定位），测量真实高度 ——
  Object.values(nodeMap).forEach(n => {
    const el = document.createElement('div');
    el.className = 'node' + (n.id === selectedId ? ' selected' : '');
    el.dataset.level = n.level;
    el.style.visibility = 'hidden';

    const badges = [];
    if (n.tags) badges.push(`<span class="badge tag">${n.tags}</span>`);
    if (n.knowledgeCategory) badges.push(`<span class="badge">${n.knowledgeCategory}</span>`);
    if (n.cognitiveDimension) badges.push(`<span class="badge">${n.cognitiveDimension}</span>`);

    el.innerHTML = `<div class="label"><span class="dot"></span><span>${escapeHtml(n.label)}</span></div>` +
                   (badges.length ? `<div class="badges">${badges.join('')}</div>` : '');

    const kids = childrenMap[n.id];
    if (kids && kids.length) {
      const t = document.createElement('div');
      t.className = 'toggle';
      t.textContent = collapsed.has(n.id) ? '+' : '−';
      t.onclick = (ev) => { ev.stopPropagation(); toggle(n.id); };
      el.appendChild(t);
    }
    // 有意见的节点加标记
    if (current && fbFor(current.lessonId).nodes[n.id]) {
      const flag = document.createElement('div');
      flag.className = 'cmt-flag';
      flag.textContent = '✎';
      flag.title = '该节点有修改意见';
      el.appendChild(flag);
    }
    el.onclick = () => select(n.id);
    canvas.appendChild(el);
    elMap[n.id] = el;
  });
  // 测量真实高度/宽度写入 node._h / node._w
  Object.values(nodeMap).forEach(n => {
    n._h = elMap[n.id].offsetHeight;
    n._w = elMap[n.id].offsetWidth;
  });

  // —— 阶段二：按真实高度布局 ——
  let cursorY = 0;
  roots.forEach(r => { cursorY += layout(r, 0, cursorY); });

  // —— 阶段三：算内容包围盒 ——
  let contentW = 0, contentH = 0;
  Object.values(nodeMap).forEach(n => {
    if (n._x === undefined) return;
    contentW = Math.max(contentW, n._x + (n._w || 200));
    contentH = Math.max(contentH, n._y + (n._h || NODE_H));
  });

  // 居中偏移：内容比视口小时居中，否则留固定边距
  const wrap = canvas.parentElement;      // .canvas-wrap 视口
  const PAD = 48;
  const vw = wrap.clientWidth, vh = wrap.clientHeight;
  const offsetX = Math.max(PAD, (vw - contentW) / 2);
  const offsetY = Math.max(PAD, (vh - contentH) / 2);

  // —— 阶段四：定位并显示 ——
  Object.values(nodeMap).forEach(n => {
    if (n._x === undefined) return;
    const el = elMap[n.id];
    el.style.left = (n._x + offsetX) + 'px';
    el.style.top = (n._y + offsetY) + 'px';
    el.style.visibility = 'visible';
  });

  // canvas 至少填满视口，内容超出时按内容+边距撑开
  canvas.style.width = Math.max(vw, contentW + offsetX + PAD) + 'px';
  canvas.style.height = Math.max(vh, contentH + offsetY + PAD) + 'px';
  // 节点已定位，用真实坐标画线（消除偏移）
  drawEdges();
}

function drawEdges() {
  edgesSvg.innerHTML = '';
  edgesSvg.setAttribute('width', canvas.style.width);
  edgesSvg.setAttribute('height', canvas.style.height);
  current.graph.edges.forEach(e => {
    if (collapsed.has(e.source)) return;
    const se = elMap[e.source], te = elMap[e.target];
    if (!se || !te) return;
    // 读取真实布局坐标：起点=父节点右边缘中点，终点=子节点左边缘中点
    const x1 = se.offsetLeft + se.offsetWidth;
    const y1 = se.offsetTop + se.offsetHeight / 2;
    const x2 = te.offsetLeft;
    const y2 = te.offsetTop + te.offsetHeight / 2;
    const mx = (x1 + x2) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#3a4761');
    path.setAttribute('stroke-width', '1.6');
    edgesSvg.appendChild(path);
  });
}

function toggle(id) {
  if (collapsed.has(id)) collapsed.delete(id); else collapsed.add(id);
  render();
}

function select(id) {
  selectedId = id;
  render();
  const n = nodeMap[id];
  const chips = [];
  chips.push(`<span class="chip">层级 ${n.level}</span>`);
  if (n.knowledgeCategory) chips.push(`<span class="chip">${n.knowledgeCategory}</span>`);
  if (n.cognitiveDimension) chips.push(`<span class="chip">${n.cognitiveDimension}</span>`);
  if (n.tags) chips.push(`<span class="chip" style="color:var(--l0)">${n.tags}</span>`);

  let html = '';
  if (n.projectTitle) {
    html += `<div class="proj-tag">📁 ${escapeHtml(n.projectTitle)}</div>`;
  }
  html += `<h2>${escapeHtml(n.label)}</h2>`;
  if (n.dataHash) html += `<div class="node-hash"># ${n.dataHash}</div>`;
  if (n.projectDataHash) html += `<div class="node-hash">项目 # ${n.projectDataHash}</div>`;
  html += `<div class="dl">${chips.join('')}</div>`;

  const desc = n.description || [];
  if (desc.length) {
    html += `<div class="sec-title">详细说明（${desc.length} 段）</div>`;
    desc.forEach(d => {
      html += `<div class="seg"><div class="txt">${escapeHtml(d.text)}</div>`;
      if (d.sourceHashes && d.sourceHashes.length) {
        // 合并段：列出全部源 hash（零丢失可追溯）
        html += `<div class="hashes">` +
          d.sourceHashes.map(s => `<div class="hash">${s.dataHash}</div>`).join('') +
          `</div>`;
      } else if (d.dataHash) {
        html += `<div class="hash">${d.dataHash}</div>`;
      }
      html += `</div>`;
    });
  } else {
    html += `<div class="sec-title">详细说明</div><div class="empty-hint">该节点为分类/主题节点，无独立正文说明。</div>`;
  }

  // 节点级批注编辑区
  const existing = fbFor(current.lessonId).nodes[id];
  html += `<div class="sec-title">修改意见（该节点）</div>` +
    `<div class="cmt-box">` +
    `<textarea id="nodeCmt" placeholder="写下对「${escapeHtml(n.label)}」的修改意见，例如：该节点应为 level 1 / 应删除 / 归类错误…">${existing ? escapeHtml(existing.text) : ''}</textarea>` +
    `<div class="cmt-actions">` +
    `<button class="btn primary" id="saveCmtBtn">保存意见</button>` +
    (existing ? `<button class="btn ghost" id="delCmtBtn">删除</button><span class="cmt-saved">✓ 已记录</span>` : '') +
    `</div></div>`;

  detail.className = 'detail';
  detail.innerHTML = html;

  document.getElementById('saveCmtBtn').onclick = () => {
    const txt = document.getElementById('nodeCmt').value.trim();
    const store = fbFor(current.lessonId).nodes;
    if (txt) {
      store[id] = { label: n.label, level: n.level, text: txt };
    } else {
      delete store[id];
    }
    updateFbCount(); render(); select(id);
    showToast(txt ? '已记录该节点意见' : '已清除该节点意见');
  };
  const delBtn = document.getElementById('delCmtBtn');
  if (delBtn) delBtn.onclick = () => {
    delete fbFor(current.lessonId).nodes[id];
    updateFbCount(); render(); select(id);
    showToast('已删除该节点意见');
  };
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// —— 反馈：计数、生成文本、复制 ——
function countFeedback() {
  let n = 0;
  Object.values(feedback).forEach(f => {
    n += Object.keys(f.nodes).length;
    if (f.page && f.page.trim()) n += 1;
  });
  return n;
}

function updateFbCount() {
  const c = countFeedback();
  const el = document.getElementById('fbCount');
  el.innerHTML = c ? `已添加 <b>${c}</b> 条意见` : '未添加意见';
}

function buildFeedbackText() {
  // 汇总所有有意见的 lesson；只带定位信息 + 意见（正文由大模型自行读 json 定位）
  const lines = ['# 知识图谱修改意见', ''];
  let any = false;
  Object.keys(feedback).forEach(lessonId => {
    const f = feedback[lessonId];
    const nodeIds = Object.keys(f.nodes);
    const hasPage = f.page && f.page.trim();
    if (!nodeIds.length && !hasPage) return;
    any = true;
    lines.push(`## 课程 lessonId: ${lessonId}`);
    lines.push(`对应文件: output/knowledgegraph/${lessonId}.json`);
    lines.push('');
    if (nodeIds.length) {
      lines.push('### 节点级意见');
      nodeIds.forEach(nid => {
        const c = f.nodes[nid];
        lines.push(`- [节点 ${nid}]「${c.label}」(level ${c.level})`);
        lines.push(`  意见: ${c.text}`);
      });
      lines.push('');
    }
    if (hasPage) {
      lines.push('### 页面级意见');
      lines.push(`- ${f.page.trim()}`);
      lines.push('');
    }
  });
  if (!any) return '';
  lines.push('---');
  lines.push('请据以上意见对相应 lesson 的 json 二次修改，改后用 validate.py 校验、render.py 重新渲染。');
  return lines.join('\n');
}

function copyFeedback() {
  const text = buildFeedbackText();
  if (!text) { showToast('尚未添加任何修改意见'); return; }
  const done = () => showToast('修改意见已复制，粘贴给大模型即可');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); done(); }
  catch (e) { showToast('复制失败，请手动选择'); }
  document.body.removeChild(ta);
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function loadDataset(idx) {
  current = DATASETS[idx];
  collapsed = new Set();
  selectedId = null;
  detail.className = 'detail empty';
  detail.textContent = '点击左侧任意节点查看详细内容';
  const m = current.meta || {};
  const rootNode = current.graph.nodes.find(n => n.level === 0) || {};
  const dc = rootNode.displayCode;
  metaEl.innerHTML =
    (dc ? `<span>代码 <b>${escapeHtml(dc)}</b></span>` : '') +
    `<span>课程 <b>${current.lessonId}</b></span>` +
    (m.unitId ? `<span>单元 <b>${m.unitId}</b></span>` : '') +
    (m.textbookId ? `<span>教材 <b>${m.textbookId}</b></span>` : '') +
    `<span>节点 <b>${current.graph.nodes.length}</b></span>`;
  // 同步当前课程的页面级意见到输入框
  const pc = document.getElementById('pageComment');
  if (pc) pc.value = fbFor(current.lessonId).page || '';
  render();
}

// 初始化
(function init() {
  const sel = document.getElementById('lessonSelect');
  if (DATASETS.length > 1) {
    document.getElementById('switcher').style.display = 'flex';
    DATASETS.forEach((d, i) => {
      const o = document.createElement('option');
      o.value = i;
      const rootLabel = (d.graph.nodes.find(n => n.level === 0) || {}).label || d.lessonId;
      o.textContent = `${d.lessonId} · ${rootLabel}`;
      sel.appendChild(o);
    });
    sel.onchange = () => loadDataset(+sel.value);
  }

  // 页面级意见：实时写入当前课程
  const pc = document.getElementById('pageComment');
  pc.addEventListener('input', () => {
    fbFor(current.lessonId).page = pc.value;
    updateFbCount();
  });
  // 复制 / 清空
  document.getElementById('copyBtn').onclick = copyFeedback;
  document.getElementById('clearBtn').onclick = () => {
    const c = countFeedback();
    if (!c) { showToast('当前没有意见可清空'); return; }
    if (!confirm(`确定清空全部 ${c} 条修改意见？`)) return;
    Object.keys(feedback).forEach(k => delete feedback[k]);
    pc.value = '';
    updateFbCount(); render();
    if (selectedId) select(selectedId);
    showToast('已清空全部意见');
  };

  // 窗口尺寸变化时重新布局居中（防抖）
  let rzTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(rzTimer);
    rzTimer = setTimeout(() => { if (current) render(); }, 150);
  });

  loadDataset(0);
  updateFbCount();
})();
</script>
