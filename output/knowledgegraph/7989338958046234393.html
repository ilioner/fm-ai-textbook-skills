<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图谱预览</title>
<style>
  :root {
    --bg: #0f1420;
    --panel: #171d2b;
    --panel-2: #1e2637;
    --line: #2a3548;
    --text: #e6ebf5;
    --muted: #8a97ad;
    --l0: #f5a623;
    --l1: #4a9eff;
    --l2: #35d0a5;
    --accent: #6c8cff;
    --shadow: 0 6px 24px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    padding: 14px 22px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 18px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: .5px; }
  header .meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; }
  header .meta b { color: var(--text); font-weight: 500; }
  .switcher { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .switcher select {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .layout { flex: 1; display: flex; min-height: 0; }
  .canvas-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
    background:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.035) 1px, transparent 0);
    background-size: 22px 22px;
  }
  #canvas { position: relative; }
  svg.edges { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
  .node {
    position: absolute;
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 10px 14px;
    border-radius: 12px;
    background: var(--panel-2);
    border: none;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    max-width: 230px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .node:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .node.selected { box-shadow: 0 0 0 2px var(--accent), var(--shadow); }
  .node .label { font-size: 14px; font-weight: 600; line-height: 1.35; }
  .node .badges { display: flex; flex-wrap: wrap; gap: 5px; }
  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    background: rgba(255,255,255,.08);
    color: var(--muted);
    white-space: nowrap;
  }
  .badge.tag { background: rgba(245,166,35,.18); color: var(--l0); }
  .node .label { display: flex; align-items: flex-start; gap: 7px; }
  .node .dot {
    flex-shrink: 0; width: 9px; height: 9px; border-radius: 50%;
    margin-top: 4px;
  }
  .node[data-level="0"] .dot { background: var(--l0); }
  .node[data-level="1"] .dot { background: var(--l1); }
  .node[data-level="2"] .dot { background: var(--l2); }
  .node .toggle {
    position: absolute;
    right: -11px; top: 50%;
    transform: translateY(-50%);
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 3;
  }
  .node .toggle:hover { color: var(--text); border-color: var(--accent); }
  .detail {
    width: 380px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--line);
    overflow-y: auto;
    padding: 22px;
  }
  .detail.empty { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; text-align: center; }
  .detail h2 { font-size: 18px; margin-bottom: 6px; line-height: 1.4; }
  .detail .dl { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .detail .chip {
    font-size: 11px; padding: 3px 9px; border-radius: 20px;
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--line);
  }
  .detail .sec-title {
    font-size: 12px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .8px; margin: 18px 0 10px; border-bottom: 1px solid var(--line); padding-bottom: 6px;
  }
  .seg {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .seg .txt { font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-line; }
  .seg .hashes { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
  .seg .hash {
    margin-top: 8px; font-size: 10.5px; color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    word-break: break-all; display: flex; align-items: center; gap: 6px;
  }
  .seg .hash::before { content: "#"; color: var(--l2); font-weight: 700; }
  .node-hash {
    font-size: 10.5px; color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    word-break: break-all; margin-bottom: 4px;
  }
  .empty-hint { color: var(--muted); font-size: 12.5px; font-style: italic; }
  .proj-tag {
    display: inline-block; font-size: 12px; color: var(--l0);
    background: rgba(245,166,35,.12); border: 1px solid rgba(245,166,35,.3);
    padding: 4px 10px; border-radius: 8px; margin-bottom: 10px;
  }
  /* 批注编辑区（节点详情面板内） */
  .cmt-box { margin-top: 6px; }
  .cmt-box textarea {
    width: 100%; min-height: 62px; resize: vertical;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 11px; font-size: 13px; line-height: 1.6; outline: none;
    font-family: inherit;
  }
  .cmt-box textarea:focus { border-color: var(--accent); }
  .cmt-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .btn {
    font-size: 12.5px; padding: 6px 13px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
    transition: all .12s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.ghost { background: transparent; color: var(--muted); }
  .cmt-saved { font-size: 11.5px; color: var(--l2); }
  /* 有意见的节点右上角标记 */
  .node .cmt-flag {
    position: absolute; left: -7px; top: -7px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--l0); color: #1a1200; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.4); z-index: 4;
  }
  /* 底部反馈栏 */
  .feedback-bar {
    position: fixed; left: 0; right: 380px; bottom: 0;
    background: var(--panel); border-top: 1px solid var(--line);
    padding: 10px 22px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 -4px 20px rgba(0,0,0,.3); z-index: 20;
  }
  .feedback-bar .fb-page {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 12px; font-size: 13px; outline: none; font-family: inherit;
  }
  .feedback-bar .fb-page:focus { border-color: var(--accent); }
  .feedback-bar .fb-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .feedback-bar .fb-count b { color: var(--l0); }
  .canvas-wrap { padding-bottom: 56px; }
  .toast {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    background: var(--l2); color: #04231a; padding: 10px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .25s;
    pointer-events: none; z-index: 50; box-shadow: var(--shadow);
  }
  .toast.show { opacity: 1; }
  .legend { display: flex; gap: 16px; font-size: 11.5px; color: var(--muted); align-items: center; }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }
</style>
</head>
<body>
<header>
  <h1>📚 知识图谱预览</h1>
  <div class="meta" id="meta"></div>
  <div class="legend">
    <span><i style="background:var(--l0)"></i>层级0 主题</span>
    <span><i style="background:var(--l1)"></i>层级1 分类</span>
    <span><i style="background:var(--l2)"></i>层级2 知识点</span>
  </div>
  <div class="switcher" id="switcher" style="display:none">
    <label style="font-size:12px;color:var(--muted)">选择课程</label>
    <select id="lessonSelect"></select>
  </div>
</header>
<div class="layout">
  <div class="canvas-wrap">
    <div id="canvas">
      <svg class="edges" id="edges"></svg>
    </div>
  </div>
  <div class="detail empty" id="detail">点击左侧任意节点查看详细内容</div>
</div>

<div class="feedback-bar">
  <input class="fb-page" id="pageComment" type="text"
         placeholder="对本课程的整体修改意见（页面级）…如：空域知识下 6 个子节点顺序需调整" />
  <span class="fb-count" id="fbCount">未添加意见</span>
  <button class="btn ghost" id="clearBtn">清空</button>
  <button class="btn primary" id="copyBtn">📋 复制修改意见</button>
</div>
<div class="toast" id="toast"></div>

<script>
// 数据由 render.py 注入：数组，每项 { lessonId, meta:{textbookId,unitId,lessonId}, graph:{nodes,edges} }
const DATASETS = [{"lessonId": "7989338958046234393", "meta": {"lessonId": "7989338958046234393"}, "graph": {"nodes": [{"id": "7989338958046234393", "label": "任务1 了解背景知识", "level": 0, "dataHash": "fm-doc-id-e8db4b4f39c09bee", "displayCode": "UAS_P6T1", "projectTitle": "项目六 空地一体化测绘（地面部分）", "projectDataHash": "fm-doc-id-b8cd87c447a905e3", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n1", "label": "地面高精度采集相关知识介绍", "level": 1, "dataHash": "fm-doc-id-b7d6250d29710bd1", "description": [{"text": "三维扫描仪（3D scanner）是一种科学仪器，用来侦测并分析现实世界中物体或环境的形状（几何构造）与外观数据（如颜色、表面反照率等性质）。收集到的数据常被用来进行三维重建计算，在虚拟世界中创建实际物体的数字模型。这些模型具有相当广泛的用途，在工业设计、瑕疵检测、逆向工程、机器人导引、地貌测量、医学信息、生物信息、刑事鉴定、数字文物典藏、电影制片、游戏创作素材等领域都可见其应用。三维扫描仪的制作并非依赖单一技术，各种不同的重建技术都有其优缺点，成本与售价也有高低之分。并无一体通用之重建技术，仪器与方法往往受限于物体的表面特性。例如，光学技术不易处理闪亮（高反照率）、镜面或半透明的表面，而激光技术不适用于脆弱或易变质的表面。常用的三维扫描仪根据传感方式的不同，分为接触式和非接触式两种。", "dataHash": "fm-doc-id-4bbdf7a53480c881"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234393_n2", "label": "接触式扫描仪", "level": 2, "dataHash": "fm-doc-id-1a1ea6eda3fb3194", "description": [{"text": "接触式扫描仪，顾名思义，需要与被扫描物体直接接触（图6.1.1）。通过探测头反馈回来的光电信号转换为数字面形信息，从而实现对物体面形的扫描和测量。", "dataHash": "fm-doc-id-a37846ad46b0e717"}, {"text": "优点：：·测量数据精准、可达微米级别。·不受物体颜色、光照限制。·适用于外形简单的物体测量。", "dataHash": "fm-doc-id-9c095ecda1ebb500"}, {"text": "缺点：：·易损伤探头和被测物体。·不能检测软质物体，应用范围受限。·扫描速度慢（受机械运动限制）。·被测工件受三坐标大小限制。·受环境温度、湿度影响。·只能获取关键点。·不能反映整个零部件的形状。", "dataHash": "fm-doc-id-59973bf419f15879"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n3", "label": "非接触式扫描仪", "level": 2, "dataHash": "fm-doc-id-71218d9baf5c7770", "description": [{"text": "非接触式扫描仪，它通常指扫描元件与被扫描物体不进行直接接触，采用这种解决方案的扫描仪即被称为非接触式扫描仪（图6.1.2）。非接触式扫描设备是一种利用某种与物体表面仿生互相作用的物理现象，如光、声和电磁等，来获取物体表面的三维坐标信息的工具。", "dataHash": "fm-doc-id-571e3b41d5c1c8fb"}, {"text": "优点：：·无须进行扫描头半径补偿。·扫描速度快，不必逐点扫描，扫描面积大，数据较为完整。·可以直接扫描材质较软以及不适合直接接触式扫描的物体，如橡胶、纸制品、工艺品、文物等。", "dataHash": "fm-doc-id-c3d751bb6af1a2e5"}, {"text": "缺点：：·大多数非接触式光学扫描头都是靠工件表面对光的反射接收数据的，因此对工件表面的反光程度、颜色等有较高的要求。·扫描精度较低，特别是相对接触式扫描仪扫描数据而言。·对于一些细节位置，如边界、缝隙、曲率变化较大的曲面容易丢失数据。·扫描时，扫描头角度与被扫描物体之间有角度限制，否则会增大扫描误差。·易受环境光线及散光的影响，故噪声较大，噪声信号的处理比较困难。", "dataHash": "fm-doc-id-11a6294f6e22e31e"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n4", "label": "激光扫描仪", "level": 1, "dataHash": "fm-doc-id-10784be6e027d828", "description": [{"text": "三维激光扫描仪按照扫描平台的不同可以分为机载式激光扫描仪、固定式激光扫描仪、手持型激光扫描仪。", "dataHash": "fm-doc-id-0915d3c99ba0a18b"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n5", "label": "机载式激光扫描仪", "level": 2, "dataHash": "fm-doc-id-33c7584c4d842976", "description": [{"text": "所谓机载式激光扫描仪，是基于车载平台，由全球定位系统、惯性导航系统结合地面三维激光扫描系统组成的（图6.1.3）。地面三维激光扫描系统，类似传统测量中的全站仪。系统由激光扫描仪及控制系统、内置数码相机、后期处理软件等组成。与全站仪不同之处在于，机载式激光扫描仪采集的不是离散的单点三维坐标，而是一系列的“点云”数据。其特点为扫描范围大、速度快、精度高，具有良好的野外操作性能。", "dataHash": "fm-doc-id-3d646c79e64af198"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n6", "label": "固定式激光扫描仪", "level": 2, "dataHash": "fm-doc-id-2530e1d4af1d7d41", "description": [{"text": "固定式激光扫描仪能够自动、精确、高效获取研究对象的三维地理坐标和立体影像数据，可以提供详细的垂直结构信息，对目标的定量分析提供数据支撑（图6.1.4）。目前，地基激光雷达被广泛应用于工业设计与施工测绘、采石采矿、古建筑维护与修复、变形监测、事故调查、逆向工程应用、地质研究及农作物生长监测等领域。", "dataHash": "fm-doc-id-67781b7e4faf16ef"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n7", "label": "手持型激光扫描仪", "level": 2, "dataHash": "fm-doc-id-261e935401bf0759", "description": [{"text": "手持型激光扫描仪透过三角形测距法建构出3D图形：透过手持式设备，对待测物发射出激光光点或线性激光光点（图6.1.5）。以两个或两个以上的侦测器（电偶组件或位置感测组件）测量待测物的表面到手持激光产品的距离，还需要借助特定引用点——通常是具黏性、可反射的贴片——用于扫描仪在空间中定位及校准。这些扫描仪获得的数据，会被导入计算机中，并由软件转换成3D模型。手持型激光扫描仪，通常还会综合被动式扫描（可见光）获得的数据（如待测物的结构、色彩分布），建构出更完整的待测物3D模型。", "dataHash": "fm-doc-id-e2970ab34729a48b"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n8", "label": "结构光扫描仪", "level": 1, "dataHash": "fm-doc-id-bee7b9315bdb5d11", "description": [{"text": "结构光扫描仪是由投影仪和摄像机组成的一套系统结构（图6.1.6）。投影仪用于将特定的光信息投射到物体表面和背景上，然后由摄像机采集。根据物体引起的光信号变化，来获取物体表面的数据信息。", "dataHash": "fm-doc-id-d773b318c6e983ee"}, {"text": "如今，许多用于3D打印的手持式3D扫描仪都使用结构光技术。该技术还使用三角测量，但它是通过将光图案投射到物体上进行扫描而不是利用激光线（或点）来工作的。使用LCD投影仪或其他稳定光源将图案投影在物体上，稍微偏离投影仪的一个或多个传感器（或相机）观察光图案的形状并计算视场中每个点的距离。在扫描过程中使用的结构光可以是白色或蓝色，并且光图案通常由一系列条纹组成，但也可以由点或其他形状的矩阵组成（图6.1.7）。", "dataHash": "fm-doc-id-95724913063f6415"}, {"text": "这种类型的设备就像激光扫描仪在短距离上工作一样，可以手持或安装在三脚架上。", "dataHash": "fm-doc-id-f2d85f57732f4e36"}, {"text": "结构光技术的好处是扫描速度快。扫描约在2 s内完成，扫描区域也非常大。就像激光扫描仪一样，结构光扫描仪非常准确，并提供高分辨率。", "dataHash": "fm-doc-id-2f80dbda3108c9a9"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}], "edges": [{"source": "7989338958046234393", "target": "7989338958046234393_n1", "type": "父子", "description": "任务1 了解背景知识包含地面高精度采集相关知识介绍"}, {"source": "7989338958046234393_n1", "target": "7989338958046234393_n2", "type": "父子", "description": "地面高精度采集相关知识介绍包含接触式扫描仪"}, {"source": "7989338958046234393_n1", "target": "7989338958046234393_n3", "type": "父子", "description": "地面高精度采集相关知识介绍包含非接触式扫描仪"}, {"source": "7989338958046234393", "target": "7989338958046234393_n4", "type": "父子", "description": "任务1 了解背景知识包含激光扫描仪"}, {"source": "7989338958046234393_n4", "target": "7989338958046234393_n5", "type": "父子", "description": "激光扫描仪包含机载式激光扫描仪"}, {"source": "7989338958046234393_n4", "target": "7989338958046234393_n6", "type": "父子", "description": "激光扫描仪包含固定式激光扫描仪"}, {"source": "7989338958046234393_n4", "target": "7989338958046234393_n7", "type": "父子", "description": "激光扫描仪包含手持型激光扫描仪"}, {"source": "7989338958046234393", "target": "7989338958046234393_n8", "type": "父子", "description": "任务1 了解背景知识包含结构光扫描仪"}]}}];

const COL_W = 300;      // 层级横向间距
const NODE_H = 62;      // 单节点占位高度
const V_GAP = 16;       // 兄弟节点垂直间距
const canvas = document.getElementById('canvas');
const edgesSvg = document.getElementById('edges');
const detail = document.getElementById('detail');
const metaEl = document.getElementById('meta');

let current = null;      // 当前数据集
let nodeMap = {};        // id -> node
let childrenMap = {};    // id -> [childId]
let elMap = {};          // id -> DOM 元素（用于读取真实坐标画线）
let collapsed = new Set();
let selectedId = null;

// 批注存储：按 lessonId 分组。{ [lessonId]: { nodes: {nodeId:{label,level,text}}, page: "" } }
// 存在内存中（纯静态页，无需后端）。切换 lesson 不丢，复制时汇总所有有意见的 lesson。
const feedback = {};
function fbFor(lessonId) {
  if (!feedback[lessonId]) feedback[lessonId] = { nodes: {}, page: "" };
  return feedback[lessonId];
}

function buildTree(graph) {
  nodeMap = {};
  childrenMap = {};
  graph.nodes.forEach(n => { nodeMap[n.id] = n; childrenMap[n.id] = []; });
  graph.edges.forEach(e => {
    if (childrenMap[e.source]) childrenMap[e.source].push(e.target);
  });
  // 根 = level 0，或无入边的节点
  const hasParent = new Set(graph.edges.map(e => e.target));
  return graph.nodes.filter(n => n.level === 0 || !hasParent.has(n.id)).map(n => n.id);
}

// 递归布局：用节点真实高度 node._h 计算占位，返回子树总高度，写入 node._x/_y。
// node._y 为该节点顶端 y 坐标；节点垂直居中对齐其子树跨度。
function layout(id, depth, cursorY) {
  const node = nodeMap[id];
  node._x = depth * COL_W;
  const selfH = (node._h || NODE_H) + V_GAP;
  const kids = collapsed.has(id) ? [] : childrenMap[id];
  if (kids.length === 0) {
    node._y = cursorY;
    return selfH;
  }
  let y = cursorY;
  let total = 0;
  kids.forEach(k => {
    const h = layout(k, depth + 1, y);
    y += h; total += h;
  });
  // 父节点中心对齐首末子节点中心
  const first = nodeMap[kids[0]];
  const last = nodeMap[kids[kids.length - 1]];
  const kidsMid = (first._y + (first._h || NODE_H) / 2 + last._y + (last._h || NODE_H) / 2) / 2;
  node._y = kidsMid - (node._h || NODE_H) / 2;
  // 子树可能比父节点自身矮，取较大者
  return Math.max(total, selfH);
}

function render() {
  // 清空旧节点（保留 svg）
  [...canvas.querySelectorAll('.node')].forEach(n => n.remove());
  elMap = {};
  const roots = buildTree(current.graph);

  // —— 阶段一：建节点并入 DOM（先不定位），测量真实高度 ——
  Object.values(nodeMap).forEach(n => {
    const el = document.createElement('div');
    el.className = 'node' + (n.id === selectedId ? ' selected' : '');
    el.dataset.level = n.level;
    el.style.visibility = 'hidden';

    const badges = [];
    if (n.tags) badges.push(`<span class="badge tag">${n.tags}</span>`);
    if (n.knowledgeCategory) badges.push(`<span class="badge">${n.knowledgeCategory}</span>`);
    if (n.cognitiveDimension) badges.push(`<span class="badge">${n.cognitiveDimension}</span>`);

    el.innerHTML = `<div class="label"><span class="dot"></span><span>${escapeHtml(n.label)}</span></div>` +
                   (badges.length ? `<div class="badges">${badges.join('')}</div>` : '');

    const kids = childrenMap[n.id];
    if (kids && kids.length) {
      const t = document.createElement('div');
      t.className = 'toggle';
      t.textContent = collapsed.has(n.id) ? '+' : '−';
      t.onclick = (ev) => { ev.stopPropagation(); toggle(n.id); };
      el.appendChild(t);
    }
    // 有意见的节点加标记
    if (current && fbFor(current.lessonId).nodes[n.id]) {
      const flag = document.createElement('div');
      flag.className = 'cmt-flag';
      flag.textContent = '✎';
      flag.title = '该节点有修改意见';
      el.appendChild(flag);
    }
    el.onclick = () => select(n.id);
    canvas.appendChild(el);
    elMap[n.id] = el;
  });
  // 测量真实高度/宽度写入 node._h / node._w
  Object.values(nodeMap).forEach(n => {
    n._h = elMap[n.id].offsetHeight;
    n._w = elMap[n.id].offsetWidth;
  });

  // —— 阶段二：按真实高度布局 ——
  let cursorY = 0;
  roots.forEach(r => { cursorY += layout(r, 0, cursorY); });

  // —— 阶段三：算内容包围盒 ——
  let contentW = 0, contentH = 0;
  Object.values(nodeMap).forEach(n => {
    if (n._x === undefined) return;
    contentW = Math.max(contentW, n._x + (n._w || 200));
    contentH = Math.max(contentH, n._y + (n._h || NODE_H));
  });

  // 居中偏移：内容比视口小时居中，否则留固定边距
  const wrap = canvas.parentElement;      // .canvas-wrap 视口
  const PAD = 48;
  const vw = wrap.clientWidth, vh = wrap.clientHeight;
  const offsetX = Math.max(PAD, (vw - contentW) / 2);
  const offsetY = Math.max(PAD, (vh - contentH) / 2);

  // —— 阶段四：定位并显示 ——
  Object.values(nodeMap).forEach(n => {
    if (n._x === undefined) return;
    const el = elMap[n.id];
    el.style.left = (n._x + offsetX) + 'px';
    el.style.top = (n._y + offsetY) + 'px';
    el.style.visibility = 'visible';
  });

  // canvas 至少填满视口，内容超出时按内容+边距撑开
  canvas.style.width = Math.max(vw, contentW + offsetX + PAD) + 'px';
  canvas.style.height = Math.max(vh, contentH + offsetY + PAD) + 'px';
  // 节点已定位，用真实坐标画线（消除偏移）
  drawEdges();
}

function drawEdges() {
  edgesSvg.innerHTML = '';
  edgesSvg.setAttribute('width', canvas.style.width);
  edgesSvg.setAttribute('height', canvas.style.height);
  current.graph.edges.forEach(e => {
    if (collapsed.has(e.source)) return;
    const se = elMap[e.source], te = elMap[e.target];
    if (!se || !te) return;
    // 读取真实布局坐标：起点=父节点右边缘中点，终点=子节点左边缘中点
    const x1 = se.offsetLeft + se.offsetWidth;
    const y1 = se.offsetTop + se.offsetHeight / 2;
    const x2 = te.offsetLeft;
    const y2 = te.offsetTop + te.offsetHeight / 2;
    const mx = (x1 + x2) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#3a4761');
    path.setAttribute('stroke-width', '1.6');
    edgesSvg.appendChild(path);
  });
}

function toggle(id) {
  if (collapsed.has(id)) collapsed.delete(id); else collapsed.add(id);
  render();
}

function select(id) {
  selectedId = id;
  render();
  const n = nodeMap[id];
  const chips = [];
  chips.push(`<span class="chip">层级 ${n.level}</span>`);
  if (n.knowledgeCategory) chips.push(`<span class="chip">${n.knowledgeCategory}</span>`);
  if (n.cognitiveDimension) chips.push(`<span class="chip">${n.cognitiveDimension}</span>`);
  if (n.tags) chips.push(`<span class="chip" style="color:var(--l0)">${n.tags}</span>`);

  let html = '';
  if (n.projectTitle) {
    html += `<div class="proj-tag">📁 ${escapeHtml(n.projectTitle)}</div>`;
  }
  html += `<h2>${escapeHtml(n.label)}</h2>`;
  if (n.dataHash) html += `<div class="node-hash"># ${n.dataHash}</div>`;
  if (n.projectDataHash) html += `<div class="node-hash">项目 # ${n.projectDataHash}</div>`;
  html += `<div class="dl">${chips.join('')}</div>`;

  const desc = n.description || [];
  if (desc.length) {
    html += `<div class="sec-title">详细说明（${desc.length} 段）</div>`;
    desc.forEach(d => {
      html += `<div class="seg"><div class="txt">${escapeHtml(d.text)}</div>`;
      if (d.sourceHashes && d.sourceHashes.length) {
        // 合并段：列出全部源 hash（零丢失可追溯）
        html += `<div class="hashes">` +
          d.sourceHashes.map(s => `<div class="hash">${s.dataHash}</div>`).join('') +
          `</div>`;
      } else if (d.dataHash) {
        html += `<div class="hash">${d.dataHash}</div>`;
      }
      html += `</div>`;
    });
  } else {
    html += `<div class="sec-title">详细说明</div><div class="empty-hint">该节点为分类/主题节点，无独立正文说明。</div>`;
  }

  // 节点级批注编辑区
  const existing = fbFor(current.lessonId).nodes[id];
  html += `<div class="sec-title">修改意见（该节点）</div>` +
    `<div class="cmt-box">` +
    `<textarea id="nodeCmt" placeholder="写下对「${escapeHtml(n.label)}」的修改意见，例如：该节点应为 level 1 / 应删除 / 归类错误…">${existing ? escapeHtml(existing.text) : ''}</textarea>` +
    `<div class="cmt-actions">` +
    `<button class="btn primary" id="saveCmtBtn">保存意见</button>` +
    (existing ? `<button class="btn ghost" id="delCmtBtn">删除</button><span class="cmt-saved">✓ 已记录</span>` : '') +
    `</div></div>`;

  detail.className = 'detail';
  detail.innerHTML = html;

  document.getElementById('saveCmtBtn').onclick = () => {
    const txt = document.getElementById('nodeCmt').value.trim();
    const store = fbFor(current.lessonId).nodes;
    if (txt) {
      store[id] = { label: n.label, level: n.level, text: txt };
    } else {
      delete store[id];
    }
    updateFbCount(); render(); select(id);
    showToast(txt ? '已记录该节点意见' : '已清除该节点意见');
  };
  const delBtn = document.getElementById('delCmtBtn');
  if (delBtn) delBtn.onclick = () => {
    delete fbFor(current.lessonId).nodes[id];
    updateFbCount(); render(); select(id);
    showToast('已删除该节点意见');
  };
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// —— 反馈：计数、生成文本、复制 ——
function countFeedback() {
  let n = 0;
  Object.values(feedback).forEach(f => {
    n += Object.keys(f.nodes).length;
    if (f.page && f.page.trim()) n += 1;
  });
  return n;
}

function updateFbCount() {
  const c = countFeedback();
  const el = document.getElementById('fbCount');
  el.innerHTML = c ? `已添加 <b>${c}</b> 条意见` : '未添加意见';
}

function buildFeedbackText() {
  // 汇总所有有意见的 lesson；只带定位信息 + 意见（正文由大模型自行读 json 定位）
  const lines = ['# 知识图谱修改意见', ''];
  let any = false;
  Object.keys(feedback).forEach(lessonId => {
    const f = feedback[lessonId];
    const nodeIds = Object.keys(f.nodes);
    const hasPage = f.page && f.page.trim();
    if (!nodeIds.length && !hasPage) return;
    any = true;
    lines.push(`## 课程 lessonId: ${lessonId}`);
    lines.push(`对应文件: output/knowledgegraph/${lessonId}.json`);
    lines.push('');
    if (nodeIds.length) {
      lines.push('### 节点级意见');
      nodeIds.forEach(nid => {
        const c = f.nodes[nid];
        lines.push(`- [节点 ${nid}]「${c.label}」(level ${c.level})`);
        lines.push(`  意见: ${c.text}`);
      });
      lines.push('');
    }
    if (hasPage) {
      lines.push('### 页面级意见');
      lines.push(`- ${f.page.trim()}`);
      lines.push('');
    }
  });
  if (!any) return '';
  lines.push('---');
  lines.push('请据以上意见对相应 lesson 的 json 二次修改，改后用 validate.py 校验、render.py 重新渲染。');
  return lines.join('\n');
}

function copyFeedback() {
  const text = buildFeedbackText();
  if (!text) { showToast('尚未添加任何修改意见'); return; }
  const done = () => showToast('修改意见已复制，粘贴给大模型即可');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); done(); }
  catch (e) { showToast('复制失败，请手动选择'); }
  document.body.removeChild(ta);
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function loadDataset(idx) {
  current = DATASETS[idx];
  collapsed = new Set();
  selectedId = null;
  detail.className = 'detail empty';
  detail.textContent = '点击左侧任意节点查看详细内容';
  const m = current.meta || {};
  const rootNode = current.graph.nodes.find(n => n.level === 0) || {};
  const dc = rootNode.displayCode;
  metaEl.innerHTML =
    (dc ? `<span>代码 <b>${escapeHtml(dc)}</b></span>` : '') +
    `<span>课程 <b>${current.lessonId}</b></span>` +
    (m.unitId ? `<span>单元 <b>${m.unitId}</b></span>` : '') +
    (m.textbookId ? `<span>教材 <b>${m.textbookId}</b></span>` : '') +
    `<span>节点 <b>${current.graph.nodes.length}</b></span>`;
  // 同步当前课程的页面级意见到输入框
  const pc = document.getElementById('pageComment');
  if (pc) pc.value = fbFor(current.lessonId).page || '';
  render();
}

// 初始化
(function init() {
  const sel = document.getElementById('lessonSelect');
  if (DATASETS.length > 1) {
    document.getElementById('switcher').style.display = 'flex';
    DATASETS.forEach((d, i) => {
      const o = document.createElement('option');
      o.value = i;
      const rootLabel = (d.graph.nodes.find(n => n.level === 0) || {}).label || d.lessonId;
      o.textContent = `${d.lessonId} · ${rootLabel}`;
      sel.appendChild(o);
    });
    sel.onchange = () => loadDataset(+sel.value);
  }

  // 页面级意见：实时写入当前课程
  const pc = document.getElementById('pageComment');
  pc.addEventListener('input', () => {
    fbFor(current.lessonId).page = pc.value;
    updateFbCount();
  });
  // 复制 / 清空
  document.getElementById('copyBtn').onclick = copyFeedback;
  document.getElementById('clearBtn').onclick = () => {
    const c = countFeedback();
    if (!c) { showToast('当前没有意见可清空'); return; }
    if (!confirm(`确定清空全部 ${c} 条修改意见？`)) return;
    Object.keys(feedback).forEach(k => delete feedback[k]);
    pc.value = '';
    updateFbCount(); render();
    if (selectedId) select(selectedId);
    showToast('已清空全部意见');
  };

  // 窗口尺寸变化时重新布局居中（防抖）
  let rzTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(rzTimer);
    rzTimer = setTimeout(() => { if (current) render(); }, 150);
  });

  loadDataset(0);
  updateFbCount();
})();
</script>
