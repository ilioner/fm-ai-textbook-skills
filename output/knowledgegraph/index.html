<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图谱预览</title>
<style>
  :root {
    --bg: #0f1420;
    --panel: #171d2b;
    --panel-2: #1e2637;
    --line: #2a3548;
    --text: #e6ebf5;
    --muted: #8a97ad;
    --l0: #f5a623;
    --l1: #4a9eff;
    --l2: #35d0a5;
    --accent: #6c8cff;
    --shadow: 0 6px 24px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    padding: 14px 22px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 18px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: .5px; }
  header .meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; }
  header .meta b { color: var(--text); font-weight: 500; }
  .switcher { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .switcher select {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .layout { flex: 1; display: flex; min-height: 0; }
  .canvas-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
    background:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.035) 1px, transparent 0);
    background-size: 22px 22px;
  }
  #canvas { position: relative; }
  svg.edges { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
  .node {
    position: absolute;
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 10px 14px;
    border-radius: 12px;
    background: var(--panel-2);
    border: none;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    max-width: 230px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .node:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .node.selected { box-shadow: 0 0 0 2px var(--accent), var(--shadow); }
  .node .label { font-size: 14px; font-weight: 600; line-height: 1.35; }
  .node .badges { display: flex; flex-wrap: wrap; gap: 5px; }
  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    background: rgba(255,255,255,.08);
    color: var(--muted);
    white-space: nowrap;
  }
  .badge.tag { background: rgba(245,166,35,.18); color: var(--l0); }
  .node .label { display: flex; align-items: flex-start; gap: 7px; }
  .node .dot {
    flex-shrink: 0; width: 9px; height: 9px; border-radius: 50%;
    margin-top: 4px;
  }
  .node[data-level="0"] .dot { background: var(--l0); }
  .node[data-level="1"] .dot { background: var(--l1); }
  .node[data-level="2"] .dot { background: var(--l2); }
  .node .toggle {
    position: absolute;
    right: -11px; top: 50%;
    transform: translateY(-50%);
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 3;
  }
  .node .toggle:hover { color: var(--text); border-color: var(--accent); }
  .detail {
    width: 380px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--line);
    overflow-y: auto;
    padding: 22px;
  }
  .detail.empty { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; text-align: center; }
  .detail h2 { font-size: 18px; margin-bottom: 6px; line-height: 1.4; }
  .detail .dl { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .detail .chip {
    font-size: 11px; padding: 3px 9px; border-radius: 20px;
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--line);
  }
  .detail .sec-title {
    font-size: 12px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .8px; margin: 18px 0 10px; border-bottom: 1px solid var(--line); padding-bottom: 6px;
  }
  .seg {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .seg .txt { font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-line; }
  .seg .hashes { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
  .seg .hash {
    margin-top: 8px; font-size: 10.5px; color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    word-break: break-all; display: flex; align-items: center; gap: 6px;
  }
  .seg .hash::before { content: "#"; color: var(--l2); font-weight: 700; }
  .node-hash {
    font-size: 10.5px; color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    word-break: break-all; margin-bottom: 4px;
  }
  .empty-hint { color: var(--muted); font-size: 12.5px; font-style: italic; }
  .proj-tag {
    display: inline-block; font-size: 12px; color: var(--l0);
    background: rgba(245,166,35,.12); border: 1px solid rgba(245,166,35,.3);
    padding: 4px 10px; border-radius: 8px; margin-bottom: 10px;
  }
  /* 批注编辑区（节点详情面板内） */
  .cmt-box { margin-top: 6px; }
  .cmt-box textarea {
    width: 100%; min-height: 62px; resize: vertical;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 11px; font-size: 13px; line-height: 1.6; outline: none;
    font-family: inherit;
  }
  .cmt-box textarea:focus { border-color: var(--accent); }
  .cmt-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .btn {
    font-size: 12.5px; padding: 6px 13px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
    transition: all .12s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.ghost { background: transparent; color: var(--muted); }
  .cmt-saved { font-size: 11.5px; color: var(--l2); }
  /* 有意见的节点右上角标记 */
  .node .cmt-flag {
    position: absolute; left: -7px; top: -7px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--l0); color: #1a1200; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.4); z-index: 4;
  }
  /* 底部反馈栏 */
  .feedback-bar {
    position: fixed; left: 0; right: 380px; bottom: 0;
    background: var(--panel); border-top: 1px solid var(--line);
    padding: 10px 22px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 -4px 20px rgba(0,0,0,.3); z-index: 20;
  }
  .feedback-bar .fb-page {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 12px; font-size: 13px; outline: none; font-family: inherit;
  }
  .feedback-bar .fb-page:focus { border-color: var(--accent); }
  .feedback-bar .fb-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .feedback-bar .fb-count b { color: var(--l0); }
  .canvas-wrap { padding-bottom: 56px; }
  .toast {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    background: var(--l2); color: #04231a; padding: 10px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .25s;
    pointer-events: none; z-index: 50; box-shadow: var(--shadow);
  }
  .toast.show { opacity: 1; }
  .legend { display: flex; gap: 16px; font-size: 11.5px; color: var(--muted); align-items: center; }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }
</style>
</head>
<body>
<header>
  <h1>📚 知识图谱预览</h1>
  <div class="meta" id="meta"></div>
  <div class="legend">
    <span><i style="background:var(--l0)"></i>层级0 主题</span>
    <span><i style="background:var(--l1)"></i>层级1 分类</span>
    <span><i style="background:var(--l2)"></i>层级2 知识点</span>
  </div>
  <div class="switcher" id="switcher" style="display:none">
    <label style="font-size:12px;color:var(--muted)">选择课程</label>
    <select id="lessonSelect"></select>
  </div>
</header>
<div class="layout">
  <div class="canvas-wrap">
    <div id="canvas">
      <svg class="edges" id="edges"></svg>
    </div>
  </div>
  <div class="detail empty" id="detail">点击左侧任意节点查看详细内容</div>
</div>

<div class="feedback-bar">
  <input class="fb-page" id="pageComment" type="text"
         placeholder="对本课程的整体修改意见（页面级）…如：空域知识下 6 个子节点顺序需调整" />
  <span class="fb-count" id="fbCount">未添加意见</span>
  <button class="btn ghost" id="clearBtn">清空</button>
  <button class="btn primary" id="copyBtn">📋 复制修改意见</button>
</div>
<div class="toast" id="toast"></div>

<script>
// 数据由 render.py 注入：数组，每项 { lessonId, meta:{textbookId,unitId,lessonId}, graph:{nodes,edges} }
const DATASETS = [{"lessonId": "7989338958046234378", "meta": {"lessonId": "7989338958046234378"}, "graph": {"nodes": [{"id": "7989338958046234378", "label": "任务1 无人机系统基础原理", "level": 0, "dataHash": "fm-doc-id-7a41cf45ebf35951", "displayCode": "UAS_P1T1", "projectTitle": "项目一 无人机基础知识", "projectDataHash": "fm-doc-id-28f57c27811559ff", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234378_n1", "label": "无人机系统概述", "level": 1, "dataHash": "fm-doc-id-2d28657f7905b8de", "description": [{"text": "广义上讲，无人机系统，也称远程驾驶航空器系统（remotely piloted aircraft sys-tem，RPAS），是指由一架无人机、相关的遥控站、所需的指令与控制数据链路以及批准的型号设计规定的任何其他部件组成的系统。", "dataHash": "fm-doc-id-5a969db6cecc9b26"}, {"text": "常规的无人机系统可分为以下几类。", "dataHash": "fm-doc-id-8454fbd157c51547"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234378_n2", "label": "固定翼无人机系统", "level": 2, "dataHash": "fm-doc-id-e72b52bf5d563865", "description": [{"text": "固定翼无人机系统一般由这几部分构成：机体结构、航电系统、动力系统和地面控制站。", "dataHash": "fm-doc-id-09e0f40288ee027c"}, {"text": "固定翼无人机是一种由动力装置产生前进的推力或拉力，由机体上固定的机翼产生升力，在大气层内飞行的重于空气的无人驾驶航空器。它一般包括机翼、机身、尾翼和起落装置等（图1.1.1）。", "dataHash": "fm-doc-id-39bf39f9864c3b59"}, {"text": "机翼的主要功能是产生升力，以支持飞机在空中飞行，同时也起到一定的稳定和操作用途。", "dataHash": "fm-doc-id-2ebbf38351011169"}, {"text": "机身的主要功能是装载各种设备，将飞机其他部件（如机翼和动力装置）连接成一个整体，以保持其整体气动性。", "dataHash": "fm-doc-id-69a1ff08c436d47f"}, {"text": "尾翼包括水平尾翼和垂直尾翼。水平尾翼由固定的水平安定面和可动的升降舵组成。垂直尾翼包括固定的垂直安定面和可动的方向舵。尾翼的作用是操纵飞机俯仰和偏转，以保证飞机能平稳飞行。", "dataHash": "fm-doc-id-f6682767d3651ca5"}, {"text": "起落装置大多由减震支柱和机轮组成，其作用是起飞、着陆滑跑、地面滑行和停放时支撑飞机。", "dataHash": "fm-doc-id-7a54df5172c998e6"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234378_n3", "label": "无人直升机系统", "level": 2, "dataHash": "fm-doc-id-32bbbcf3beb2ec67", "description": [{"text": "无人直升机是具有一副或两副主旋翼，通过旋翼的倾斜、转速的调整来产生各个运动方向的力的无人驾驶航空器。", "dataHash": "fm-doc-id-0cd6fb8935bccadb"}, {"text": "无人直升机的主要结构有：机身、动力系统、旋翼、尾翼、起落架等（图1.1.2）。", "dataHash": "fm-doc-id-54235a6135bd416c"}, {"text": "直升机按旋翼数量和布局方式的不同可分为单旋翼直升机、共轴式双旋翼直升机、纵列式双旋翼直升机、横列式双旋翼直升机和带翼式直升机等几种类型（图1.1.3）。", "dataHash": "fm-doc-id-13dfce4fa59e8315"}, {"text": "（1）机身：无人直升机机身结构有桁架式结构、薄壁式结构和复合材料夹层结构。", "dataHash": "fm-doc-id-958bb541d170f96c"}, {"text": "（2）旋翼：无人直升机旋翼结构有全铰接式、跷跷板式、柔性铰式和无轴承式四种结构。", "dataHash": "fm-doc-id-5ceafe4b8f502af5"}, {"text": "（3）尾翼：无人直升机尾翼包括垂直安定面和水平安定面（图1.1.4）。", "dataHash": "fm-doc-id-1ea1547dce167f5e"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234378_n4", "label": "多旋翼无人机系统", "level": 2, "dataHash": "fm-doc-id-0bbb1979a2733eb6", "description": [{"text": "多旋翼无人机是一种特殊的直升机。每个旋翼的螺旋桨桨距一般不发生改变，而是通过改变各个旋翼之间的相对转速，以改变单轴推进力的大小，从而改变运行轨迹的一种无人驾驶航空器。", "dataHash": "fm-doc-id-290960c91ff4320d"}, {"text": "相对固定翼无人机和无人直升机来说，多旋翼无人机的机体结构比较简单。按形状可分为X型布局、十型布局、H型布局等（图1.1.5、图1.1.6）。", "dataHash": "fm-doc-id-ed0175a5fd409e48"}, {"text": "目前X型布局的多旋翼无人机是最常见的。相比十型布局的多旋翼无人机来说，它的前后左右动作时加减速的电机较多，控制比较迅速、有力。", "dataHash": "fm-doc-id-9f38c12215b6772c"}, {"text": "十型多旋翼是最早出现的一种气动布局，只需改变少量电机转速就可实现。", "dataHash": "fm-doc-id-28339a4d16f95912"}, {"text": "H型布局的多旋翼无人机的特点在于比较易于设计成水平折叠结构，看起来比X型布局的多旋翼无人机厚重，又拥有与X型布局的多旋翼无人机相当的特点，结构简单，方便控制。", "dataHash": "fm-doc-id-bb7c73a2023bebbb"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}], "edges": [{"source": "7989338958046234378", "target": "7989338958046234378_n1", "type": "父子", "description": "任务1 无人机系统基础原理包含无人机系统概述"}, {"source": "7989338958046234378_n1", "target": "7989338958046234378_n2", "type": "父子", "description": "无人机系统概述包含固定翼无人机系统"}, {"source": "7989338958046234378_n1", "target": "7989338958046234378_n3", "type": "父子", "description": "无人机系统概述包含无人直升机系统"}, {"source": "7989338958046234378_n1", "target": "7989338958046234378_n4", "type": "父子", "description": "无人机系统概述包含多旋翼无人机系统"}]}}, {"lessonId": "7989338958046234379", "meta": {"lessonId": "7989338958046234379"}, "graph": {"nodes": [{"id": "7989338958046234379", "label": "任务2 无人机安全与法规", "level": 0, "dataHash": "fm-doc-id-071c48970af3bc3c", "displayCode": "UAS_P1T2", "knowledgeCategory": "元认知", "cognitiveDimension": "理解", "tags": "课程思政"}, {"id": "7989338958046234379_n1", "label": "无人机法规", "level": 1, "dataHash": "fm-doc-id-c6878b1ce1b5b84c", "description": [{"text": "民用无人机法律法规是无人机应用的法律保障，它使无人机飞行、作业等有法可依。依据《中华人民共和国民用航空法》《中华人民共和国飞行基本规则》《中国民用航空空中交通管制工作规则》《通用航空飞行管制条例》等制定了无人机相关法规，如由国务院下设中国民用航空局的相关部门根据民用无人机的发展状况，制定的相关规定与办法；中国民用航空局委托“中国航空器拥有者及驾驶员协会（Aircraft Owners and Pilots Asso-ciation of China，AOPA-China）”制定的相关规则（如《民用无人机驾驶员管理规定》），共同构筑了生产制造、适航审定、运行管理、人员训练、人员管理、证照管理等无人机的法制基础。", "dataHash": "fm-doc-id-ec3c0f744861f984"}, {"text": "中国航空器拥有者及驾驶员协会，成立于2004年，经国务院批准，在民政部登记注册，是国内民用航空领域第一个全国性行业协会。它是中国（含香港、澳门、台湾地区）在国际航空器拥有者及驾驶员协会（The International Council of Aircraft Owner and Pilot Association，IAOPA）的唯一合法代表。", "dataHash": "fm-doc-id-569aa1ddff110fb8"}, {"text": "无人机法规用来规范民用无人机适航性设计、生产、运行以及从业人员的训练、管理等。", "dataHash": "fm-doc-id-b17c3dc1fc3151db"}, {"text": "汽车的行驶，要遵守规则，各行其道，听从指挥，否则轻者造成交通拥堵，重者引发交通事故甚至车毁人亡。可见遵守规则的重要性。无人机的飞行也一样，要遵守无人机相关法规。", "dataHash": "fm-doc-id-04feba9d6bca89fc"}, {"text": "无人机的无序飞行曾经多次造成延误航班、干扰通信、损坏财物、误伤人员等事故，造成了不可估量的损失。当前我国政府为保证无人机的飞行安全，有序作业，制定了多项相关规定、办法，对无人机的飞行进行有序管理。这些规定、办法包括为什么要进行飞行管制、依据什么进行管制、如何进行管制等方面的内容，规定了什么样的无人机在什么情况下飞行必须进行空域申请、在什么情况下必须得到相关航空管制部门批准后才能飞行等。", "dataHash": "fm-doc-id-d943b5364a35bd58"}, {"text": "民用无人机法规具有独立性、综合性、平时性、国际性等特性。", "dataHash": "fm-doc-id-4e7fc5a522a12686"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点;课程思政"}, {"id": "7989338958046234379_n2", "label": "独立性", "level": 2, "dataHash": "fm-doc-id-46a6ccedd501f9ec", "description": [{"text": "无人机法规的独立性是指无人机的法规自成一类，形成一个独立的法律体系。", "dataHash": "fm-doc-id-1990eafe9e83bb58"}, {"text": "无人机相关法规仅适用于民用无人机的生产、适航、运行及人员管理等，不适用于有人航空器及国家航空器。当然，独立性是在继承基础上的独立，是在联系基础上的独立。没有联系与继承的独立是不存在的。", "dataHash": "fm-doc-id-8d30500c1225a98a"}, {"text": "民用无人机的相关法律、规章来源于民用航空法及其相关的规章制度，具有一定的继承性和从属性。例如，《低空空域管理使用规定》参考《中华人民共和国民用航空法》《中华人民共和国飞行基本规则》《通用航空飞行管制条例》以及军方的相关管理规定制定。同时，民用无人机的空域管理又有其独有属性，其管理的空域是指飞行高度在1000 m以下的区域，并且根据情况不同按照管制空域、报告空域、监视空域、目视飞行航线等进行了分类，所以无人机法律法规具有独立性。", "dataHash": "fm-doc-id-eaca0714b3d77a03"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234379_n3", "label": "综合性", "level": 2, "dataHash": "fm-doc-id-f12ba49710b90972", "description": [{"text": "综合性是指将不同部分、不同事物的属性合并成为一个整体的特性。", "dataHash": "fm-doc-id-0d6031204fc348b2"}, {"text": "无人机法规是调整无人机生产、运营及其相关领域中产生的社会关系的各种法律手段。这些手段纵横交错，法律调整方法多种多样。", "dataHash": "fm-doc-id-d28e2a227cdc905b"}, {"text": "无人机法规的综合性主要体现在涉及的法律既有民用航空的相关法律法规，又有宪法、气象法、国家安全法、民法、刑法、治安条例等方面的内容，还涉及社会关系的方方面面上，因此无人机法律法规具有将相关法规进行融合的综合性。", "dataHash": "fm-doc-id-5271812e23329ea0"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234379_n4", "label": "平时性", "level": 2, "dataHash": "fm-doc-id-5133c829276137d0", "description": [{"text": "平时性是指无人机相关法规仅用于调整和平时期民用无人机航空活动及其相关领域产生的社会关系。如果遇战争或国家处于紧急状态，民用无人航空则要受到战时法令或紧急状态下的非常法的约束。", "dataHash": "fm-doc-id-b571d6870f9c71d5"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234379_n5", "label": "国际性", "level": 2, "dataHash": "fm-doc-id-94a059fed2e3193c", "description": [{"text": "国际性体现在法律法规来源的国际性上。由于民用无人机在全球范围内发展迅速，国际民航组织已经开始为无人机系统制定标准和建议措施、空中航行服务程序及指导材料，并且多个国家发布了管理规定。我国无人机法律法规的制定既参照了其他国家或国际组织的相关条文，如美国联邦航空管理局（Federal Aviation Administration，FAA）颁布的107部规章等，也结合了相关的判例等。因此，无人机法律法规具有一定的国际性。", "dataHash": "fm-doc-id-9a03fffaaca8dc92"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234379_n6", "label": "空域知识", "level": 1, "dataHash": "fm-doc-id-a4a9062452617db6", "description": [{"text": "无人机的空域管理主要从无人机空域划设的原则、划设的依据、划设的内容，空中交通管制的依据、内容和相应条款等方面，把无人机飞行空域的使用与管理纳入法治化、正规化、统一化的管理之中，即由航空管制部门进行统一的管理。只有这样才能保证空中交通安全，保证各种航空器有序、安全运行。", "dataHash": "fm-doc-id-59d9beb094a416ea"}, {"text": "无人机的空域是指无人机飞行的空间。目前无人机的飞行高度为0～1000m。水平空间根据需要划分为管制空域、报告空域、监视空域、目视飞行航线、融合空域和隔离空域六类。", "dataHash": "fm-doc-id-cd140adf024cf5d3"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234379_n7", "label": "管制空域", "level": 2, "dataHash": "fm-doc-id-9b123dca12317717", "description": [{"text": "管制空域是指重点目标外围5km区域、以民航机场跑道中心点为中心的跑道两头各25km区域和跑道两侧各10km的区域。在该区域内，无人机需获得批准并持有执照方可飞行。", "dataHash": "fm-doc-id-f17943b2312ee1fe"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234379_n8", "label": "报告空域", "level": 2, "dataHash": "fm-doc-id-370fe409e7379b57", "description": [{"text": "报告空域是指通用机场和临时起降点10km区域，且不得划设在空中禁区边缘外20km范围内和全国重点目标外缘10km范围内。在该区域内，无人机飞行必须报备飞行计划，驾驶员须持照飞行。", "dataHash": "fm-doc-id-5c4b45d790ed1140"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234379_n9", "label": "监视空域", "level": 2, "dataHash": "fm-doc-id-6291fe0d02856439", "description": [{"text": "监视空域是指位于管制空域和报告空域之外的空域。", "dataHash": "fm-doc-id-b0fe2233ddaba87f"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234379_n10", "label": "目视飞行航线", "level": 2, "dataHash": "fm-doc-id-63d510e416ca8fb2", "description": [{"text": "目视飞行航线是指航空器处于驾驶员目视视距半径500m，相对高度低于120m的范围。", "dataHash": "fm-doc-id-cef2e2becb53045a"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234379_n11", "label": "融合空域", "level": 2, "dataHash": "fm-doc-id-bbc544b4306529a7", "description": [{"text": "融合空域是指有其他航空器同时运行的空域。", "dataHash": "fm-doc-id-b7d78e89aadb764a"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234379_n12", "label": "隔离空域", "level": 2, "dataHash": "fm-doc-id-5ebd820d0a01d818", "description": [{"text": "隔离空域是指专门分配给无人机运行的空域，通过限制其他航空器的进入以规避碰撞风险。", "dataHash": "fm-doc-id-e8faf3915373213f"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234379_n13", "label": "空中交通管制", "level": 1, "dataHash": "fm-doc-id-9816d4a6a7bda514", "description": [{"text": "空中交通管制是指航空管制部门利用技术手段对无人机的飞行计划、飞行区域、飞行高度等运行情况进行管理和控制。", "dataHash": "fm-doc-id-5f046fe72cca3308"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234379_n14", "label": "空中交通管制的目的", "level": 2, "dataHash": "fm-doc-id-68c53cb04144d757", "description": [{"text": "空中交通管制的目的在于防止无人机与空中飞机、地面障碍物相撞，并有效地利用空域，安全地加速空中交通运输。其内容包括空中交通管制业务、飞行情报和告警业务。", "dataHash": "fm-doc-id-6f767bff5468bb0b"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234379_n15", "label": "空中交通管制的任务", "level": 2, "dataHash": "fm-doc-id-2c8ecd239a86344f", "description": [{"text": "空中交通管制的任务是维护空中秩序，确保飞行安全，防止航空器相撞，防止机场及其附近空域内的航空器与障碍物相撞，从而保障空中交通畅通，保证飞行安全，提高飞行效率。", "dataHash": "fm-doc-id-007c40ca03760042"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234379_n16", "label": "空中交通管制服务主体", "level": 2, "dataHash": "fm-doc-id-feb08ac4fb9de527", "description": [{"text": "空中交通管制服务主体是指具备空中交通管制服务资格并提供空中交通管制服务的单位和人员。", "dataHash": "fm-doc-id-3b01e45d83769add"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234379_n17", "label": "空中交通管制服务单位", "level": 2, "dataHash": "fm-doc-id-2e58a030c3ea283c", "description": [{"text": "空中交通管制服务单位包括机场塔台及空中交通管制室、空中交通服务报告室、进近管制室、区域管制室、民航地区管理局调度室、中国民用航空局空中交通管理局总调度室。", "dataHash": "fm-doc-id-14501920db233b6a"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234379_n18", "label": "空中交通管制服务人员", "level": 2, "dataHash": "fm-doc-id-48655c1bf94479fb", "description": [{"text": "空中交通管制服务人员包括空中交通管制员、空中航行调度员、飞行签派员、航行情报员。", "dataHash": "fm-doc-id-266ba9e0aef282dd"}, {"text": "空中交通管制通常采用程序管制与雷达管制两种方法。无论是程序管制还是雷达管制，都是为了加强对无人机运行的管控，维护空中秩序，确保飞行安全。无人机的空中交通管制必须注重无人机飞行的动态控制。", "dataHash": "fm-doc-id-1a38c4fa5a53412b"}, {"text": "无人机飞行单位、个人应当与空管部门建立有效的沟通协调机制和顺畅的协同通报，对无人机及其飞行活动实施联合管理，促进我国空管改革的深入推进和无人机应用的健康发展。", "dataHash": "fm-doc-id-746f742ac5e3f307"}, {"text": "无人机空中交通运行管制的内容主要包括运行动态掌握、无人机安全间隔服务、无人机运行应急处理、无人机违规运行查处、无人机空中管制保障与协调等。", "dataHash": "fm-doc-id-47677b0ccd605b0d"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}], "edges": [{"source": "7989338958046234379", "target": "7989338958046234379_n1", "type": "父子", "description": "任务2 无人机安全与法规包含无人机法规"}, {"source": "7989338958046234379_n1", "target": "7989338958046234379_n2", "type": "父子", "description": "无人机法规包含独立性"}, {"source": "7989338958046234379_n1", "target": "7989338958046234379_n3", "type": "父子", "description": "无人机法规包含综合性"}, {"source": "7989338958046234379_n1", "target": "7989338958046234379_n4", "type": "父子", "description": "无人机法规包含平时性"}, {"source": "7989338958046234379_n1", "target": "7989338958046234379_n5", "type": "父子", "description": "无人机法规包含国际性"}, {"source": "7989338958046234379", "target": "7989338958046234379_n6", "type": "父子", "description": "任务2 无人机安全与法规包含空域知识"}, {"source": "7989338958046234379_n6", "target": "7989338958046234379_n7", "type": "父子", "description": "空域知识包含管制空域"}, {"source": "7989338958046234379_n6", "target": "7989338958046234379_n8", "type": "父子", "description": "空域知识包含报告空域"}, {"source": "7989338958046234379_n6", "target": "7989338958046234379_n9", "type": "父子", "description": "空域知识包含监视空域"}, {"source": "7989338958046234379_n6", "target": "7989338958046234379_n10", "type": "父子", "description": "空域知识包含目视飞行航线"}, {"source": "7989338958046234379_n6", "target": "7989338958046234379_n11", "type": "父子", "description": "空域知识包含融合空域"}, {"source": "7989338958046234379_n6", "target": "7989338958046234379_n12", "type": "父子", "description": "空域知识包含隔离空域"}, {"source": "7989338958046234379", "target": "7989338958046234379_n13", "type": "父子", "description": "任务2 无人机安全与法规包含空中交通管制"}, {"source": "7989338958046234379_n13", "target": "7989338958046234379_n14", "type": "父子", "description": "空中交通管制包含空中交通管制的目的"}, {"source": "7989338958046234379_n13", "target": "7989338958046234379_n15", "type": "父子", "description": "空中交通管制包含空中交通管制的任务"}, {"source": "7989338958046234379_n13", "target": "7989338958046234379_n16", "type": "父子", "description": "空中交通管制包含空中交通管制服务主体"}, {"source": "7989338958046234379_n13", "target": "7989338958046234379_n17", "type": "父子", "description": "空中交通管制包含空中交通管制服务单位"}, {"source": "7989338958046234379_n13", "target": "7989338958046234379_n18", "type": "父子", "description": "空中交通管制包含空中交通管制服务人员"}]}}, {"lessonId": "7989338958046234380", "meta": {"lessonId": "7989338958046234380"}, "graph": {"nodes": [{"id": "7989338958046234380", "label": "任务3 无人机气象知识", "level": 0, "dataHash": "fm-doc-id-e01626a10678ab5c", "displayCode": "UAS_P1T3", "description": [{"text": "大气飞行环境主要指飞行器在大气层内飞行时所处的环境条件。包围地球的空气层（即大气）是航空器的唯一飞行活动环境，也是导弹和航天器的重要飞行环境。", "dataHash": "fm-doc-id-9fa8afa8dbda04fc"}], "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234380_n1", "label": "大气的基本要素", "level": 1, "dataHash": "fm-doc-id-496f7ad248d8d2f3", "description": [{"text": "表示大气状态的物理量和物理现象通称为气象要素。气温、气压、空气湿度等物理量是气象要素，风、云、降水等现象也是气象要素，它们都能在一定程度上反映当时的大气状况。其中，气温、气压和空气湿度被称为三大气象要素。", "dataHash": "fm-doc-id-2ae8532143e37938"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234380_n2", "label": "气温", "level": 2, "dataHash": "fm-doc-id-b39a8457c2954fa4", "description": [{"text": "气温是表示空气冷热程度的物理量，它实质上是空气分子的平均动能大小的宏观表现。一般情况下，可将空气视为理想气体，这样空气分子的平均动能就是空气内能，因此气温的升高或降低，也就是空气内能的增加或减少。在实际大气中，气温变化的基本方式有非绝热变化和绝热变化两种。对某一地点的气温（又称局地气温）来说，其变化除了与该地点的气块温度的绝热变化和非绝热变化有关外，还与不同气块温度的移动有关。", "dataHash": "fm-doc-id-51268ae2210333bd"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234380_n3", "label": "气压", "level": 2, "dataHash": "fm-doc-id-c495bdb95492b11f", "description": [{"text": "气压即大气压力，是指与大气相接触的面上，空气分子作用在单位面积上的力。这个力是由空气分子对接触面的碰撞引起的，也是空气分子运动所产生的压力。气压的单位是帕（Pa）。在气象学中，人们一般用百帕（hPa），其换算关系有1hPa=100N/m2。", "dataHash": "fm-doc-id-a064ea47c0d275cc"}, {"text": "气压随高度的变化而变化。当大气处于静止状态时，某一高度上的气压值等于其单位水平面积上所承受的上部大气柱的重力。随着高度增加，其上部大气柱越来越短，气柱中空气密度越来越小，气柱重力也就越来越小。", "dataHash": "fm-doc-id-8bc8c8863d58ddeb"}, {"text": "航空领域常用的气压包括以下几类。", "dataHash": "fm-doc-id-d38913851c66c5d8"}, {"text": "本站气压：指气象台气压表直接测得的气压。由于各测站所处的地理位置及海拔不同，本站气压常有较大差异。", "dataHash": "fm-doc-id-727800783d6bd148"}, {"text": "修正海平面气压：指由本站气压推算到同一地点海平面高度上的气压值。运用修正海平面气压便于分析和研究气压的水平分布情况。海拔高于1500m的测站不推算修正海平面气压，因为推算出的修正海平面气压的误差可能过大，失去意义。", "dataHash": "fm-doc-id-a73e0b1e54036e98"}, {"text": "场面气压：指着陆区（跑道入口端）最高点的气压。场面气压也是由本站气压推算出来的。飞机起降时，为了准确掌握其相对跑道的高度，就需要知道场面气压。场面气压也可由机场标高点处的气压代替。", "dataHash": "fm-doc-id-ef0984b9fe5f7f2b"}, {"text": "标准海平面气压：大气处于标准状态下的海平面气压被称为标准海平面气压，其值为1013.25hPa。海平面气压是经常变化的，而标准海平面气压是一个常数。", "dataHash": "fm-doc-id-6fcf888d0c431619"}, {"text": "飞机飞行时，测量其飞行高度多采用无线电高度表和气压式高度表。无线电高度表所测量的是飞机相对于所飞越地区地表的垂直距离。无线电高度表能不断地指示飞机相对于所飞越地表的高度，并对地形的任何变化都很“敏感”。", "dataHash": "fm-doc-id-f262a7bafd6d7532"}, {"text": "气压式高度表是主要的航行仪表，它是一个高度灵敏的空盒气压表，但刻度盘上标出的是高度。另外，有一个辅助刻度盘可显示气压，高度和气压都可通过旋钮调定。气压式高度表的刻度盘是在标准大气条件下按气压随高度的变化规律而确定的，即气压式高度表所测量的是气压，根据标准大气中气压与高度的关系，就可以表示高度。", "dataHash": "fm-doc-id-cfec774785f091f9"}, {"text": "飞行中常用的气压高度有以下几种。", "dataHash": "fm-doc-id-fe7e9f4b362c1cf2"}, {"text": "场面气压高度：它是指飞机相对于起飞或着陆机场跑道的高度。为使气压式高度表指示场面气压高度，飞行员需按场面气压来拨正气压式高度表，将气压式高度表的气压刻度拨正到场面气压值上。", "dataHash": "fm-doc-id-37fc567e0952bf42"}, {"text": "面高度：它是指相对于标准海平面的高度。飞机在航线上飞行时，都要按标准海平面气压调整高度表，其目的是使所有在航线上飞行的飞机都有相同的“零点”高度，并按此保持规定的航线仪表高度飞行，以避免飞机在空中相撞。", "dataHash": "fm-doc-id-55c8d15f7edfaf6f"}, {"text": "修正海平面气压高度：如果按修正海平面气压拨正气压式高度表，则高度表将显示修正海平面气压高度。在飞机着陆时，将高度表指示高度减去机场标高就等于飞机距机场跑道面的高度。", "dataHash": "fm-doc-id-59339a7b14f66019"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234380_n4", "label": "空气湿度", "level": 2, "dataHash": "fm-doc-id-bceaffbed0642489", "description": [{"text": "大气中含有水蒸气，大气中的水蒸气含量是随时间、地点、高度、天气条件而不断变化的。空气湿度就是用来量度空气中的水蒸气含量或者空气潮湿程度的物理量。", "dataHash": "fm-doc-id-f123e2741b84fdb6"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234380_n5", "label": "大气层的划分", "level": 1, "dataHash": "fm-doc-id-d779c96fd462dd48", "description": [{"text": "大气层无明显的上限，它的各种特性在垂直方向上的差异非常明显，如空气随高度增加而趋于稀薄。以大气中温度随高度的分布为主要依据，可将大气层划分为对流层、平流层、中间层、热层和散逸层，如图1.3.1所示。航空器的大气飞行环境是对流层和平流层。大气层对飞行有很大的影响，恶劣的天气条件会危及飞行安全。大气属性（温度、压力、湿度、风向、风速等）对飞机的飞行性能和飞行航迹也会产生不同程度的影响。", "dataHash": "fm-doc-id-79b29f575f203e05"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234380_n6", "label": "对流层", "level": 2, "dataHash": "fm-doc-id-9a993e6a03ca7e0a", "description": [{"text": "对流层下层，又称摩擦层，它的范围自地面到1km～2km的高度，但在各地的实际高度又与地表性质、季节等因素有关。一般说来，其高度在粗糙地表上高于平整地表上，夏季高于冬季（北半球），昼间高于夜间。在对流层下层，气流受地面摩擦作用影响很大，风速通常随高度增加而增大。在复杂的地形和恶劣的天气条件下，常存在剧烈的气流扰动，威胁着飞行安全，突发的下冲气流和强烈的低空风切变常会引发飞机事故。另外，充沛的水蒸气和尘埃往往导致浓雾及其他恶化能见度的现象，对飞机的起飞和着陆构成严重的障碍。为了确保飞行安全，每个机场都规定有各类飞机的起降气象条件。另外，对流层下层中气温的日变化极为明显，昼夜温差可达10℃～40℃。", "dataHash": "fm-doc-id-f514aa6065dcffff"}, {"text": "对流层中层的底界即对流层下层顶，上界高度约为6 km，这一层受地表的影响远小于对流层下层。大气中的云和降水现象大都发生在这一层内。对流层中层的上部的气压通常只有地面的一半，在那里飞行时需要使用氧气。一般轻型运输机、直升机等常在这一层中飞行（图1.3.2）。", "dataHash": "fm-doc-id-7fc2d8a2e0d242a5"}, {"text": "上层范围从6km高度伸展到对流层的顶部，这一层的气温常年都在0℃以下，水蒸气含量很少，各种云都由冰晶或过冷却水滴组成。在中纬度和副热带地区，这一层中常有风速等于或大于30m/s的强风带，即所谓高空急流。飞机在高空急流附近飞行时往往会发生强烈颠簸，使乘客感觉不适，甚至被破坏结构和造成安全威胁。", "dataHash": "fm-doc-id-3f00889381ed3624"}, {"text": "在对流层和平流层之间，还有一个厚度为数百米到2km的过渡层，被称为对流层顶。对流层顶对垂直气流有很大的阻挡作用。上升的水蒸气、尘粒等多聚集其下，那里的能见度往往较低。", "dataHash": "fm-doc-id-e0c6984f10542a80"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234380_n7", "label": "平流层", "level": 2, "dataHash": "fm-doc-id-5df0e8c753a38443", "description": [{"text": "平流层位于对流层之上，位于50km～55km高度处。在平流层内，随着高度的增加，气温最初保持不变或微有上升，到30km高度以上气温升高较快，到了平流层顶气温升至270K～290K。平流层的这种气温分布特征同它受地面影响小和存在大量臭氧（臭氧能直接吸收太阳辐射）有关。平流层过去常被称为同温层，实际上指的是平流层的下部。在平流层中，空气的垂直运动远比对流层弱，水蒸气、尘粒含量也较少，因而气流比较平缓，能见度较高。对于飞行来说，平流层气流平稳、空气阻力小是有利的一面（图1.3.3），但因平流层空气稀薄，飞行器的稳定性和操纵性变差，这又是不利的一面。高性能的现代歼击机和侦察机都能在平流层中飞行（图1.3.4）。随着飞机飞行高度上限的日益增加，火箭、导弹等技术的发展，对平流层的研究日趋重要。", "dataHash": "fm-doc-id-6af29cf7c6d7b935"}, {"text": "1/2", "dataHash": "fm-doc-id-7660fd17e372cf49"}, {"text": "2/2", "dataHash": "fm-doc-id-cab23966b856bdee"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234380_n8", "label": "中间层", "level": 2, "dataHash": "fm-doc-id-c9d1ea1a5ba6d646", "description": [{"text": "中间层从平流层顶伸展到80km～85km高度。这一层的特点是气温随高度增加而降低，空气有相当强烈的垂直运动。在这一层的顶部，气温可低至160K～190K。", "dataHash": "fm-doc-id-dccedb5272317ede"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234380_n9", "label": "热层", "level": 2, "dataHash": "fm-doc-id-48f56d40752c8a43", "description": [{"text": "热层又称为暖层或电离层，范围从中间层顶伸展到约800 km高度。这一层的空气密度很小，声波也难以传播。热层的一个特征是气温随高度增加而上升，另一个特征是空气处于高度电离状态。热层的变化会影响飞行器的无线电通信（图1.3.5、图1.3.6）。", "dataHash": "fm-doc-id-fe7c482763ec0b35"}, {"text": "1/2", "dataHash": "fm-doc-id-7660fd17e372cf49"}, {"text": "2/2", "dataHash": "fm-doc-id-cab23966b856bdee"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234380_n10", "label": "散逸层", "level": 2, "dataHash": "fm-doc-id-9f08e06a48769cb0", "description": [{"text": "散逸层又称逃逸层、外大气层，是地球大气的最外层，位于热层之上。散逸层的空气极其稀薄，同时又远离地面，受地球的引力作用较小，因而大气分子不断地向星际空间逃逸。航天器脱离这一层后便进入太空飞行。", "dataHash": "fm-doc-id-ee8aaa7c5ebc4bb1"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}], "edges": [{"source": "7989338958046234380", "target": "7989338958046234380_n1", "type": "父子", "description": "任务3 无人机气象知识包含大气的基本要素"}, {"source": "7989338958046234380_n1", "target": "7989338958046234380_n2", "type": "父子", "description": "大气的基本要素包含气温"}, {"source": "7989338958046234380_n1", "target": "7989338958046234380_n3", "type": "父子", "description": "大气的基本要素包含气压"}, {"source": "7989338958046234380_n1", "target": "7989338958046234380_n4", "type": "父子", "description": "大气的基本要素包含空气湿度"}, {"source": "7989338958046234380", "target": "7989338958046234380_n5", "type": "父子", "description": "任务3 无人机气象知识包含大气层的划分"}, {"source": "7989338958046234380_n5", "target": "7989338958046234380_n6", "type": "父子", "description": "大气层的划分包含对流层"}, {"source": "7989338958046234380_n5", "target": "7989338958046234380_n7", "type": "父子", "description": "大气层的划分包含平流层"}, {"source": "7989338958046234380_n5", "target": "7989338958046234380_n8", "type": "父子", "description": "大气层的划分包含中间层"}, {"source": "7989338958046234380_n5", "target": "7989338958046234380_n9", "type": "父子", "description": "大气层的划分包含热层"}, {"source": "7989338958046234380_n5", "target": "7989338958046234380_n10", "type": "父子", "description": "大气层的划分包含散逸层"}]}}, {"lessonId": "7989338958046234381", "meta": {"lessonId": "7989338958046234381"}, "graph": {"nodes": [{"id": "7989338958046234381", "label": "任务1 无人机的组装", "level": 0, "dataHash": "fm-doc-id-f5f2d398215c9557", "displayCode": "UAS_P2T1", "projectTitle": "项目二 无人机装调检修", "projectDataHash": "fm-doc-id-d9c60f33cfa2e76b", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234381_n1", "label": "机架的组装", "level": 1, "dataHash": "fm-doc-id-d26b37841f410d2c", "description": [{"text": "机架，指多旋翼无人机的机身，是多旋翼无人机其他结构的安装基础，起承载作用。", "dataHash": "fm-doc-id-e532f2f42af3b3e0"}, {"text": "根据旋翼的轴数，可分为三轴、四轴、六轴、八轴，甚至十八轴等。而根据旋翼数，可分为三旋翼、四旋翼、六旋翼、八旋翼，甚至十八旋翼等（图2.1.1）。一般情况下，轴数和旋翼数是相等的，但也有特殊情况。比如，三轴六旋翼是在三轴每个轴上下各安装一个电机构成六旋翼。", "dataHash": "fm-doc-id-a54077d5b417d402"}, {"text": "轴距是指机架对角线两个电机或者桨叶中心的距离，单位一般为毫米（图2.1.2）。轴距的大小限制了螺旋桨的最大尺寸，从而限定了螺旋桨能产生的最大拉力，也就是直接影响到无人机的载重能力。", "dataHash": "fm-doc-id-34e41c0ab8950102"}, {"text": "机架在组装过程中需注意：\n（1）检查机架零部件是否缺少。\n（2）零部件是否有破损、变形。\n（3）螺丝数量是否足够，螺丝长度是否合适。\n（4）正常使用符合螺丝规格的螺丝刀，防止螺丝滑丝。\n（5）焊接时，注意不能有虚焊，防止在飞行过程中因为抖动而导致接口松动。\n（6）上螺丝时，按照对角线原则拧螺丝，待所有螺丝上完再拧紧。\n（7）同颜色机臂装在同一侧，方便飞行时辨认机头方向。", "dataHash": "fm-doc-id-76343fc562d33d21", "sourceHashes": [{"text": "机架在组装过程中需注意：", "dataHash": "fm-doc-id-76343fc562d33d21"}, {"text": "（1）检查机架零部件是否缺少。", "dataHash": "fm-doc-id-48231a67d437f237"}, {"text": "（2）零部件是否有破损、变形。", "dataHash": "fm-doc-id-3e7f5d17a9397026"}, {"text": "（3）螺丝数量是否足够，螺丝长度是否合适。", "dataHash": "fm-doc-id-e14f4d99984d8493"}, {"text": "（4）正常使用符合螺丝规格的螺丝刀，防止螺丝滑丝。", "dataHash": "fm-doc-id-b26fdf662d037f31"}, {"text": "（5）焊接时，注意不能有虚焊，防止在飞行过程中因为抖动而导致接口松动。", "dataHash": "fm-doc-id-a8489b2a28d17a25"}, {"text": "（6）上螺丝时，按照对角线原则拧螺丝，待所有螺丝上完再拧紧。", "dataHash": "fm-doc-id-9270e368ecd33bbf"}, {"text": "（7）同颜色机臂装在同一侧，方便飞行时辨认机头方向。", "dataHash": "fm-doc-id-27c489fa91409fb7"}]}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234381_n2", "label": "动力系统的组装", "level": 1, "dataHash": "fm-doc-id-4252774c7bceb35b", "description": [{"text": "动力系统一般包括以下几部分：电机、电调、螺旋桨和电池。", "dataHash": "fm-doc-id-a3b4e7e6d9c91996"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆", "tags": "重点"}, {"id": "7989338958046234381_n3", "label": "电机", "level": 2, "dataHash": "fm-doc-id-3a7b9c1234f4bbd9", "description": [{"text": "在无人机组装过程中，一般会选用无刷电机进行组装。无刷电机在电磁结构上与有刷直流电机一样，但其电枢绕组放在定子上，转子上安装永磁铁（图2.1.3、图2.1.4）。电机的电枢绕组一般采用多相形式，经由驱动器接到直流电源上，定子采用电子换向代替有刷电机的电刷和机械换向器，依靠改变输入到无刷电机定子线圈上的电流频率和波形，在绕组线圈周围形成一个绕电机几何轴心旋转的磁场，这个磁场驱动转子上的永磁铁转动，和转子磁极主磁场相互作用产生转矩使电机旋转。", "dataHash": "fm-doc-id-57fd66d0ac25bf94"}, {"text": "1/2", "dataHash": "fm-doc-id-7660fd17e372cf49"}, {"text": "2/2", "dataHash": "fm-doc-id-cab23966b856bdee"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234381_n4", "label": "电调", "level": 2, "dataHash": "fm-doc-id-58879a7ac8053d1d", "description": [{"text": "电子调速器，简称电调，是控制电机转速的调速器，必须与电机相匹配（图2.1.5）。", "dataHash": "fm-doc-id-dddee2ccfb1bddcb"}, {"text": "无人机用电调具有以下作用：\n（1）电调最基本的功能就是通过飞控板给定PWM（pulse-width modulation）信号进行电动机调速。\n（2）电调为遥控接收机上其他通道的舵机供电。\n（3）电调为飞控供电。\n（4）充当换相器的角色，因为无刷电机没有电刷进行换相，所以需要靠电调进行电子换相。\n（5）电调还有一些其他辅助功能，如电池保护、启动保护和刹车等。", "dataHash": "fm-doc-id-f174c88b53d0f6ec", "sourceHashes": [{"text": "无人机用电调具有以下作用：", "dataHash": "fm-doc-id-f174c88b53d0f6ec"}, {"text": "（1）电调最基本的功能就是通过飞控板给定PWM（pulse-width modulation）信号进行电动机调速。", "dataHash": "fm-doc-id-a1f5661362edd38e"}, {"text": "（2）电调为遥控接收机上其他通道的舵机供电。", "dataHash": "fm-doc-id-8fe3fb638c9ff952"}, {"text": "（3）电调为飞控供电。", "dataHash": "fm-doc-id-ba9a4624b0002619"}, {"text": "（4）充当换相器的角色，因为无刷电机没有电刷进行换相，所以需要靠电调进行电子换相。", "dataHash": "fm-doc-id-2c1d51eb0db068e9"}, {"text": "（5）电调还有一些其他辅助功能，如电池保护、启动保护和刹车等。", "dataHash": "fm-doc-id-1c9fd9cc3c416fb6"}]}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234381_n5", "label": "螺旋桨", "level": 2, "dataHash": "fm-doc-id-c5556cfca326487e", "description": [{"text": "螺旋桨的材质一般分为三类：木质、塑料、碳纤维。", "dataHash": "fm-doc-id-fa2f8a3a9e5aa975"}, {"text": "木质螺旋桨一般采用榉木或者桦木等坚硬的材料通过数控机床加工而成（图2.1.6）。木质螺旋桨历史悠久，适用于油动发动机。木质螺旋桨易碰伤、抗雨性能差、受潮热气候容易变形。木质螺旋桨桨叶的制作工艺较为成熟。大尺寸桨叶加工时间较长、重量较重、转动惯量大、调速响应略弱。", "dataHash": "fm-doc-id-20813bbcd65c9e42"}, {"text": "塑料螺旋桨采用塑料注塑而成，原材料成本低，批量化加工，价格低廉，产量大，颜色丰富。塑料螺旋桨桨叶强度差，桨尖容易变形。", "dataHash": "fm-doc-id-6481b5a43c4b6664"}, {"text": "碳纤维螺旋桨，是使用碳纤维制成的（图2.1.7）。碳纤维是一种与人造丝、合成纤维类似的纤维状碳材料。碳纤维的材料由于有优异的硬度，可制成合适的桨形，因此非常适合技巧性飞行。其效率优于木桨，价格比木桨更贵。", "dataHash": "fm-doc-id-7f3585c65fc25528"}, {"text": "一般情况下，在不超负载的情况下，多旋翼无人机可以更换很多不同的螺旋桨，同样可以飞起来，但是飞行效果和续航时间却是大相径庭。螺旋桨选得适合，飞行更稳，航拍效果、续航时间都兼得；选得不好，可能效果就相反。", "dataHash": "fm-doc-id-b93c085eda6f0ee4"}, {"text": "相同的电机，不同的电压值，用的螺旋桨也不一样。每个电机都会有一个推荐的螺旋桨。相对来说，螺旋桨配得过小，不能发挥最大推力；螺旋桨配得过大，电机会过热，会退磁，会造成电机性能永久下降。", "dataHash": "fm-doc-id-7661bb9bc3c2e32f"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234381_n6", "label": "电池", "level": 2, "dataHash": "fm-doc-id-e4cae216728c095f", "description": [{"text": "一般电池的主要参数包括以下内容（图2.1.8）。", "dataHash": "fm-doc-id-a9d31e2cb31aef35"}, {"text": "（1）电压。", "dataHash": "fm-doc-id-16339e7b6101d831"}, {"text": "锂电池组包含两部分：电池和锂电池保护线路。在电池组中是把多个电池串联起来，得到所需要的工作电压。如果所需要的是更高的容量和更大的电流，那就应该把电池并联起来。另外，还有一些电池组，把串联和并联这两种方法结合起来。多旋翼无人机通常用的是锂聚合物电池，单节电压是3.7V，3S1P表示3片锂聚合物电池的串联，电压是11.1V（其中S表示串联，P表示并联）。又如2S2P表示2片锂聚合物电池的串联。两个这样的串联结构并联，总电压是7.4V，电流是单个电池的两倍。", "dataHash": "fm-doc-id-7179f75845ff10b4"}, {"text": "（2）电池容量。", "dataHash": "fm-doc-id-4ed3db2b78ffc2c6"}, {"text": "电池的容量额定值表示其输出电量。电池获取电量越快，持续的时间就越短。很多时候，电池容量单位为mAh，1Ah=1000mAh，因此2.2Ah是2200mAh。", "dataHash": "fm-doc-id-5ab30d3685b06abb"}, {"text": "（3）放电额定值。", "dataHash": "fm-doc-id-0907037a5861fc0a"}, {"text": "“C”表示电池相对于其最大容量可以放电的速率。如果电池以高于放电额定值的速率放电，可能会损坏电池，严重时，可能会造成安全隐患。如果电池的放电额定值为15C，则意味着一次可以从中获取的最大放电电流等于其容量的15倍。以使用容量2200 mAh的电池为例，这意味着可以安全地从中获得的最大放电电流为15×2200mA=33000mA（或33A）。", "dataHash": "fm-doc-id-539e12c37aeb1153"}, {"text": "电池标签上列出的放电等级是根据制造商认为电池组在放电过程中能处理的内容，而不降低电池组的性能。同时，具有较高放电倍率的电池组具有较低的内阻。许多电池提供两种放电额定值，如30C/60C。第一个数字意味着它将持续支持30 C放电，并且对于短脉冲（通常少于15s）它应该支持60C。这允许在油门快速更换期间最高可出现60C，但不应该是经常使用的。如果需要更高的电流水平，请购买更高容量，且更高额定C数的电池组。", "dataHash": "fm-doc-id-9aa6abb32c8bf0d6"}, {"text": "（4）内阻。", "dataHash": "fm-doc-id-102cec4ee8c4e816"}, {"text": "表示电池或电池组的内阻。一些充电器将在充电周期内测试一个电池组内每个电池的内阻。随着内阻增加，电池性能会降低。因此，作为一般规则，电阻越低，电池提供的性能越高。通常，具有高放电容量的电池具有较低的内阻。电池组标签通常是制造商试图将其产品置于最佳状态。如图2.1.9所示，为无人机电池内阻测量仪。", "dataHash": "fm-doc-id-65accc6099546470"}, {"text": "（该电池的内阻为27.2mΩ，电压为3.76V）", "dataHash": "fm-doc-id-1c7c298817dce6c2"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234381_n7", "label": "飞控系统的组装", "level": 1, "dataHash": "fm-doc-id-b9e5c8e59c53e553", "description": [{"text": "飞行控制系统，简称飞控，是无人机的核心部件。一般主要由主控单元、IMU（惯性测量单元）、GPS指南针模块等部件组成。", "dataHash": "fm-doc-id-896d3aef44be2437"}, {"text": "（1）主控单元，是飞行控制系统的核心，通过它将IMU、GPS指南针、舵机和遥控接收机等设备接入飞行控制系统，从而实现飞行器自主飞行功能。", "dataHash": "fm-doc-id-fcfe90646cc37fcc"}, {"text": "（2）IMU（惯性测量单元），包含三轴加速度计、三轴角速度计和气压高度计，是高精度感应飞行器姿态、角度、速度和高度的元器件集合体，在飞行辅助功能中充当极其重要的角色。", "dataHash": "fm-doc-id-6c81963c5293e3df"}, {"text": "（3）GPS指南针模块，包含GPS模块和指南针模块，用于精确确定飞行器的方向及经纬度。对于失控保护自动返航、精准定位悬停等功能的实现至关重要。", "dataHash": "fm-doc-id-e8be3958f57db531"}, {"text": "飞控安装时需注意：\n（1）尽量将飞控安装至飞行器的几何中心位置。\n（2）需注意飞控的安装方向是否和飞行器的头部方向一致。\n（3）插线时，注意负极在上，信号线在下。", "dataHash": "fm-doc-id-bdbf7068409038cb", "sourceHashes": [{"text": "飞控安装时需注意：", "dataHash": "fm-doc-id-bdbf7068409038cb"}, {"text": "（1）尽量将飞控安装至飞行器的几何中心位置。", "dataHash": "fm-doc-id-f6bd01e54ac8c560"}, {"text": "（2）需注意飞控的安装方向是否和飞行器的头部方向一致。", "dataHash": "fm-doc-id-fc2739f84d39c810"}, {"text": "（3）插线时，注意负极在上，信号线在下。", "dataHash": "fm-doc-id-b41c61153d6b0bf8"}]}, {"text": "", "dataHash": "fm-doc-id-1a33dda3c952b9af"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}], "edges": [{"source": "7989338958046234381", "target": "7989338958046234381_n1", "type": "父子", "description": "任务1 无人机的组装包含机架的组装"}, {"source": "7989338958046234381", "target": "7989338958046234381_n2", "type": "父子", "description": "任务1 无人机的组装包含动力系统的组装"}, {"source": "7989338958046234381_n2", "target": "7989338958046234381_n3", "type": "父子", "description": "动力系统的组装包含电机"}, {"source": "7989338958046234381_n2", "target": "7989338958046234381_n4", "type": "父子", "description": "动力系统的组装包含电调"}, {"source": "7989338958046234381_n2", "target": "7989338958046234381_n5", "type": "父子", "description": "动力系统的组装包含螺旋桨"}, {"source": "7989338958046234381_n2", "target": "7989338958046234381_n6", "type": "父子", "description": "动力系统的组装包含电池"}, {"source": "7989338958046234381", "target": "7989338958046234381_n7", "type": "父子", "description": "任务1 无人机的组装包含飞控系统的组装"}]}}, {"lessonId": "7989338958046234382", "meta": {"lessonId": "7989338958046234382"}, "graph": {"nodes": [{"id": "7989338958046234382", "label": "任务2 无人机的调试", "level": 0, "dataHash": "fm-doc-id-089e9192abb8d163", "displayCode": "UAS_P2T2", "description": [{"text": "多旋翼无人机将机架、飞控系统、动力系统和通信系统等硬件组装后，为了实现无人机的良好飞行及功能要求，必须进行合理的调试，调试工作关系着飞行性能及安全。根据调试过程中是否需要安装螺旋桨，可分为无桨调试和有桨调试。", "dataHash": "fm-doc-id-2af08d01690b6525"}], "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234382_n1", "label": "无桨调试", "level": 1, "dataHash": "fm-doc-id-de4475a8ca2b30fa", "description": [{"text": "（1）连接所有线路，接通电源，进行首次通电测试，检查飞控、电调、电机和接收机是否正常通电，检查有没有出现短路或断路现象。", "dataHash": "fm-doc-id-2ea9e6c8828880fb"}, {"text": "（2）检查遥控器，进行对频及相关设置。", "dataHash": "fm-doc-id-c4b409fe4165e9b5"}, {"text": "（3）将飞控连接到电脑，用调试软件（地面站）对飞控进行调试。", "dataHash": "fm-doc-id-ec731b5ce8682c7c"}, {"text": "（4）接通电源，用遥控器解锁飞控，推动油门检查四个电机的转向是否正确。", "dataHash": "fm-doc-id-6a3289c0909f2280"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "重点"}, {"id": "7989338958046234382_n2", "label": "有桨调试", "level": 1, "dataHash": "fm-doc-id-ad5dbc3f7d548b00", "description": [{"text": "（1）安装螺旋桨，根据电机转向正确地安装螺旋桨。", "dataHash": "fm-doc-id-f807f6a93254758b"}, {"text": "（2）将飞行器放在安全防护网内试飞，或通过捆绑的方式限制飞行器。飞行器第一次试飞可能会出现各种意外情况，通过防护网或捆绑可以有效地保护人员和设备安全。", "dataHash": "fm-doc-id-6f29fdbfa37b54fb"}, {"text": "", "dataHash": "fm-doc-id-356caa7d0433f980"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "重点"}, {"id": "7989338958046234382_n3", "label": "调试中常见的概念", "level": 1, "dataHash": "fm-doc-id-0877dd8e57a40aa0", "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234382_n4", "label": "PID", "level": 2, "dataHash": "fm-doc-id-53d7ff93b63735fa", "description": [{"text": "在闭环自动控制技术领域里都是基于反馈的概念以减少不确定性，其反馈的要素包括三个部分：测量、比较和执行。测量的关键是将被控变量的实际值与期望值相比较，用偏差来纠正系统的响应，执行调节控制。在实际工程中，应用最为广泛的调节器控制规律为比例、积分、微分控制，简称PID控制，又称PID调节。其中，P代表比例，I代表积分，D代表微分。", "dataHash": "fm-doc-id-1434f0bb7d52fc67"}, {"text": "不良的PID值的表现：\n（1）动态响应太快或太慢。\n（2）控制过冲或不足。\n（3）抖动、无法顺利起飞和降落、自稳能力弱、坠机等。", "dataHash": "fm-doc-id-1b14fbf25ee9c2ec", "sourceHashes": [{"text": "不良的PID值的表现：", "dataHash": "fm-doc-id-1b14fbf25ee9c2ec"}, {"text": "（1）动态响应太快或太慢。", "dataHash": "fm-doc-id-0582ba6ac52edad5"}, {"text": "（2）控制过冲或不足。", "dataHash": "fm-doc-id-d4a5168ea21afa33"}, {"text": "（3）抖动、无法顺利起飞和降落、自稳能力弱、坠机等。", "dataHash": "fm-doc-id-1faf90901788ffc9"}]}, {"text": "较好的PID值的表现：\n（1）动态响应迅速、及时。\n（2）控制既不过冲也不欠缺。\n（3）无抖动、飞行平稳、自稳能力强、动作迅速有力。", "dataHash": "fm-doc-id-f2b4100584ace775", "sourceHashes": [{"text": "较好的PID值的表现：", "dataHash": "fm-doc-id-f2b4100584ace775"}, {"text": "（1）动态响应迅速、及时。", "dataHash": "fm-doc-id-24909b6e5f660ca7"}, {"text": "（2）控制既不过冲也不欠缺。", "dataHash": "fm-doc-id-9108063978bc4f58"}, {"text": "（3）无抖动、飞行平稳、自稳能力强、动作迅速有力。", "dataHash": "fm-doc-id-ed262c7a2413d765"}]}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234382_n5", "label": "传感器", "level": 2, "dataHash": "fm-doc-id-4a71d8b21e362014", "description": [{"text": "常见的飞控传感器种类主要有陀螺仪、加速度计、磁罗盘、气压计、GPS以及光流模块等。", "dataHash": "fm-doc-id-22178b349055d274"}, {"text": "简单来说，陀螺仪是飞行器进入自动驾驶的第一个环节，让无人机姿态反馈变为现实。", "dataHash": "fm-doc-id-5622ed22a53018d6"}, {"text": "（1）陀螺仪的作用是反馈无人机的角速率状态信息。", "dataHash": "fm-doc-id-bb17aac476c5fc5b"}, {"text": "（2）加速度计的作用是反馈无人机三个轴（x，y，z）上的加速度信息。气压计测量的物理量是大气压值，根据该数值可计算出绝对海拔高度。", "dataHash": "fm-doc-id-d98dfb835835a0ed"}, {"text": "（3）磁罗盘测量的物理量是地球磁场强度沿机体轴的分量，并依此计算出机体的航向角。", "dataHash": "fm-doc-id-28abbe0da6015544"}, {"text": "传感器需要进行校准，包括精校准和粗校准。精校准的效果比较好，但需要昂贵的标定设备；粗校准不需要借助外部设备，只对传感器本身进行操作即可。", "dataHash": "fm-doc-id-65f80960e6638afe"}, {"text": "以磁罗盘的粗校准为例，由于地球上任意位置的地磁场强度在较长时间跨度内都可被视为是恒定的。当转动磁罗盘时，根据相对运动可假设磁罗盘固定不动，而地磁场矢量随之在转动，其矢量端点在空间的轨迹应为一个标准的球体，但由于传感器存在误差，实际测出的数据并不严格都在球体的表面，这时候就需要根据测量出来的数值以及已知的准确值来计算两者之间的换算关系，也就是该磁罗盘的误差模型。在以后使用该磁罗盘时就可以根据粗校准得出的误差模型来处理测量值，使得测量值的误差减小。", "dataHash": "fm-doc-id-592ad31f00aad380"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}], "edges": [{"source": "7989338958046234382", "target": "7989338958046234382_n1", "type": "父子", "description": "任务2 无人机的调试包含无桨调试"}, {"source": "7989338958046234382", "target": "7989338958046234382_n2", "type": "父子", "description": "任务2 无人机的调试包含有桨调试"}, {"source": "7989338958046234382", "target": "7989338958046234382_n3", "type": "父子", "description": "任务2 无人机的调试包含调试中常见的概念"}, {"source": "7989338958046234382_n3", "target": "7989338958046234382_n4", "type": "父子", "description": "调试中常见的概念包含PID"}, {"source": "7989338958046234382_n3", "target": "7989338958046234382_n5", "type": "父子", "description": "调试中常见的概念包含传感器"}]}}, {"lessonId": "7989338958046234383", "meta": {"lessonId": "7989338958046234383"}, "graph": {"nodes": [{"id": "7989338958046234383", "label": "任务3 无人机的检修与维护", "level": 0, "dataHash": "fm-doc-id-562b01e2e5404dc1", "displayCode": "UAS_P2T3", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234383_n1", "label": "无人机零部件的修理和更换", "level": 1, "dataHash": "fm-doc-id-f1e78c0df7f7195a", "description": [{"text": "修理和更换分为重要和次要两个级别。重要的修理和更换应该由局方评级的认证修理站、持有检查授权的局方认证人员，或者在局方的代表批准后执行。", "dataHash": "fm-doc-id-32410764cdcefb36"}, {"text": "常见的一些无人机部件需要修理和更换的情况如下。", "dataHash": "fm-doc-id-cba872b117e6c837"}, {"text": "（1）电池。", "dataHash": "fm-doc-id-750fa05aa47be4ce"}, {"text": "一般电池的正常使用寿命是很长的，但是一旦电池坏了，就需直接更换新的。", "dataHash": "fm-doc-id-1047b53088c17452"}, {"text": "（2）螺旋桨。", "dataHash": "fm-doc-id-ee0bf9387cef5bc9"}, {"text": "螺旋桨由于其本身材质的特性，损坏较快。桨叶一旦出现裂痕、缺口等会直接影响飞行的稳定性，所以需要直接更换新的桨叶。", "dataHash": "fm-doc-id-6d5677f2eba64875"}, {"text": "（3）电机。", "dataHash": "fm-doc-id-191f9f20f9d9accb"}, {"text": "除了螺旋桨外，对飞行稳定性影响最大的就是电机了。如果无人机在悬停时出现无故侧倾或无法顺利降落，则有可能是电机出了问题。可先尝试重新校正机身后再起飞。若仍然出现问题，则一定要及时送厂检修，避免出现电机停转，导致无人机失控甚至坠毁。", "dataHash": "fm-doc-id-6a94ec3d3b360fbe"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234383_n2", "label": "无人机机身保养", "level": 1, "dataHash": "fm-doc-id-2f968993d1b8eb70", "description": [{"text": "目前大多数无人机机身采用碳纤维材料，在保护无人机内部电路不被外界环境腐蚀的同时，一般设有散热孔。但小的孔隙也容易让机身受到腐蚀。", "dataHash": "fm-doc-id-c7d9a6612aa472fc"}, {"text": "机身检查保养技巧：\n（1）检查机身螺丝是否出现松动，机臂是否出现裂痕、破损。\n（2）检查减震球是否老化（减震球外层变硬或者开裂）。\n（3）检查GPS上方以及每个起落架的天线位置是否贴有影响信号的物体（如带导电介质的贴纸等）。\n（4）尽量避免在沙土或者碎石等有小颗粒存在的环境下起飞。\n（5）避免在雨雪天或者雾气较大的天气使用无人机。", "dataHash": "fm-doc-id-ef03b74cb022e20b", "sourceHashes": [{"text": "机身检查保养技巧：", "dataHash": "fm-doc-id-ef03b74cb022e20b"}, {"text": "（1）检查机身螺丝是否出现松动，机臂是否出现裂痕、破损。", "dataHash": "fm-doc-id-fc5901ef54c22f64"}, {"text": "（2）检查减震球是否老化（减震球外层变硬或者开裂）。", "dataHash": "fm-doc-id-b1d86ee0bf37b794"}, {"text": "（3）检查GPS上方以及每个起落架的天线位置是否贴有影响信号的物体（如带导电介质的贴纸等）。", "dataHash": "fm-doc-id-816b292868e92378"}, {"text": "（4）尽量避免在沙土或者碎石等有小颗粒存在的环境下起飞。", "dataHash": "fm-doc-id-9fe8278fd0f594d7"}, {"text": "（5）避免在雨雪天或者雾气较大的天气使用无人机。", "dataHash": "fm-doc-id-28db51059008168a"}]}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234383_n3", "label": "电机检查保养", "level": 1, "dataHash": "fm-doc-id-58a1c5b907f59d77", "description": [{"text": "（1）清擦电机。及时清除电机机座外部的灰尘、淤泥。如使用环境灰尘较多，最好每次飞行之后清理一次。", "dataHash": "fm-doc-id-c0e9319a8cc314b1"}, {"text": "（2）检查和清擦电机接线处，检查接线盒接线螺丝是否松动、烧伤。", "dataHash": "fm-doc-id-c3d6f4fa7a3f430c"}, {"text": "（3）检查各固定部分螺丝，将松动的螺母拧紧。", "dataHash": "fm-doc-id-c99461097e6c6a95"}, {"text": "（4）检查电机转动是否正常。用手转动转轴检查是否灵活，有无不正常的摩擦、卡阻、窜轴和异常响声，同时检查电机的各部件是否完备。", "dataHash": "fm-doc-id-22963ff523bb3fb5"}, {"text": "（5）如通电之后，某个电机不转或者转速很低，或有异常响声，应立即断电。若通电时间较长，极有可能烧毁电机，甚至损坏控制电路。", "dataHash": "fm-doc-id-ba877c657de9503a"}, {"text": "无人机飞行前需要确认电机与螺旋桨是否已经固定，飞行后及时检查并清理电机是否存在杂物。", "dataHash": "fm-doc-id-3bf80a9801bdd4bd"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234383_n4", "label": "电池的使用及维护注意事项", "level": 1, "dataHash": "fm-doc-id-07c39133b3c485e2", "description": [{"text": "（1）正确使用可以延长锂聚合物电池的使用寿命。有些用户根据传统电池的使用经验，在新电池开始使用后充满电再放光电，以为这种方法能激活电池的最大潜力。还有些用户将新电池长期放置不用，以为电池的寿命不会受到影响。对锂聚合物电池，这两种都是非常错误的使用习惯。深度放电对锂聚合物电池的寿命会产生严重伤害，一块锂聚合物电池只要深度放电两次寿命就终结了。在长期存放电池时定期充电，在日常使用电池时避免电池电量完全放光，可以有效地延长电池的寿命。", "dataHash": "fm-doc-id-15036654a8ef2397"}, {"text": "（2）每次使用完电池必须等待完全冷却后才能重新充电，避免电池自身处在高温状态或在高温环境下充电。", "dataHash": "fm-doc-id-ee1cecab9fd4b8b7"}, {"text": "（3）长时间存放而不使用的电池，应保持电池总电量的70%。当处于未被使用的状态时，电池会有一个自动放电的过程。如果放电电压低于2.4V，会严重损坏电池，导致电池不能再使用。因此建议每隔三周检查电池或重新为电池充一次电。多功能电池检测仪可以正确地显示电池的状态。", "dataHash": "fm-doc-id-d0bb2c68f11b337d"}, {"text": "（4）正确设置充电电流，用过大的电流充电会影响电池的寿命，而且也不能完全充满。", "dataHash": "fm-doc-id-41539c6caf63c867"}, {"text": "（5）电池只适合在室温下保存和使用。电池的温度在4℃以下时，电池的放电性能会下降；电池的温度在-10℃以下时，电池的放电性能会严重下降，甚至会完全不放电，所以应尽量避免将电池长时间放置在低温环境下。如果电池的温度较低，如冬天在室外的汽车中过夜，在使用前应将电池放在温暖环境中，慢慢加温到20℃～40℃后再使用。如果多旋翼无人机在低温环境下飞行作业，应做好电池的保暖工作，如将电池放置在有暖气的汽车内或工作人员的怀里，在使用前的最后一刻再取出装在无人机上，一旦装上就要尽早起飞，让电池开始工作。电池放电过程中会产生热量，可以避免电池温度过低。但即使做好电池使用前的保温工作，-10℃以下的低温环境仍然会让电池的放电性能严重下降，在使用中需要特别注意。", "dataHash": "fm-doc-id-3678589b992b941a"}, {"text": "（6）避免在4℃以下的低温环境里对电池进行充电，太低的温度下电池有时会充不上电。但不必担心，这只是暂时状态，一旦环境温度升起来，电池中的分子受热，就可以恢复到以前的蓄电能力。", "dataHash": "fm-doc-id-4dbc5138a7181fd6"}, {"text": "（7）电池在35℃以上的高温环境中工作，电池的电量也会减少，电池的供电时间不会像往常那样长。如果在这样的高温环境下对电池进行充电，对电池的损伤将更大。长期在高温环境中存放电池，也会不可避免地影响电池的质量。夏天在室外进行飞行作业时，一定要避免电池在阳光下暴晒。尽量保持在适宜的操作温度是延长电池寿命的好方法。", "dataHash": "fm-doc-id-ed6f4d70cad4e472"}, {"text": "（8）要想发挥电池的最大效能，就需要经常使用它，让电池内的电子始终处于流动状态。如果不经常使用，请一定记得每月给电池大幅度充放电一次。", "dataHash": "fm-doc-id-a731f87c581571e9"}, {"text": "（9）不要把电池放在有硬币或钥匙的口袋中，也不要放在雨后或结露的潮湿草地上，因为这些情况下有可能发生短路。", "dataHash": "fm-doc-id-a69ec207782a3435"}, {"text": "（10）飞行时如果地面站电压告警，必须马上降落。即使只是暂时的电压告警，接着马上电压显示正常，也必须降落。", "dataHash": "fm-doc-id-8e5bf7c015f411b5"}, {"text": "（11）降落后要及时把电池取出。", "dataHash": "fm-doc-id-c7a264e05280e733"}, {"text": "（12）起飞前换入充满电的电池，避免与部分放电的电池弄混。", "dataHash": "fm-doc-id-e029c5ab426e20ce"}, {"text": "（13）很多坠机和粗暴降落都是由于使用了未完全充满电的电池引起的。", "dataHash": "fm-doc-id-06530c61d49c7ccf"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "重点"}, {"id": "7989338958046234383_n5", "label": "无人机螺旋桨保养", "level": 1, "dataHash": "fm-doc-id-837b06bc514b0ad7", "description": [{"text": "在正常使用中，很少有无人机坠地直接导致桨叶折断，但因视觉误差或操纵不当导致的撞毁却时有发生，这些因素使得螺旋桨也是高耗材之一。", "dataHash": "fm-doc-id-03886f6a14d94799"}, {"text": "螺旋桨检查保养技巧：\n（1）检查螺旋桨是否出现裂痕、缺口等直接影响飞行稳定性的问题。如果损伤严重，最好直接更换新的螺旋桨。\n（2）注意起飞前螺旋桨是否按顺序固定好。", "dataHash": "fm-doc-id-12e94ee45e000618", "sourceHashes": [{"text": "螺旋桨检查保养技巧：", "dataHash": "fm-doc-id-12e94ee45e000618"}, {"text": "（1）检查螺旋桨是否出现裂痕、缺口等直接影响飞行稳定性的问题。如果损伤严重，最好直接更换新的螺旋桨。", "dataHash": "fm-doc-id-6a7f98dadde70431"}, {"text": "（2）注意起飞前螺旋桨是否按顺序固定好。", "dataHash": "fm-doc-id-3502480525b0ce34"}]}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234383_n6", "label": "无人机遥控器保养", "level": 1, "dataHash": "fm-doc-id-1a0a9e781911144a", "description": [{"text": "无人机遥控器一般包括开关键、遥控天线、摇杆等基础装置。想要无人机在空中展现各种姿态，除了操作员需要拥有丰富经验之外，还需要对遥控器进行保养，使其随时保持着“最佳工作状态”。", "dataHash": "fm-doc-id-1c72aed7f9eebe52"}, {"text": "遥控器检查保养技巧：\n（1）不要在潮湿、高温的环境下使用或放置遥控器。\n（2）避免让遥控器受到强烈的震动或从高处跌落，以免影响内部构件的精度。\n（3）注意检查遥控器天线是否有损伤、遥控器的挂带是否牢固以及与无人机连接是否正常。\n（4）在使用或者存放过程中，尽量不要“弹杆”。", "dataHash": "fm-doc-id-e4967283cc6da2f1", "sourceHashes": [{"text": "遥控器检查保养技巧：", "dataHash": "fm-doc-id-e4967283cc6da2f1"}, {"text": "（1）不要在潮湿、高温的环境下使用或放置遥控器。", "dataHash": "fm-doc-id-7987660eff9f27c1"}, {"text": "（2）避免让遥控器受到强烈的震动或从高处跌落，以免影响内部构件的精度。", "dataHash": "fm-doc-id-dbc6a95438e8eee8"}, {"text": "（3）注意检查遥控器天线是否有损伤、遥控器的挂带是否牢固以及与无人机连接是否正常。", "dataHash": "fm-doc-id-b5c8e94a198617bc"}, {"text": "（4）在使用或者存放过程中，尽量不要“弹杆”。", "dataHash": "fm-doc-id-2cad8dc247e887f5"}]}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234383_n7", "label": "无人机常用修理工具", "level": 1, "dataHash": "fm-doc-id-e399ec35edf084bf", "description": [{"text": "无人机在飞行或降落过程中都有可能发生小故障。无人机是一种精密器械，任何部件的微小变动都会影响其飞行状态和使用寿命。因此，在处理无人机故障时务必要小心谨慎，在出门之前也要备足工具。", "dataHash": "fm-doc-id-6136d78caf359ace"}, {"text": "（1）工具箱：工具箱能够装下所有需要的工具，方便携带，而且能够快速进行现场维修。", "dataHash": "fm-doc-id-3b0e4c74fa0ab2c8"}, {"text": "（2）烙铁：随身携带烙铁是区分专业人员与业余爱好者的重要标准之一。一旦无人机的线路或电子元件出现重大故障，烙铁就能派上用场。但是，一定要有使用烙铁的经验，保证焊接到位，以防出现安全事故（图2.3.1）。", "dataHash": "fm-doc-id-8a7d99345397de8f"}, {"text": "（3）备用电池：这要根据无人机的具体情况而定。如果有可更换电池，一定要充满电，作为备用。", "dataHash": "fm-doc-id-818513211acfc647"}, {"text": "（4）螺丝刀：用来拧螺丝的工具，按不同的头型可以分为一字、十字、米字、星型、方头、六角头和Y型头部等，其中一字螺丝刀、十字螺丝刀、内六角螺丝刀，是无人机维修过程中最常用的（图2.3.2）。", "dataHash": "fm-doc-id-9b569c9a0d831f38"}, {"text": "（5）万用表：万用表的主要功能是测交直流电压、电阻和直流电流等（图2.3.3）。功能多的万用表还可测交流电流、电容、三极管放大倍数和频率等。在无人机组装与调试、维修过程中经常需要测量电池电压、飞控电源输入电压、电调电压、摄像头电压、图传电压、线路通断等。", "dataHash": "fm-doc-id-734c327e229fee9d"}, {"text": "1/2", "dataHash": "fm-doc-id-7660fd17e372cf49"}, {"text": "2/2", "dataHash": "fm-doc-id-cab23966b856bdee"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}], "edges": [{"source": "7989338958046234383", "target": "7989338958046234383_n1", "type": "父子", "description": "任务3 无人机的检修与维护包含无人机零部件的修理和更换"}, {"source": "7989338958046234383", "target": "7989338958046234383_n2", "type": "父子", "description": "任务3 无人机的检修与维护包含无人机机身保养"}, {"source": "7989338958046234383", "target": "7989338958046234383_n3", "type": "父子", "description": "任务3 无人机的检修与维护包含电机检查保养"}, {"source": "7989338958046234383", "target": "7989338958046234383_n4", "type": "父子", "description": "任务3 无人机的检修与维护包含电池的使用及维护注意事项"}, {"source": "7989338958046234383", "target": "7989338958046234383_n5", "type": "父子", "description": "任务3 无人机的检修与维护包含无人机螺旋桨保养"}, {"source": "7989338958046234383", "target": "7989338958046234383_n6", "type": "父子", "description": "任务3 无人机的检修与维护包含无人机遥控器保养"}, {"source": "7989338958046234383", "target": "7989338958046234383_n7", "type": "父子", "description": "任务3 无人机的检修与维护包含无人机常用修理工具"}]}}, {"lessonId": "7989338958046234384", "meta": {"lessonId": "7989338958046234384"}, "graph": {"nodes": [{"id": "7989338958046234384", "label": "任务1 学习无人机航拍技巧", "level": 0, "dataHash": "fm-doc-id-5a7037d10d406e75", "displayCode": "UAS_P3T1", "projectTitle": "项目三 无人机影视航拍", "projectDataHash": "fm-doc-id-08eaed38e32d9f54", "description": [{"text": "无人机拍摄镜头的运动方式分为静态镜头和动态镜头，两种运动方式都力求最大限度地保持画面的稳定与平衡。所谓静态镜头，就是无人机固定在一个位置进行拍摄，通常无人机上的摄像设备使用云台来固定。动态镜头是指因无人机的运动或镜头焦距的改变而引起的影像具有动感的镜头。无人机拍摄的动态镜头大致有“推、拉、摇、移、跟”五种基本运动方式。", "dataHash": "fm-doc-id-1e9d7407e99f837b"}], "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234384_n1", "label": "静态镜头", "level": 1, "dataHash": "fm-doc-id-d9b0f897d84e6d5a", "description": [{"text": "拍摄静态镜头是利用以往摄像经验去拍摄一些静态镜头。我们不能因为自己可以灵活地运动镜头而去随意地动。这时我们可以用悬停的镜头捕捉到一些精美的画面和动作。", "dataHash": "fm-doc-id-6fa9af5e70f2dfd7"}, {"text": "在拍摄静态镜头时，我们可以分为无人机悬停拍摄的图片镜头和无人机不动画面内容在动的视频镜头。", "dataHash": "fm-doc-id-228aa80e8c21ab6f"}, {"text": "在拍摄静态（图片）镜头时，我们不需要考虑图片的大小，它远比拍摄视频时要小得多。拍摄模式，可以采用单次或者连续拍摄模式。连续拍摄模式可以很快地连续进行手动拍摄，可以在一秒内拍摄出10多张静态图。静态（图片）镜头是一种广角图片，它的构图优点为：一是画面内容丰富；二是视觉冲击力很强，极具观赏性。无人机拍摄模式中，有四种全景模式（图3.1.1），如球形、180°、广角、竖拍等。", "dataHash": "fm-doc-id-c76ad7bf4f4ce993"}, {"text": "在拍摄静态（视频）镜头时，要做好准备工作，选好拍摄点，让拍摄物有一个入画、行进、出画的过程，或者拍摄物正好处在变化当中，让镜头能展示被拍摄物的全貌或者被拍摄物变化（运动）的全貌。", "dataHash": "fm-doc-id-0f7fa2a624220ed7"}, {"text": "当然，在拍摄静态（视频）镜头时，要注意提前规划好构图，一般来说可以用三分线构图。顾名思义，三分线构图就是将画面布局三等分，其中纵向三分线构图是将主体或辅体放在画面中的左侧位置，从而突出主体。如果单条的垂直线置于画面的中央，则为竖中央线构图，可以让构图更加美观，视觉冲击力更强。", "dataHash": "fm-doc-id-504d2946f57e5692"}, {"text": "水平线构图是以一条水平线来进行构图，给人辽阔、平静的感觉。这种构图需要前期寻找好的拍摄地点进行拍摄，对摄像师的画面感有比较高的要求，这种构图适合航拍风光大片。", "dataHash": "fm-doc-id-995764e0893720d1"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "重点"}, {"id": "7989338958046234384_n2", "label": "动态镜头（初级）", "level": 1, "dataHash": "fm-doc-id-e956630ab09b1074", "description": [{"text": "动态镜头是使用无人机航拍时最常使用的镜头。拍摄时，无人机处于运动状态。动态镜头的运动方式有很多种。以下将从摄像的几种常用方式讲起，再介绍航拍特有的镜头的运动方式。动态镜头使用的关键是缓慢流畅地移动镜头。", "dataHash": "fm-doc-id-ec88597baeb1344a"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "重点"}, {"id": "7989338958046234384_n3", "label": "推摄", "level": 2, "dataHash": "fm-doc-id-a5cce8efde55ebea", "description": [{"text": "推摄是无人机向被拍摄对象的方向推进，或变动镜头焦距，使画面框架由远而近向被拍摄对象不断接近的拍摄方法。推镜头会使画框所包含的空间范围缩小，在画面框架中由大景别切换到小景别，被拍摄对象的主要部分在画幅中所占比例逐步升高，而次要部分逐渐减少。在实践中，我们发现多数无人机机载相机的镜头为定焦镜头，镜头本身无法实现推拉。推拉定焦头靠无人机的前进和后退来实现。但这种靠位移实现的推拉，与镜头的推拉不一样。当推镜头即镜头焦距越来越长时，背景会被压缩。所谓压缩，就是背景与前面的物体看起来越来越近；反之，镜头变广，会让背景与物体看起来越来越远。有些酒店拍摄宣传照正是使用的广角镜头，才使得房间显得比实际大很多。通过数码变焦的方法来实现推镜头。通过镜头推拉实现的光学变焦是真的变焦；而数码变焦是通过将传感器上的每个像素面积增大，实现变焦效果。使用数码变焦，“拉近”画面，会降低画质、增加噪点。", "dataHash": "fm-doc-id-b6535169cd615644"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234384_n4", "label": "拉摄", "level": 2, "dataHash": "fm-doc-id-175742fd748f52fd", "description": [{"text": "拉摄即无人机上的摄像设备逐渐远离被拍摄对象，或变动镜头焦距（从长焦调至广角），使画面框架由近至远与主体拉开距离的拍摄方法，与推镜头的运动方向相反。先强调主体的重要内容，再通过拉开距离，展现主体全貌，甚至表现主体与背景的关系。拉镜头是摄像机逐渐远离被拍摄对象，使画面框架由近至远与主体拉开距离的拍摄方法。它的作用是先强调主体，再通过镜头的后拉，从而建立主体和环境的关系。这也是一种由人到景，把注意力从人物身上转向环境的基本手段。同样，航拍拉镜头也通常表现为无人机由近及远飞离被摄主体，使用拉镜头拍摄时应当注意以下问题。", "dataHash": "fm-doc-id-f536c79bb3a37bc6"}, {"text": "（1）镜头的运动方向与推镜头正相反，推镜头要以落幅为重点，拉镜头应以起幅为核心。无论是推镜头落幅，还是拉镜头起幅，最好都采用中景或近景。", "dataHash": "fm-doc-id-599d1059b7df50e5"}, {"text": "（2）拉镜头的落幅范围是无限扩大的，可以把一个镜头从人物特写一直拉到几百米高空，因此需要考虑到更大场景的镜头美感，从而给观众带来感官上的巨大冲击。", "dataHash": "fm-doc-id-93c5b9fe3292b48b"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234384_n5", "label": "摇摄", "level": 2, "dataHash": "fm-doc-id-2c35aaa1f5ff74b2", "description": [{"text": "摇摄就是无人机机身不动，镜头水平旋转或者垂直旋转（图3.1.2）。如果广角镜头无法把整个画面完全拍摄下来，那么就应该使用摇摄的拍摄方式。", "dataHash": "fm-doc-id-c301c998afdb64c2"}, {"text": "（1）水平摇摄：左右摇动镜头，可以很好地拍摄宽广的全景，或者是左右移动的目标，一般适用于表现浩大的群众场面或壮阔的自然美景。例如，电影中拍摄警车追逐嫌犯的车辆，为体现速度与激情，需要水平摇动镜头。拍摄这样的动态车辆，首先要规划好车辆行驶的路线以及摇摄的起始点。无人机则可通过拨动控制杆实现摇镜头。我们可以缓慢摇动镜头扫过，以展示和介绍更多场景。", "dataHash": "fm-doc-id-a0b79c1ee6e8b121"}, {"text": "（2）垂直摇摄：俯仰镜头，主要展现的是高大建筑的雄伟和悬崖峭壁的险峻。例如，可以追踪跳水运动员。以运动员预备动作为起幅，运动员从起跳到入水，镜头随运动员下落的动作，逐步下移。纵向的建筑物是垂直摇摄的最好目标。站在一座高楼前，先用平摄的方法拍摄景物的底座，再从下往上慢慢移动镜头直至高楼的顶端，显得建筑雄伟壮观。大多数无人机的遥控器都有俯仰拨轮，可以实现远程操控摇动。使用操控云台实摄一座高楼时，我们自然会使用俯仰镜头。其实，当我们用摇镜头时，划过画面就是在拍摄全景。俯仰镜头也是摇镜头的一种，只不过是上下摇动。从视觉心理学角度看，因为物体坠落是垂直运动，这种上下摇动的俯仰镜头给人以一种不安、刺激或危险的感觉，这一点儿不像横向的摇镜头，给人以平静的感觉。", "dataHash": "fm-doc-id-c6334d7583503b42"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234384_n6", "label": "移摄", "level": 2, "dataHash": "fm-doc-id-104888767e0b02dc", "description": [{"text": "移摄是将摄像机架在活动物体上，沿水平面作各个方向的移动拍摄（图3.1.3）。简单来说，就是在录像的同时，将无人机前后平移或左右平移进行拍摄。平移航拍镜头类似于画轴式的场面、场景展示，这种无人机航拍镜头主要用来表现大面积、长距离的拍摄主体。沿着轨道移动，我们可以得到流畅的镜头运动。但在无人机航拍实践中，我们没有物理轨道，只能利用控制手柄，这需要操作员熟练的航拍技巧，从而使得用移镜头拍摄出来的镜头富有临场感，但特别需要注意以下两个方面。", "dataHash": "fm-doc-id-97e4fca33570ef0c"}, {"text": "（1）尽可能保持画面的平稳，专业级的增稳云台均能达到稳定图像的要求，而操作员仅需实时修正所拍摄的目标，保持整个画面的平稳。", "dataHash": "fm-doc-id-99c7fed9a6aca1bb"}, {"text": "（2）尽可能发挥无人机拍摄灵活、多视点、多角度的优势，如穿越桥洞、门洞、飞越山峰、高楼等，均是极好的应用场景，尽量在表现大场面、大纵深、多景物、多层次的复杂场景时，营造出气势恢宏的造型效果。", "dataHash": "fm-doc-id-c22efbb4db3c1604"}, {"text": "移镜头可为影像增加视觉效果。视觉方向与飞行方向不同，这考验着我们的方向感和摇杆操作。镜头变焦和移镜头产生的效果相似，但拍出的画面真实感远不如后者。运用无人机航拍平移镜头拍摄火车、路桥、河流等景物，能非常准确地展现被拍摄对象的形象和特征。", "dataHash": "fm-doc-id-5bd0ce51061217af"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234384_n7", "label": "跟摄", "level": 2, "dataHash": "fm-doc-id-ecf34b84c3724b04", "description": [{"text": "跟摄是无人机始终跟随运动中的目标进行移动拍摄，以达到连贯流畅的视觉效果。在无人机航拍实践中，跟镜头的操作方式与移镜头类似，只是要求更加严格、控制更加复杂。跟拍可以拍摄主体的后面、前面、侧面，这种无人机航拍手法多用于运动、旅行、探索类节目的航拍。此类拍摄通常是由固定翼飞行器无法完成的，需要使用多轴旋翼式飞行器。需要注意的是：跟上、追准被摄对象是跟镜头拍摄的基本要求。在跟拍镜头中，距离被拍摄对象更近，无人机的飞行路线更加复杂，需要提前计算好被摄物体的大致运动方向，以便于计划飞行线路。跟镜头是通过机位运动完成的一种拍摄方式，镜头运动起来后所带来的一系列拍摄上的问题，如焦点的变化、拍摄角度的变化、光线入射角的变化，也是跟镜头拍摄时应考虑和注意的问题。因为无人机跟拍系统有自动锁定拍摄主体的功能，所以拍摄时可以异常灵活地占据操作员无法到达的点位，在高度和角度允许的情况下自由飞行，轻而易举地保持跟镜头的流畅性和连续性。", "dataHash": "fm-doc-id-1a6dfcc25cdee9b9"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234384_n8", "label": "动态镜头（进阶）", "level": 1, "dataHash": "fm-doc-id-567e6810e4ac2799", "description": [{"text": "此外，无人机航拍还有更为进阶的航拍技巧，如展现拍摄、环绕拍摄、穿行拍摄等。我们只要借助云台，就能使这些飞行动作获得流畅稳定的画面。", "dataHash": "fm-doc-id-cb90965d0eb6b45a"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "重点;难点"}, {"id": "7989338958046234384_n9", "label": "展现拍摄", "level": 2, "dataHash": "fm-doc-id-42f85f7a50f80f47", "description": [{"text": "展现拍摄具有一定的揭示性，可以作为电影开始的定场画面出现（图3.1.4）。首先揭示性镜头从一个小画面开始，然后随着镜头的移动向前逐渐展现。这是一部影片开始或展示某些大的被拍摄对象时非常不错的方法，可以揭示出意料之外的场景，如瀑布、高山。我们可以从树木或山丘这样的遮挡物开始拍起，也可以从一个物体的特写拍起，随着无人机的移动，视野逐渐开阔，揭示出物体的所在场景，就像在观众面前慢慢展现一份礼物。另一种展现拍摄，通过滑动并倾斜无人机来实现。", "dataHash": "fm-doc-id-83f4fc6810cedab3"}, {"text": "例如，我们操控无人机向前飞行，镜头首先向下拍摄，然后，继续向目标场景飞行并缓慢抬起镜头，最后使整个场景尽收眼底。我们可将展现拍摄分为两类：前向展现，操作无人机向前飞行，保持稳定，无人机慢慢向上倾斜，展现出被拍摄对象的全貌；反向展现，操作无人机向后飞行，同时向下倾斜摄像机，从而展现出被拍摄对象。此外，在用无人机拍摄时，要观察好周围环境，计划好拍摄路线，确定好从哪里开始，从哪里结束，以及镜头的倾斜角度等。拍摄时要有耐心，保持画面流畅。", "dataHash": "fm-doc-id-6db58ec86f623c29"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234384_n10", "label": "环绕拍摄", "level": 2, "dataHash": "fm-doc-id-1dec52e40d73b464", "description": [{"text": "环绕拍摄是指无人机围绕一个兴趣点按弧线、扇形、整圆等路径进行飞行拍摄。无人机拍摄时的环绕镜头易于凸显和强调被拍摄对象。我们操控无人机从左侧或右侧进行侧飞，同时进行相反方向的偏航控制，从而形成一个圆形的飞行轨迹，并保持无人机的镜头对准被拍摄对象形成一个圆形的飞行轨迹，同时保证无人机的镜头对准目标点。比如，环绕拍摄某一地标性建筑或者主人公时，镜头角度持续环绕移动，而画面背景也会相应地旋转更替，使得这种环绕拍摄的效果的感官刺激性强，动感十足。", "dataHash": "fm-doc-id-6e616b17f16450f1"}, {"text": "当然，我们推荐用手动操作来完成环绕拍摄，这样不仅自由度高，而且也不困难。对准拍摄景物，调整好无人机的高度、与景物的距离。环绕拍摄的步骤：操控摇杆控制速度，另一边控制旋转和方向。这需要一定的练习才能协调操作。半环绕拍摄比环绕拍摄简单很多。它的动态比较主动，有扫掠的感觉即可。以上两种方式都能以出人意料的方式展现拍摄对象，表现史诗般的大场面转换。", "dataHash": "fm-doc-id-2d57a0729f59041a"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234384_n11", "label": "穿行拍摄", "level": 2, "dataHash": "fm-doc-id-fcf8c0ef867aa539", "description": [{"text": "顾名思义，穿行拍摄就是无人机从场景中穿过并拍摄（图3.1.5）。这是一种有趣但稍有难度的拍摄方法。穿行拍摄时，飞行要平稳缓慢，若想加点速，建议在后期处理时提速。大多数情况下，镜头的方向是正向前或向后。因此，如果飞行过快，可能会在镜头中出现螺旋桨的影子。", "dataHash": "fm-doc-id-c13f9d3788329e15"}, {"text": "穿行拍摄是一项很有技术性的操作。熟练的操作员也一定要在拍摄前，确定能精确控制无人机悬停，保障穿行的位置的准确性。除此之外，要计划好飞行路线：从哪里飞入，哪里拍摄，哪里飞出。对于经验丰富的操作员，可以尝试穿越树林，沿着屋顶线飞行，甚至从大的孔洞中穿过。这样可以拍摄到更多精彩的镜头，为视频添彩。穿行拍摄会带给观众一种身临其境的真实感，领略无人机穿行其中的真实场景。", "dataHash": "fm-doc-id-8c4e02fa8c19ca27"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "难点"}, {"id": "7989338958046234384_n12", "label": "追逐拍摄", "level": 2, "dataHash": "fm-doc-id-f73b9ac941d565ff", "description": [{"text": "追逐拍摄从静止开始，追逐被拍摄对象一起移动，与其保持相对固定的较近距离。追逐拍摄一般被用于拍摄《动物世界》中猛兽捕食猎物的场景，或者是汽车广告。我们在拍摄前与被拍摄对象保持一定的距离，可以在被拍摄对象的前、后、左、右、上等方向使用航拍器追摄。如此，就有足够距离进行加速和角度切换，一直随着动作的进行而拍摄，拍摄难度也不小，但画面效果令人兴奋。若速度要更快一些，经常是在后期编辑视频时加快速度，其往往被用作近距离特写拍摄，增强画面的动感。因此在拍摄时，时间的把握显得尤为重要。追逐拍摄的难点是与被拍摄对象保持相同的运动速度，特别是无人机与被摄对象距离较近的时候，容易产生追尾或者甩尾的问题。因此，当你还没有熟练掌握无人机操控时，请勿使用这种方法。在有条件的情况下需要提前演练，但滑雪、冲浪等体育运动就难以演练。所以追逐拍摄相当考验敏捷的反应和自如的操控。紧跟被拍摄对象的同时，要随时调整拍摄角度与距离，将被拍摄对象框在画面中心。如果你还不放心的话，可以使用大画幅来拍摄，追摄时镜头稍微靠后一点。如此一来，后期制作时可以确保被拍摄对象处于画面中间，镜头运动变化也会显得轻柔自然。", "dataHash": "fm-doc-id-cd0b0c72b3dda768"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234384_n13", "label": "鸟瞰拍摄", "level": 2, "dataHash": "fm-doc-id-41dad039c55cec5e", "description": [{"text": "鸟瞰拍摄是无人机拍摄的经典角度，也是航拍影像创意方式中极具视觉冲击力的一种技巧，即将摄像机的镜头垂直对着地面拍摄，就像卫星地图那样（图3.1.6）。这种“上帝视角”与追逐拍摄、环绕拍摄等其他几种拍摄方式都不同，效果更加震撼，视角也更加独特。从高空垂直向下进行拍摄，这时我们的无人机摄像机的镜头就像一台扫描仪，平稳地移动镜头实现俯拍全景，以此清楚地交代环境和风景。例如，俯瞰社区的环境，从空中跟踪监控车辆等。还有一种不错的拍摄方式是，使用鸟瞰视角，渐渐飞高与被拍摄对象拉开一定的距离，揭示出被拍摄对象所在环境的宽广和规模，可谓“不畏浮云遮望眼，自缘身在最高层”，美景尽收眼底。", "dataHash": "fm-doc-id-77139d59564efc89"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}], "edges": [{"source": "7989338958046234384", "target": "7989338958046234384_n1", "type": "父子", "description": "任务1 学习无人机航拍技巧包含静态镜头"}, {"source": "7989338958046234384", "target": "7989338958046234384_n2", "type": "父子", "description": "任务1 学习无人机航拍技巧包含动态镜头（初级）"}, {"source": "7989338958046234384_n2", "target": "7989338958046234384_n3", "type": "父子", "description": "动态镜头（初级）包含推摄"}, {"source": "7989338958046234384_n2", "target": "7989338958046234384_n4", "type": "父子", "description": "动态镜头（初级）包含拉摄"}, {"source": "7989338958046234384_n2", "target": "7989338958046234384_n5", "type": "父子", "description": "动态镜头（初级）包含摇摄"}, {"source": "7989338958046234384_n2", "target": "7989338958046234384_n6", "type": "父子", "description": "动态镜头（初级）包含移摄"}, {"source": "7989338958046234384_n2", "target": "7989338958046234384_n7", "type": "父子", "description": "动态镜头（初级）包含跟摄"}, {"source": "7989338958046234384", "target": "7989338958046234384_n8", "type": "父子", "description": "任务1 学习无人机航拍技巧包含动态镜头（进阶）"}, {"source": "7989338958046234384_n8", "target": "7989338958046234384_n9", "type": "父子", "description": "动态镜头（进阶）包含展现拍摄"}, {"source": "7989338958046234384_n8", "target": "7989338958046234384_n10", "type": "父子", "description": "动态镜头（进阶）包含环绕拍摄"}, {"source": "7989338958046234384_n8", "target": "7989338958046234384_n11", "type": "父子", "description": "动态镜头（进阶）包含穿行拍摄"}, {"source": "7989338958046234384_n8", "target": "7989338958046234384_n12", "type": "父子", "description": "动态镜头（进阶）包含追逐拍摄"}, {"source": "7989338958046234384_n8", "target": "7989338958046234384_n13", "type": "父子", "description": "动态镜头（进阶）包含鸟瞰拍摄"}]}}, {"lessonId": "7989338958046234385", "meta": {"lessonId": "7989338958046234385"}, "graph": {"nodes": [{"id": "7989338958046234385", "label": "任务2 无人机航拍后期制作", "level": 0, "dataHash": "fm-doc-id-595a110cf23c5b21", "displayCode": "UAS_P3T2", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234385_n1", "label": "常见的航拍后期软件介绍", "level": 1, "dataHash": "fm-doc-id-efd5f0cd2650020a", "description": [{"text": "影视后期这个行业涉及的软件众多，我们虽然不必将所有软件都学会，但是，对于这些软件都有所了解是非常有必要的。那么，专业的影视后期制作软件都有哪些呢？这里列举了5款影视后期制作软件。", "dataHash": "fm-doc-id-1a8d1868f2d09f31"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234385_n2", "label": "After Effects", "level": 2, "dataHash": "fm-doc-id-1a5defea464c506f", "description": [{"text": "After Effects，其功能丰富强大，能满足用户的多场景需求。", "dataHash": "fm-doc-id-73ba4ec7ca2f59cf"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234385_n3", "label": "Premiere", "level": 2, "dataHash": "fm-doc-id-f8a6e6074c8a729b", "description": [{"text": "Premiere，能为用户提供采集、剪辑、调色等多种功能操作，从而提升用户的创作能力和空间（图3.2.1）。", "dataHash": "fm-doc-id-8b30da3915b52b03"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234385_n4", "label": "Final Cut Pro", "level": 2, "dataHash": "fm-doc-id-01849255afec1f43", "description": [{"text": "Final Cut Pro 是苹果公司于1999年推出的一款专业视频非线性编辑软件。第一代Final Cut Pro在1999年推出。Final Cut Pro新版本包含进行后期制作所需的一切功能。导入并组织媒体、编辑、添加效果、改善音效、颜色分级以及交付——所有操作都可以在该应用程序中完成。", "dataHash": "fm-doc-id-cf3d9d4b13d49cc9"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234385_n5", "label": "Nuke", "level": 2, "dataHash": "fm-doc-id-b1883e498070df56", "description": [{"text": "Nuke是由The Foundry公司开发的一款数码节点式合成软件，能够制作出非常惊艳的视觉效果，被应用于很多电影和商业片的制作中。", "dataHash": "fm-doc-id-c50b1911d2095c24"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234385_n6", "label": "Edius", "level": 2, "dataHash": "fm-doc-id-19ee8e0d4e73143a", "description": [{"text": "Edius是专业的非线性视频编辑软件，为广播和后期制作环境而设计。它支持所有通用的文件格式和4K剪辑，拥有GV资源浏览器和实时视频转码技术。", "dataHash": "fm-doc-id-f1b4e9bad2c5e71a"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234385_n7", "label": "后期制作基本流程", "level": 1, "dataHash": "fm-doc-id-1e97a74601de41cd", "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "重点"}, {"id": "7989338958046234385_n8", "label": "制作前准备工作", "level": 2, "dataHash": "fm-doc-id-58669cd83933f19b", "description": [{"text": "（1）熟悉素材及本期拍摄主题：只有明确了这期拍摄主题，才能更好地完成剪辑的任务。同时对于素材的管理更加方便，知道哪个素材在哪个储存卡里，也会大大节约剪辑时间。", "dataHash": "fm-doc-id-b2c9f0298eff63d8"}, {"text": "（2）准备相关设备：准备后期剪辑所需要的计算机、软件环境、配套设备等，同时对设备进行测试，保证设备、软件能够符合工作要求，且运行流畅稳定。", "dataHash": "fm-doc-id-f4a91a1f4b9b0b68"}, {"text": "（3）与有关人员进行协商：后期剪辑工作应当充分贯彻制片、导演和编剧的多方面要求和意图，所以在剪辑之前应当与相关人员进行充分沟通，并理解视频的目的与意义。", "dataHash": "fm-doc-id-512111e6d2ebbec0"}, {"text": "（4）整理原始素材：视频的原始素材往往繁多庞杂，在正式后期剪辑制作开始前，我们要对素材进行管理，重命名需要剪辑的素材。可将素材按照视频进展的时间整理归纳。", "dataHash": "fm-doc-id-27582fa62a354947"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234385_n9", "label": "视频后期制作工作", "level": 2, "dataHash": "fm-doc-id-cdb793d88f0443c2", "description": [{"text": "（1）初剪（又称粗剪）：这个工作主要是把需要用到的镜头全部剪出来，放在我们的轨道上，然后再从头到尾地看，整个镜头的顺序没什么问题就可以了。", "dataHash": "fm-doc-id-07883e4c4d9be17c"}, {"text": "（2）精剪：对视频进行精细的调整与剪辑。精剪对于短视频的剪辑来说尤其重要，因为每一帧都会影响画面，影响观众观看。", "dataHash": "fm-doc-id-8c30cb3b2dc09ec4"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234385_n10", "label": "后期制作检查工作", "level": 2, "dataHash": "fm-doc-id-c41805baf73f0a2a", "description": [{"text": "（1）检查画面：主要需要查看哪个地方的画面搭配得不合适，是否有重复的片段。查看视频末尾是否有空白出现、视频是否出现丢帧的情况、检查字幕是否有错别字等。", "dataHash": "fm-doc-id-c39650b49b1df590"}, {"text": "（2）检查声音：主要是查看视频的配音或者整个视频的人物对话的主音量是否调整得合适，因为计算机的声音跟手机的声音是不同的，所以我们要从观众的角度出发，看看声音大小是否合适，以免影响观看。", "dataHash": "fm-doc-id-5296e2b6a541d964"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}], "edges": [{"source": "7989338958046234385", "target": "7989338958046234385_n1", "type": "父子", "description": "任务2 无人机航拍后期制作包含常见的航拍后期软件介绍"}, {"source": "7989338958046234385_n1", "target": "7989338958046234385_n2", "type": "父子", "description": "常见的航拍后期软件介绍包含After Effects"}, {"source": "7989338958046234385_n1", "target": "7989338958046234385_n3", "type": "父子", "description": "常见的航拍后期软件介绍包含Premiere"}, {"source": "7989338958046234385_n1", "target": "7989338958046234385_n4", "type": "父子", "description": "常见的航拍后期软件介绍包含Final Cut Pro"}, {"source": "7989338958046234385_n1", "target": "7989338958046234385_n5", "type": "父子", "description": "常见的航拍后期软件介绍包含Nuke"}, {"source": "7989338958046234385_n1", "target": "7989338958046234385_n6", "type": "父子", "description": "常见的航拍后期软件介绍包含Edius"}, {"source": "7989338958046234385", "target": "7989338958046234385_n7", "type": "父子", "description": "任务2 无人机航拍后期制作包含后期制作基本流程"}, {"source": "7989338958046234385_n7", "target": "7989338958046234385_n8", "type": "父子", "description": "后期制作基本流程包含制作前准备工作"}, {"source": "7989338958046234385_n7", "target": "7989338958046234385_n9", "type": "父子", "description": "后期制作基本流程包含视频后期制作工作"}, {"source": "7989338958046234385_n7", "target": "7989338958046234385_n10", "type": "父子", "description": "后期制作基本流程包含后期制作检查工作"}]}}, {"lessonId": "7989338958046234386", "meta": {"lessonId": "7989338958046234386"}, "graph": {"nodes": [{"id": "7989338958046234386", "label": "任务3 无人机影视航拍案例", "level": 0, "dataHash": "fm-doc-id-a6b614d969ad57bc", "displayCode": "UAS_P3T3", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234386_n1", "label": "学校运动会航拍案例", "level": 1, "dataHash": "fm-doc-id-5c38e25607c7dc8e", "description": [{"text": "在拍摄前，我们需要选好操控位置，确保可以观察到飞行拍摄时可能遇到的障碍物，并调整好航拍器的方向，确定拍摄画面范围，完成画面构图。", "dataHash": "fm-doc-id-c2c83853867f1184"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234386_n2", "label": "国旗方阵正向主席台走来", "level": 2, "dataHash": "fm-doc-id-0a82306672adc55b", "description": [{"text": "该场景使用静态镜头拍摄——启动电机，将右左摇杆慢慢向前推动，无人机缓慢上升，上升至20m左右的高度时，将右左摇杆复原，将无人机悬停在半空中，进行拍摄（图3.3.1）。", "dataHash": "fm-doc-id-8bfa5df97c15c58c"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234386_n3", "label": "篮球场上比赛火热进行，边上同学为选手加油打气", "level": 2, "dataHash": "fm-doc-id-2103cb7c40b4760e", "description": [{"text": "该场景使用摇镜头拍摄——与静态镜头一样，将无人机悬停在20m左右的高度，轻轻向右拨动左摇杆，使无人机向右旋转，实现镜头从左到右摇动拍摄（图3.3.2）。", "dataHash": "fm-doc-id-13db7cda34a1fe61"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234386_n4", "label": "跳高赛场上，选手激烈比拼", "level": 2, "dataHash": "fm-doc-id-2c476c9b95baa815", "description": [{"text": "该场景使用俯仰镜头拍摄——将无人机悬停在10m左右的高度，缓慢匀速转动遥控器左上角拨轮，上下摇动镜头，进行拍摄（图3.3.3）。", "dataHash": "fm-doc-id-72577cb2af455062"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234386_n5", "label": "方阵均就位，主席台上人员均就位，运动会马上开始", "level": 2, "dataHash": "fm-doc-id-900065511eaac926", "description": [{"text": "该场景使用推镜头拍摄——将无人机飞升到15m左右的高度，调整遥控器左上角拨轮，保持镜头正对主席台，向前推动右控制杆，控制无人机向前匀速飞行拍摄（图3.3.4）。", "dataHash": "fm-doc-id-f9d7f7c9ecedf9d0"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234386_n6", "label": "开幕式中，各个方阵依次走过", "level": 2, "dataHash": "fm-doc-id-190110ea0b6ab400", "description": [{"text": "该场景使用移动拍摄——将无人机上升到20m左右的高度，调整遥控器左上角拨轮，保持镜头正对主席台，向前推动右控制杆控制无人机向前匀速飞行拍摄（图3.3.5）。", "dataHash": "fm-doc-id-2f70ee6fbdfd958e"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234386_n7", "label": "学校宣传片航拍案例", "level": 1, "dataHash": "fm-doc-id-0563286eb548cb91", "description": [{"text": "用无人机拍摄校园要先整体，再将有特点的校园建筑局部串联起来，形成一条线，由面及里宣传校园文化，通过无人机的展现拍摄、穿行拍摄、环绕拍摄等拍摄技巧，拍摄出非常鲜活的校园风光。", "dataHash": "fm-doc-id-d569c8f7a7cdfa5d"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234386_n8", "label": "拍摄校园气派的校门风光", "level": 2, "dataHash": "fm-doc-id-93f313cf9683972e", "description": [{"text": "将无人机上升到20m左右的高度，调整遥控器左上角拨轮，镜头正对浙江音乐学院，向前推动右摇杆操控无人机向前飞行，保持稳定，同时拨动遥控器左上角拨轮，慢慢将镜头向上倾斜（图3.3.6）。", "dataHash": "fm-doc-id-eb04ed4a04f92767"}, {"text": "图3.3.6　展现拍摄示意图", "dataHash": "fm-doc-id-aaa50420c8af0742"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234386_n9", "label": "模拟进入校园的体验感", "level": 2, "dataHash": "fm-doc-id-7ac4547532392e4c", "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234386_n10", "label": "拍摄校园建筑的雄伟外观", "level": 2, "dataHash": "fm-doc-id-d625a6fc4f7731cc", "description": [{"text": "操控技巧：将无人机上升到10m左右的高度，调整拨轮，使镜头对准前方，向前推动左摇杆，操控无人机匀速上升（图3.3.8）。", "dataHash": "fm-doc-id-3b6dd8ba592474a2"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234386_n11", "label": "拍摄校园建筑的全貌", "level": 2, "dataHash": "fm-doc-id-88deb9ac8bbe71a4", "description": [{"text": "操控技巧：将无人机上升至50m左右的高度，调整遥控器左上角拨轮，使镜头对准中间建筑物，向左前方推动右摇杆，从左侧进行侧飞，同时进行左侧的偏航控制，环绕建筑物飞行，整个过程保持镜头对准圆心（图3.3.9）。", "dataHash": "fm-doc-id-ad391b8bd3f57206"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234386_n12", "label": "拍摄整个校园的全貌", "level": 2, "dataHash": "fm-doc-id-5931dc2dd12c1da7", "description": [{"text": "操控技巧：将无人机上升到50m左右的高度，调整遥控器左上角拨轮，使镜头对准被摄建筑物，向左前方推动右摇杆，控制无人机从建筑物左侧向前飞行，当从旁边穿过建筑物时，调整左摇杆，进行偏航操控，始终保持建筑物处在画面中，向左前方推动左摇杆，使无人机做一个掉头，结束时处于相互飞行的状态，沿着之前的飞行轨迹飞离（图3.3.10）。", "dataHash": "fm-doc-id-86e48983f85d004c"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}], "edges": [{"source": "7989338958046234386", "target": "7989338958046234386_n1", "type": "父子", "description": "任务3 无人机影视航拍案例包含学校运动会航拍案例"}, {"source": "7989338958046234386_n1", "target": "7989338958046234386_n2", "type": "父子", "description": "学校运动会航拍案例包含国旗方阵正向主席台走来"}, {"source": "7989338958046234386_n1", "target": "7989338958046234386_n3", "type": "父子", "description": "学校运动会航拍案例包含篮球场上比赛火热进行，边上同学为选手加油打气"}, {"source": "7989338958046234386_n1", "target": "7989338958046234386_n4", "type": "父子", "description": "学校运动会航拍案例包含跳高赛场上，选手激烈比拼"}, {"source": "7989338958046234386_n1", "target": "7989338958046234386_n5", "type": "父子", "description": "学校运动会航拍案例包含方阵均就位，主席台上人员均就位，运动会马上开始"}, {"source": "7989338958046234386_n1", "target": "7989338958046234386_n6", "type": "父子", "description": "学校运动会航拍案例包含开幕式中，各个方阵依次走过"}, {"source": "7989338958046234386", "target": "7989338958046234386_n7", "type": "父子", "description": "任务3 无人机影视航拍案例包含学校宣传片航拍案例"}, {"source": "7989338958046234386_n7", "target": "7989338958046234386_n8", "type": "父子", "description": "学校宣传片航拍案例包含拍摄校园气派的校门风光"}, {"source": "7989338958046234386_n7", "target": "7989338958046234386_n9", "type": "父子", "description": "学校宣传片航拍案例包含模拟进入校园的体验感"}, {"source": "7989338958046234386_n7", "target": "7989338958046234386_n10", "type": "父子", "description": "学校宣传片航拍案例包含拍摄校园建筑的雄伟外观"}, {"source": "7989338958046234386_n7", "target": "7989338958046234386_n11", "type": "父子", "description": "学校宣传片航拍案例包含拍摄校园建筑的全貌"}, {"source": "7989338958046234386_n7", "target": "7989338958046234386_n12", "type": "父子", "description": "学校宣传片航拍案例包含拍摄整个校园的全貌"}]}}, {"lessonId": "7989338958046234387", "meta": {"lessonId": "7989338958046234387"}, "graph": {"nodes": [{"id": "7989338958046234387", "label": "任务1 植保无人机行业知识", "level": 0, "dataHash": "fm-doc-id-3363714aaa514af5", "displayCode": "UAS_P4T1", "projectTitle": "项目四 无人机农业植保", "projectDataHash": "fm-doc-id-d35dade4a96034b9", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234387_n1", "label": "植保无人机的发展及行业前景介绍", "level": 1, "dataHash": "fm-doc-id-101bc8e366b980fa", "knowledgeCategory": "事实性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234387_n2", "label": "植保无人机的发展历程", "level": 2, "dataHash": "fm-doc-id-0424e97d1873e3b8", "description": [{"text": "从1918年开始，美国将飞机应用到了农业领域。从1987年开始，日本的雅马哈公司推出的植保无人机开始被应用到农业植保领域，开启了植保无人机的发展。早期植保无人机多为单旋翼无人机，现在以多旋翼无人机为主流。", "dataHash": "fm-doc-id-a3492d82e627b4c1"}, {"text": "我国植保无人机发展演变历程为油动单旋翼—电动单旋翼—电动多旋翼。之后无人机机型多样化，载荷量逐渐提升。", "dataHash": "fm-doc-id-e74b54dd0bc509b9"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234387_n3", "label": "植保无人机的现状分析", "level": 2, "dataHash": "fm-doc-id-d669d73f287bfdf3", "description": [{"text": "作为农业大国，我国拥有18亿亩基本农田，每年都有大量的农业植保作业任务。2019年，植保无人机保有量已经突破5.5万架，无人机植保面积也超过8.5亿亩次。根据不完全统计，2021年全国无人机保有量约为10万架。2015年以来，农林植保领域无人机市场规模逐年上升。2019年约达46.6亿元。2020年虽然受疫情等多方面因素影响，但是植保无人机行业再度爆发，不管是无人机数量还是应用市场都实现跨越式发展，市场规模约达67.9亿元。从市场发展趋势看，一些机构预测我国2026年农林植保领域工业无人机市场规模约达250亿元。", "dataHash": "fm-doc-id-b6d00136c94b5abc"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234387_n4", "label": "植保无人机的前景展望", "level": 2, "dataHash": "fm-doc-id-3d43584d3f98e47c", "description": [{"text": "据不完全统计，目前国内拥有超过8000万台人工背负式喷洒器，低功效的背负式喷洒器被高功效、智能化的植保无人机取代。以每台无人机替换50台背负式喷洒器计，中国市场植保无人机需求约160万台。", "dataHash": "fm-doc-id-afc7d9eda9a15f9c"}, {"text": "我国一直致力于加快实施乡村振兴战略、推进农业高质量发展。农业生产数字化、智能化、现代化、规模化、专业化等，也是现代农业所追求的方向。植保无人机的智能化自主作业模式、作业数据的数字化处理、大田作业的统一规模化作业标准，都符合现代农业的发展方向。植保无人机作业应用将成为现代农业的主流应用。", "dataHash": "fm-doc-id-e693e8b341441758"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234387_n5", "label": "植保无人机的分类介绍", "level": 1, "dataHash": "fm-doc-id-0e00ee9107c5dc1e", "knowledgeCategory": "事实性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234387_n6", "label": "按动力分类", "level": 2, "dataHash": "fm-doc-id-fad2c5f921e60b54", "description": [{"text": "（1）电动植保无人机。", "dataHash": "fm-doc-id-f79382ac625e56f1"}, {"text": "电动植保无人机日常维护比较简单，容易掌握，对操作员的操作水平要求不高（图4.1.1）。电池可重复使用，低碳环保，无废气，不会造成农田污染，电池的寿命可达上万小时。", "dataHash": "fm-doc-id-691244c07d8f02d4"}, {"text": "（2）油动植保无人机。", "dataHash": "fm-doc-id-bd01db727e368eac"}, {"text": "油动无人机航时长，作业范围大，燃料易于获取，振动也比较大，控制精准度比较低（图4.1.2）。燃料是采用汽油和机油混合。不完全燃烧的废油会造成农作物污染和空气污染。油动植保无人机的发动机工作长时间运转不易降温，且依赖空气中的氧气，不适用于高海拔的作业环境。", "dataHash": "fm-doc-id-385f461199342cda"}, {"text": "（3）混合动力植保无人机。", "dataHash": "fm-doc-id-d761efdcf3f376d8"}, {"text": "混合动力植保无人机是油电混合动力（图4.1.3）。混合动力植保无人机具备前两者的优点，但同时也承担了前两者的风险。混合动力植保无人机也是很有发展前景的一款无人机产品。", "dataHash": "fm-doc-id-3cfacf6ddf871c89"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234387_n7", "label": "按平台架构分类", "level": 2, "dataHash": "fm-doc-id-ec7ad896e30bc213", "description": [{"text": "（1）固定翼植保无人机。", "dataHash": "fm-doc-id-193afd962b41edcc"}, {"text": "固定翼植保无人机航时长、速度快，飞行效率高，失去动力后有一定的滑翔能力（图4.1.4）。对飞行的起降场地要求较高，需要开阔的场地用于起飞、降落。", "dataHash": "fm-doc-id-22e8b582a2423ee2"}, {"text": "（2）单旋翼植保无人机。", "dataHash": "fm-doc-id-77fd4079c0f052bc"}, {"text": "单旋翼植保无人机的水平移动和升降主要是依靠调整主桨的角度实现的，转向是通过调整尾部的尾桨实现的，旋翼产生风场下压较大（图4.1.5）。其操纵难度稍大，稳定性较低。", "dataHash": "fm-doc-id-2ee62d2c4f7b218a"}, {"text": "（3）多旋翼植保无人机。", "dataHash": "fm-doc-id-f388d12e3ff6756f"}, {"text": "多旋翼植保无人机保留了垂直起降的特点和空中悬停的优势，结构简单、实用性强，作业质量高，效率高，飞行平稳，易操控（图4.1.6）。", "dataHash": "
