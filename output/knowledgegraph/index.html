fm-doc-id-cd24bc9fbf48bfba"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234387_n8", "label": "植保无人机的系统模块知识", "level": 1, "dataHash": "fm-doc-id-14b9cd7a5faf2957", "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234387_n9", "label": "机架平台", "level": 2, "dataHash": "fm-doc-id-d6e0a23a97ab0179", "description": [{"text": "（1）机臂：用来连接机身与动力系统，为动力系统提供基础平台。植保无人机喷洒系统的喷头也多安装在机臂下方。", "dataHash": "fm-doc-id-0d6885f9fcc9b2fc"}, {"text": "（2）机身框架：作为机架的主体结构，用来固定安装无人机各系统固件，安放电池、药箱等。", "dataHash": "fm-doc-id-15dff2232c651bfe"}, {"text": "（3）脚架：支撑机体，在飞机降落时，起到一定的缓冲作用。", "dataHash": "fm-doc-id-5dd7c27b271a87b2"}, {"text": "（4）机壳：保护机身内部模块，防水防尘。", "dataHash": "fm-doc-id-b75c70fe5b14a943"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234387_n10", "label": "动力系统", "level": 2, "dataHash": "fm-doc-id-fc6e54c4899a3737", "description": [{"text": "（1）桨叶：将电机的动能转化为升力或拉力。", "dataHash": "fm-doc-id-f5b0ed9b79604111"}, {"text": "（2）电机：将电能转化为机械动能，带动螺旋桨旋转。", "dataHash": "fm-doc-id-895646e2b45bc5a9"}, {"text": "（3）电调：给电机供电，控制电机转速，驱动电机转动。", "dataHash": "fm-doc-id-17652269c25ad2b7"}, {"text": "（4）电池：为无人机整体运行提供电力能源。现在市面上多用聚合物锂离子智能电池。", "dataHash": "fm-doc-id-e8e14bee4d5cb0a5"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234387_n11", "label": "传感控制系统", "level": 2, "dataHash": "fm-doc-id-05e9bbf0cee6d7d3", "description": [{"text": "（1）飞控系统：无人机的核心设备，相当于无人机的大脑，飞控连接无人机飞行操控元件，保证无人机飞行姿态。", "dataHash": "fm-doc-id-b0484533b8afc2b6"}, {"text": "（2）GPS：通过卫星获得经纬度位置信息。", "dataHash": "fm-doc-id-d99241e179269ead"}, {"text": "（3）RTK天线：通过多颗卫星位置信息，利用差分运算，达到高精度定位。", "dataHash": "fm-doc-id-682403f112315983"}, {"text": "（4）Unicom：通信管理模块，管理定位及通信信息。", "dataHash": "fm-doc-id-162ff80dcdfaa78f"}, {"text": "（5）传感器模块：感知周围环境，采集障碍物与地形情况信息，将信息提供给无人机进行运算、判断。", "dataHash": "fm-doc-id-845d027afe3a2e30"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234387_n12", "label": "喷洒系统", "level": 2, "dataHash": "fm-doc-id-cfd19f42b174155b", "description": [{"text": "（1）药箱：用于装载农药。为喷洒系统提供药液。", "dataHash": "fm-doc-id-88d6e8196faf7f0a"}, {"text": "（2）水泵：用于给药液增压，使药液从药箱中流出。", "dataHash": "fm-doc-id-37a36ce6789e74ad"}, {"text": "（3）管路：连接水泵、喷头、药箱、流量计，输送药液。", "dataHash": "fm-doc-id-20696225946202a9"}, {"text": "（4）流量计：用于精确计算实际药液流量，使作业用药量更精准。", "dataHash": "fm-doc-id-48b49812858035e9"}, {"text": "（5）喷头：药液通过水泵产生的压力经喷头洒出并雾化，最终实现喷洒。", "dataHash": "fm-doc-id-a443d1f435a40880"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}], "edges": [{"source": "7989338958046234387", "target": "7989338958046234387_n1", "type": "父子", "description": "任务1 植保无人机行业知识包含植保无人机的发展及行业前景介绍"}, {"source": "7989338958046234387_n1", "target": "7989338958046234387_n2", "type": "父子", "description": "植保无人机的发展及行业前景介绍包含植保无人机的发展历程"}, {"source": "7989338958046234387_n1", "target": "7989338958046234387_n3", "type": "父子", "description": "植保无人机的发展及行业前景介绍包含植保无人机的现状分析"}, {"source": "7989338958046234387_n1", "target": "7989338958046234387_n4", "type": "父子", "description": "植保无人机的发展及行业前景介绍包含植保无人机的前景展望"}, {"source": "7989338958046234387", "target": "7989338958046234387_n5", "type": "父子", "description": "任务1 植保无人机行业知识包含植保无人机的分类介绍"}, {"source": "7989338958046234387_n5", "target": "7989338958046234387_n6", "type": "父子", "description": "植保无人机的分类介绍包含按动力分类"}, {"source": "7989338958046234387_n5", "target": "7989338958046234387_n7", "type": "父子", "description": "植保无人机的分类介绍包含按平台架构分类"}, {"source": "7989338958046234387", "target": "7989338958046234387_n8", "type": "父子", "description": "任务1 植保无人机行业知识包含植保无人机的系统模块知识"}, {"source": "7989338958046234387_n8", "target": "7989338958046234387_n9", "type": "父子", "description": "植保无人机的系统模块知识包含机架平台"}, {"source": "7989338958046234387_n8", "target": "7989338958046234387_n10", "type": "父子", "description": "植保无人机的系统模块知识包含动力系统"}, {"source": "7989338958046234387_n8", "target": "7989338958046234387_n11", "type": "父子", "description": "植保无人机的系统模块知识包含传感控制系统"}, {"source": "7989338958046234387_n8", "target": "7989338958046234387_n12", "type": "父子", "description": "植保无人机的系统模块知识包含喷洒系统"}]}}, {"lessonId": "7989338958046234388", "meta": {"lessonId": "7989338958046234388"}, "graph": {"nodes": [{"id": "7989338958046234388", "label": "任务2 植保无人机安全作业", "level": 0, "dataHash": "fm-doc-id-15d4b93c61384f8d", "displayCode": "UAS_P4T2", "knowledgeCategory": "元认知", "cognitiveDimension": "理解", "tags": "课程思政"}, {"id": "7989338958046234388_n1", "label": "作业流程", "level": 1, "dataHash": "fm-doc-id-f105484a0a2f3e56", "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "重点"}, {"id": "7989338958046234388_n2", "label": "前期准备阶段", "level": 2, "dataHash": "fm-doc-id-42ac152f15b0cb93", "description": [{"text": "植保无人机作业前期需准备：准备设备、组织人员、确定飞防任务与喷洒药物、测绘地块，还需注意作业时间的天气情况。", "dataHash": "fm-doc-id-2949bfe9dd123e6a"}, {"text": "（1）准备设备：准备好植保无人机，并做前期检查。多组电池充满电，并准备好车载充电设备。准备好运送无人机设备与物品的车辆。", "dataHash": "fm-doc-id-3392a75d7befa83a"}, {"text": "（2）组织人员：飞防作业前，联系并准备好操作员，确定操作员、时间、地点。", "dataHash": "fm-doc-id-e7a6150fea843628"}, {"text": "（3）确定飞防任务与喷洒药物：明确飞防任务内容，做好预防与安全准备。", "dataHash": "fm-doc-id-f7f84c9a0d84269f"}, {"text": "（4）测绘地块：最好提前勘探或测绘好飞防作业地块，观察地形与障碍物，判断作业难度与飞行风险。提前测绘，规避障碍物。", "dataHash": "fm-doc-id-ad4f57aa74bf5914"}, {"text": "（5）天气情况：提前关注作业时间的天气状况，规避大风、雨、雪等不利作业的天气。", "dataHash": "fm-doc-id-cd7c8049321df9f1"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234388_n3", "label": "作业实施阶段", "level": 2, "dataHash": "fm-doc-id-3a070074be5f4545", "description": [{"text": "植保无人机作业实施阶段，多数情况是植保无人机规划航线并设置参数后自主飞行作业。作业期间，操作员应时刻关注无人机电量与药量变化，重复更换电池与添加药液的过程。作业过程中，注意飞行作业安全以及应对突发状况（图4.2.1）。", "dataHash": "fm-doc-id-f7fae4e6f89bb424"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234388_n4", "label": "作业结束阶段", "level": 2, "dataHash": "fm-doc-id-a1c3334d40945ef0", "description": [{"text": "作业结束后，对无人机设备进行检查及清洗。对植保无人机系统进行检查、检查各项物资消耗（农药、电池等），记录当天作业亩数和飞行架次、当日用药量与总作业亩数是否吻合等，在地面站软件上传日志，并为后续作业做好准备。", "dataHash": "fm-doc-id-b2b35a4491627d62"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234388_n5", "label": "作业安全规则", "level": 1, "dataHash": "fm-doc-id-589c82a400dbe042", "description": [{"text": "植保无人机作为一个新兴的空中应用平台，其系统复杂、关联性高、应用环境多变等特点要求操作员必须具备较高的技术水平，在作业过程中时刻牢记“安全第一、预防为主”的方针，使植保作业工作“有序、可靠、高效”开展。", "dataHash": "fm-doc-id-df8ee40b9e02f73d"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点;课程思政"}, {"id": "7989338958046234388_n6", "label": "人员安全规则", "level": 2, "dataHash": "fm-doc-id-f41dd965c73c200f", "description": [{"text": "（1）人员资格要求：植保无人机操作员须持有民航局植保无人机驾驶员电子执照和植保无人机驾驶员培训合格证（图4.2.2）。", "dataHash": "fm-doc-id-bf03b3f56e804aa4"}, {"text": "（2）人员操控能力要求：操作员必须通过专业的理论培训与实际操作训练，掌握并具备植保无人机安装、手动操控、自动飞行以及安全作业和应急处置的综合能力。", "dataHash": "fm-doc-id-afd1a1023e15ec40"}, {"text": "（3）其他要求：对操作员的年龄、身体状况、药品知识掌握情况及施药技能等的要求。", "dataHash": "fm-doc-id-f0288cd6c59d0cf4"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "课程思政"}, {"id": "7989338958046234388_n7", "label": "设备安全规则", "level": 2, "dataHash": "fm-doc-id-62b159b80dce1dc0", "description": [{"text": "（1）设备实名登记：植保无人机在使用前须完成民航系统实名登记（图4.2.3）。", "dataHash": "fm-doc-id-e05a45ca3337f318"}, {"text": "（2）重要性能指标：电池、桨叶、机架系统、通信链路达到飞行时的参数要求。操控设备应具有显示植保无人机的实时位置、高度、速度等信息的仪器仪表。国家对于植保无人机的其他指标规定。", "dataHash": "fm-doc-id-43e52a6a0e507ad8"}, {"text": "（3）设备保险：机身险保障无人机意外事故的维修与换新费用；第三者责任险保障意外原因造成的第三者损失。", "dataHash": "fm-doc-id-78c5f5bff24df370"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234388_n8", "label": "环境安全规则", "level": 2, "dataHash": "fm-doc-id-38235f67d645e73c", "description": [{"text": "（1）地面因素：地形地貌和障碍物，对植保无人机安全飞行有一定的影响。", "dataHash": "fm-doc-id-7de2db3f9d7982c1"}, {"text": "（2）磁罗盘与卫星信号：植保无人机跨区域作业，需要对无人机的磁罗盘进行校准。磁罗盘工作要远离强大磁场区，如大块金属、铁质栅栏、磁铁矿脉、高压电等。GPS卫星信号连接需要开阔的场地，不能受到障碍物与磁场干扰。", "dataHash": "fm-doc-id-111a4779b424cbef"}, {"text": "（3）周边环境：作业区及周边10m范围内应避免有电线杆、树木及建筑物等影响植保无人机作业的障碍物；作业区应远离养殖场、学校、医院及居民生活区，远离水源地、牧草地等其他生态敏感区等。", "dataHash": "fm-doc-id-a4c67e79ddb71080"}, {"text": "（4）天气因素：雾霾、风、温度、湿度及其他恶劣天气都影响着植保无人机作业飞行。雾霾影响作业能见度，能见度越低，安全隐患越大；大风天气影响无人机飞行能力，也影响无人机喷洒施药；温度与湿度影响植保无人机作业效率。", "dataHash": "fm-doc-id-acd6c0fe7bd50d54"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234388_n9", "label": "飞行安全规则", "level": 2, "dataHash": "fm-doc-id-b623114a227ad3b0", "description": [{"text": "（1）禁止飞行原则（五不飞）。", "dataHash": "fm-doc-id-4020646a633054a1"}, {"text": "禁飞区不飞。", "dataHash": "fm-doc-id-df3a1036a23dc333"}, {"text": "无驾驶员合格证者不飞。", "dataHash": "fm-doc-id-8c90ed59c5320f59"}, {"text": "植保无人机设备状态不明不飞。", "dataHash": "fm-doc-id-e800d285f64180a8"}, {"text": "人口稠密区上空不飞。", "dataHash": "fm-doc-id-d41ea5e83c725daf"}, {"text": "操作员精神状态不佳不飞。", "dataHash": "fm-doc-id-047de57b71d6a076"}, {"text": "（2）飞行作业前安全准备（六项准备）。", "dataHash": "fm-doc-id-3e209bdd01f1310e"}, {"text": "时间安排，避免在高温天气下中午连续作业，否则不仅药效不佳，而且容易中暑。", "dataHash": "fm-doc-id-776a8a54d960b7cb"}, {"text": "设备运输，建议使用人机分离的运输车型。", "dataHash": "fm-doc-id-71cbe54dd9c29494"}, {"text": "自身防护，戴好防晒、防药、防虫等护具。", "dataHash": "fm-doc-id-b9fb6c9fc7bdc7e4"}, {"text": "配药防护，利用二次稀释法，戴防具，以避免农药伤害。", "dataHash": "fm-doc-id-e844f6fa07a555c9"}, {"text": "植保无人机及辅助设备检查，做好设备检查，防止起飞后发生意外。", "dataHash": "fm-doc-id-413ab444ffa648c1"}, {"text": "熟悉作业环境，确定作业环境障碍物、水源、配电、是否禁飞等，提高作业效率。", "dataHash": "fm-doc-id-a79c24f97de34888"}, {"text": "（3）飞行操作注意事项。", "dataHash": "fm-doc-id-b85fecf2425ebfd8"}, {"text": "飞行高度要求，禁止超高空飞行（植保无人机飞行高度禁止超过地面30m）。", "dataHash": "fm-doc-id-6f6fbc725a990eea"}, {"text": "飞行距离，作业飞行时，操作员、辅助人员等现场人员与植保无人机始终保持15m以上的安全距离或参照厂家使用说明书规定的安全距离。", "dataHash": "fm-doc-id-f36f22d8d9efc579"}, {"text": "起飞和降落，操作员应选择环境较好的道路起飞和降落。起降地点周围5m范围内应无障碍物。", "dataHash": "fm-doc-id-e5298f55e1ad4cdd"}, {"text": "横风飞行，平坦地带的喷洒飞行应遵循横风喷洒原则。人员应站在上风向处，并且注意下风口是否有人员、作物、财产等易受作业影响的情况。", "dataHash": "fm-doc-id-ab4f3061dc257ab2"}, {"text": "作业地块规划，作业路径应均匀覆盖作业区域，且注意不对周边环境产生药害。", "dataHash": "fm-doc-id-a5e75c6fdef3f618"}, {"text": "植保无人机螺旋桨高速旋转，具有一定的破坏力。操作员应随时与植保无人机保持安全距离，作业完成后等待螺旋桨完全停转之后方可靠近。", "dataHash": "fm-doc-id-b686beba0acbee21"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "课程思政"}, {"id": "7989338958046234388_n10", "label": "作业应急情况处理", "level": 1, "dataHash": "fm-doc-id-2e3ddea1d636ae12", "description": [{"text": "植保无人机作业过程中，时间久了，难免会发生一些紧急突发情况。作业中应有防止机械碰伤、划伤、砸伤的保护，发现异常及时处理，处理不了及时上报。事故发生后，冷静判断处理，人员安全放在第一位，其次保障设备安全以避免较大损失。", "dataHash": "fm-doc-id-f011adcf0c95be88"}, {"text": "工作人员农药中毒处理办法：\n（1）施药人员出现头疼、头昏、恶心、呕吐等症状时，应立即离开施药现场，脱掉污染的衣裤，及时携带农药标签到医院治疗。\n（2）拨打当地疾病预防控制中心或中毒急救中心电话。", "dataHash": "fm-doc-id-453065fd36de3451", "sourceHashes": [{"text": "工作人员农药中毒处理办法：", "dataHash": "fm-doc-id-453065fd36de3451"}, {"text": "（1）施药人员出现头疼、头昏、恶心、呕吐等症状时，应立即离开施药现场，脱掉污染的衣裤，及时携带农药标签到医院治疗。", "dataHash": "fm-doc-id-540d28838d177ad5"}, {"text": "（2）拨打当地疾病预防控制中心或中毒急救中心电话。", "dataHash": "fm-doc-id-a2e946a67cf65758"}]}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "难点"}], "edges": [{"source": "7989338958046234388", "target": "7989338958046234388_n1", "type": "父子", "description": "任务2 植保无人机安全作业包含作业流程"}, {"source": "7989338958046234388_n1", "target": "7989338958046234388_n2", "type": "父子", "description": "作业流程包含前期准备阶段"}, {"source": "7989338958046234388_n1", "target": "7989338958046234388_n3", "type": "父子", "description": "作业流程包含作业实施阶段"}, {"source": "7989338958046234388_n1", "target": "7989338958046234388_n4", "type": "父子", "description": "作业流程包含作业结束阶段"}, {"source": "7989338958046234388", "target": "7989338958046234388_n5", "type": "父子", "description": "任务2 植保无人机安全作业包含作业安全规则"}, {"source": "7989338958046234388_n5", "target": "7989338958046234388_n6", "type": "父子", "description": "作业安全规则包含人员安全规则"}, {"source": "7989338958046234388_n5", "target": "7989338958046234388_n7", "type": "父子", "description": "作业安全规则包含设备安全规则"}, {"source": "7989338958046234388_n5", "target": "7989338958046234388_n8", "type": "父子", "description": "作业安全规则包含环境安全规则"}, {"source": "7989338958046234388_n5", "target": "7989338958046234388_n9", "type": "父子", "description": "作业安全规则包含飞行安全规则"}, {"source": "7989338958046234388", "target": "7989338958046234388_n10", "type": "父子", "description": "任务2 植保无人机安全作业包含作业应急情况处理"}]}}, {"lessonId": "7989338958046234389", "meta": {"lessonId": "7989338958046234389"}, "graph": {"nodes": [{"id": "7989338958046234389", "label": "任务3 了解常见病虫害及农药基础知识", "level": 0, "dataHash": "fm-doc-id-2fb5193a5f703095", "displayCode": "UAS_P4T3", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234389_n1", "label": "常见作物病虫害知识", "level": 1, "dataHash": "fm-doc-id-7c01e0b83736925e", "knowledgeCategory": "事实性", "cognitiveDimension": "记忆", "tags": "重点"}, {"id": "7989338958046234389_n2", "label": "常见水稻病虫害", "level": 2, "dataHash": "fm-doc-id-7924dc489cd8a919", "description": [{"text": "水稻病虫害非常多，有恶苗病、纹枯病、稻瘟病、稻曲病、水稻黑粉病、谷枯病、稻纵卷叶螟、稻飞虱等，以下举例介绍。", "dataHash": "fm-doc-id-f56735b0b7bc0b3d"}, {"text": "（1）水稻病害——稻瘟病（图4.3.1）。稻瘟病在水稻整个生育期都可能产生，危害水稻的各个部位，其中以穗颈瘟、叶瘟最为常见，危害较大。穗颈瘟和枝梗瘟发生在穗颈、穗轴、枝梗上，病斑不规则，呈褐色或灰黑色。穗颈受害早的，形成白穗，颈易折断。枝梗受害早的，则形成花白穗；受害迟的，谷粒不充实，粒重降低。", "dataHash": "fm-doc-id-3f4836b722f571f3"}, {"text": "稻瘟病防治办法：登记防治稻瘟病的药剂有三环唑可湿性粉剂、嘧菌酯、春雷霉素、蜡质芽孢杆菌、多菌灵、福美双、咪鲜胺等。", "dataHash": "fm-doc-id-52e6d12088d8db13"}, {"text": "（2）水稻虫害——水稻螟虫。水稻螟虫是一类钻蛀性害虫的统称，主要包括鳞翅目螟蛾科的二化螟、三化螟，鳞翅目夜蛾科的大螟等，是我国水稻主产区最为常见、危害最烈的一类害虫，俗称“钻心虫”或“蛀心虫”（图4.3.2）。", "dataHash": "fm-doc-id-60ee209b7ab0c2a6"}, {"text": "水稻螟虫防治方法：\n①50%杀螟松乳油、50%巴丹水溶剂、50%甲胺磷乳剂或50%1605乳油，每亩用100mL，加水150kg～200kg泼浇；\n②每亩用40%乐果乳油150mL，50%乐果乳油100mL，加水200kg～300kg泼浇，或每亩用药量减半，兑水50kg喷雾；\n③在蚁螟孵化高峰前1～2天，每亩用50%嘧啶氧磷乳油60mL～80mL，兑水75kg～100kg喷雾；\n④每亩用50%易卫杀可溶性粉剂50g～100g，兑水喷雾；\n⑤每亩用50%速灭松乳油75mL～100mL，兑水喷雾；\n⑥每亩用5%安克力颗粒剂2kg撒施。轻发生，每亩用1.8%阿维菌素50mL或2.0%阿维菌素45mL，兑水15kg～30 kg（视水稻生长情况和虫情酌情增加用水量），间隔15天再喷一次即可；重发生，每亩用1.8%阿维菌素75 mL～100mL或2.0%阿维菌素70mL～100mL单打，间隔10天再喷一次即可。", "dataHash": "fm-doc-id-0a904f6e9234433c", "sourceHashes": [{"text": "水稻螟虫防治方法：", "dataHash": "fm-doc-id-0a904f6e9234433c"}, {"text": "①50%杀螟松乳油、50%巴丹水溶剂、50%甲胺磷乳剂或50%1605乳油，每亩用100mL，加水150kg～200kg泼浇；", "dataHash": "fm-doc-id-4b5f35d0983f050f"}, {"text": "②每亩用40%乐果乳油150mL，50%乐果乳油100mL，加水200kg～300kg泼浇，或每亩用药量减半，兑水50kg喷雾；", "dataHash": "fm-doc-id-4ba4d367f0608a86"}, {"text": "③在蚁螟孵化高峰前1～2天，每亩用50%嘧啶氧磷乳油60mL～80mL，兑水75kg～100kg喷雾；", "dataHash": "fm-doc-id-10d92395f45ee1ae"}, {"text": "④每亩用50%易卫杀可溶性粉剂50g～100g，兑水喷雾；", "dataHash": "fm-doc-id-dec78946eda0f2dd"}, {"text": "⑤每亩用50%速灭松乳油75mL～100mL，兑水喷雾；", "dataHash": "fm-doc-id-19426205eeaeecd0"}, {"text": "⑥每亩用5%安克力颗粒剂2kg撒施。轻发生，每亩用1.8%阿维菌素50mL或2.0%阿维菌素45mL，兑水15kg～30 kg（视水稻生长情况和虫情酌情增加用水量），间隔15天再喷一次即可；重发生，每亩用1.8%阿维菌素75 mL～100mL或2.0%阿维菌素70mL～100mL单打，间隔10天再喷一次即可。", "dataHash": "fm-doc-id-1087a78be10225f3"}]}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234389_n3", "label": "常见小麦病虫害", "level": 2, "dataHash": "fm-doc-id-72a9d5c19ec27d1d", "description": [{"text": "小麦病虫害包括小麦蚜虫、黏虫、吸浆虫、红蜘蛛、小麦白粉病、赤霉病、黑穗病、纹枯病、全蚀病等，以下举例介绍。", "dataHash": "fm-doc-id-3499f9a849eba41d"}, {"text": "（1）小麦病害——赤霉病（图4.3.3）。小麦赤霉病在全国各地均有分布，主要发生在长江中下游冬麦区和东北春麦区。近年来，它又成为江淮和黄淮冬麦区的常发病害。赤霉病在小麦生长的各个阶段都能为害，苗期侵染引起苗腐，中、后期侵染引起秆腐和穗腐，尤以穗腐危害性最大。一般扬花期侵染，灌浆期显症，成熟期成灾。", "dataHash": "fm-doc-id-51fc4daaec0edfa1"}, {"text": "赤霉病防治方法：用25%氰烯菌酯悬浮剂，一般年份在小麦抽穗扬花期使用，每亩100mL，机动弥雾机用水15kg，手动喷雾机用水30 kg～40kg，若遇重发年份，7～10天后补喷一次，预防和治疗效果极佳（对赤霉病发病后有部分治疗作用的药剂）；用50%多菌灵或70%甲基托布津可湿性粉800～1200倍液喷雾，或25%丙环唑乳油10 mL～15mL，隔5～7天防治一次，也可用机动弥雾机喷药。此外，小麦生长的中后期是赤霉病、麦蚜、灰飞虱、黏虫混发期，加入10%吡虫啉可湿性粉剂每亩20g～30g，再加入98%磷酸二氢钾100g～150 g或尿素，既防治了害虫，也预防了干热风。", "dataHash": "fm-doc-id-c15e8e7954ea4243"}, {"text": "（2）小麦虫害——黏虫。黏虫成虫体色呈淡黄色或淡灰褐色，体长17mm～20mm，翅展35mm～45 mm，触角丝状，前翅中央近前缘有两个淡黄色圆斑，外侧环形圆斑较大，后翅正面呈暗褐，反面呈淡褐，缘毛呈白色。雄蛾较小，体色较深，其尾端经挤压后，可伸出1对鳃盖形的抱握器，抱握器顶端具一长刺。雌蛾腹部末端有一尖形的产卵器（图4.3.4）。", "dataHash": "fm-doc-id-7491785b6cf417e6"}, {"text": "早期防治，每亩可选用5%氟虫脲（卡死克）乳油50mL～75mL，或25%灭幼脲悬浮剂30mL～40mL，或20%除虫脲悬浮剂5mL～10 mL，兑水50kg均匀喷雾；后期达标防治时，每亩可选用50%辛硫磷乳油、77.5%敌敌畏乳油、40%毒死蜱（乐斯本）乳油75mL～100mL，或4.5%高效氯氰菊酯乳油50mL+77.5%敌敌畏乳油50 mL，兑水50kg均匀喷雾。", "dataHash": "fm-doc-id-e3deb6b647298adc"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234389_n4", "label": "常见柑橘病虫害", "level": 2, "dataHash": "fm-doc-id-ca47a7b866cacc8d", "description": [{"text": "柑橘病虫害包括潜叶蛾、木虱、红蜘蛛、柑橘凤蝶、星天牛、实蝇、柑橘溃疡病、炭疽病、黄龙病、煤烟病等，以下举例介绍。", "dataHash": "fm-doc-id-87cc567890262885"}, {"text": "（1）柑橘病害——炭疽病（图4.3.5）。柑橘炭疽病可危害叶、枝、花、果实等部位。叶受害可产生叶斑型和叶枯型两种病斑。花发病后呈褐色，腐烂，易落花。果实受害出现黄褐色凹陷的病斑，呈圆形或近圆形。", "dataHash": "fm-doc-id-bf84031f807995ca"}, {"text": "柑橘炭疽病防治方法：在增强树势的前提下，喷药保护，于各次梢抽梢期、幼果期定期喷药。一般在5～6月幼果期和9月发病盛期，每隔15天喷药一次，连续2～3次。药剂可选用哈茨木霉菌叶部型300倍+10%多抗霉素可湿性粉剂1000倍，或喷施12%松脂酸铜乳油800倍。", "dataHash": "fm-doc-id-0c46436d6cd75c04"}, {"text": "（2）柑橘虫害——红蜘蛛。柑橘红蜘蛛又名柑橘全爪螨。成螨、若螨和幼螨刺吸叶片、嫩梢及果实表皮，但以叶片受害最重。被害叶面呈现失绿白斑点，严重时全叶灰白，失去光泽，造成大量落叶，影响树势和产量。它是柑橘常发性、暴发性的头号害虫（图4.3.6）。", "dataHash": "fm-doc-id-61896dacc00e5922"}, {"text": "柑橘红蜘蛛防治：拜沃95%矿物油200倍+0.3%印楝素600～800倍。保护和利用田间食螨瓢虫捕食。", "dataHash": "fm-doc-id-af495902164edc6b"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234389_n5", "label": "常见苹果病虫害", "level": 2, "dataHash": "fm-doc-id-9b547f4f27c93f06", "description": [{"text": "苹果病虫害包括轮纹病、褐斑病、黑星病、花叶病、苹果树干腐病、苹果绵蚜、红蜘蛛、盲蝽蟓、小卷叶蛾、金纹细蛾等，以下举例介绍。", "dataHash": "fm-doc-id-bc756b2e3e366ecd"}, {"text": "（1）苹果病害——褐斑病。主要危害叶片，也侵染果实。叶片染病，树冠下部和内膛最先发病。发病初期，叶片出现黑褐色小疱疹或针芒状暗褐色病斑。后期，病叶变黄脱落。因苹果树品种和发病期不同，病斑一般有同心轮纹型、针芒型、混合型（图4.3.7）。", "dataHash": "fm-doc-id-d453eb793dd45524"}, {"text": "苹果褐斑病防治：药剂用波尔多液、多抗霉素、丙森锌、代森锰锌、腐霉利、多菌灵等。", "dataHash": "fm-doc-id-0fb69668c83d5f73"}, {"text": "（2）苹果虫害——苹果绵蚜。苹果绵蚜别名赤蚜、血色蚜、白毛虫，主要侵害苹果树的伤疤、缝隙及根部等处，吸取大量养分，影响果树生长发育和花芽分化，缩短树龄，减低产量。虫体被大量白色绵状物包裹，农药难以黏着，防治困难（图4.3.8）。", "dataHash": "fm-doc-id-e5a572ef88073837"}, {"text": "苹果绵蚜防治：地下防治，利用雨后或果园灌水后，全园地面喷洒一次40%毒死蜱乳油400～600倍液，并浅耕4 cm～5 cm。树上防治，可喷洒40%毒死蜱微乳剂1000～1500倍液，或25%吡虫啉2000倍液+45%毒死蜱1000倍液等。", "dataHash": "fm-doc-id-f20ab5b7fd901a79"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234389_n6", "label": "农药基础知识", "level": 1, "dataHash": "fm-doc-id-75689e7ed18b36ee", "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234389_n7", "label": "认识农药", "level": 2, "dataHash": "fm-doc-id-63251940417b03d6", "description": [{"text": "农药是用于预防、消灭或者控制危害农业、林业的病、虫、草和其他有害生物以及有目的地调节植物、昆虫生长的化学合成物质，或者来源于生物、其他天然物质的一种物质或者几种物质的混合物及其制剂。", "dataHash": "fm-doc-id-e2b218131230ac1a"}, {"text": "（1）农药的分类：农药品种很多，按照防治对象可以分为杀虫剂、除草剂、杀菌剂等（图4.3.9）。", "dataHash": "fm-doc-id-fdaed2c90db6271d"}, {"text": "（2）农药标签的认识：农药标签包含农药三证号、作物、防治对象、制剂用药量、使用方法、注意事项、厂家及电话、中毒急救、紧急救助电话、毒性标识和颜色条带等信息（图4.3.10）。", "dataHash": "fm-doc-id-535020a31b3c5a39"}, {"text": "（3）包装底部不同颜色条带的含义：红色代表杀虫剂，绿色代表除草剂，黑色代表杀菌剂，黄色代表植物生长调节剂，无颜色的代表肥料（图4.3.11）。", "dataHash": "fm-doc-id-4032ce081141c5ef"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234389_n8", "label": "农药剂型", "level": 2, "dataHash": "fm-doc-id-457397ee6f6bc830", "description": [{"text": "农药剂型分为粉剂、可湿性粉剂、粒剂、乳油、悬浮剂、胶体剂、水剂、气雾剂、油剂、烟剂、油悬浮剂、微囊悬浮-悬浮制剂、超低容量液剂、可分散油悬浮剂、水分散粒剂等。", "dataHash": "fm-doc-id-7d78438bd9a89cc7"}, {"text": "粉剂：不需要加水，工效高，在高山或饮水困难的地区使用较好。在叶面上附着性差。飞机喷洒时应二次配制成“母粉”，随其他材料如肥料等一起施用。", "dataHash": "fm-doc-id-b7657cdaaaeb0a28"}, {"text": "可湿性粉剂：药效比同一种农药的粉剂好，便于包装、运输。容易吸湿结块，所以储存环境需要干燥。", "dataHash": "fm-doc-id-2db42fec73b6da98"}, {"text": "乳油：入水后可分散成乳状液的油状均相液体农药剂型。", "dataHash": "fm-doc-id-d7cc585f3bc74e07"}, {"text": "悬浮剂：固体原药分散、悬浮在含有多种助剂的水相介质中，形成能流动的高浓度黏稠剂型。", "dataHash": "fm-doc-id-5840f7ff10544e15"}, {"text": "油悬浮剂：载体油通常作为增效剂使用，使得油悬浮剂具有了更好的喷雾持留性、扩散性和叶面吸收性。", "dataHash": "fm-doc-id-5b97e96423fbe9cd"}, {"text": "微囊悬浮-悬浮剂：农药产品中，有“微囊悬浮剂”，也有“微囊悬浮-悬浮剂”，两者并非同一种剂型。微囊悬浮-悬浮剂一般是复配剂，一种成分为微囊化，另一种成分为悬浮剂，两者混合到一起稳定后即形成“微囊悬浮-悬浮剂”。微囊悬浮剂一般指单剂或复配成分全部微囊化后形成的制剂。", "dataHash": "fm-doc-id-ddce2f5cf7cf383d"}, {"text": "超低容量液剂：超低容量液剂同油剂，但为高含量的农药原药加入少量溶剂组成，有的还加入少量助溶剂、稳定剂等，有效成分浓度可高达80%以上。", "dataHash": "fm-doc-id-7bc2e590ad539425"}, {"text": "可分散油悬浮剂：指用一类经过试验可作为增效助剂且不污染作物的油类作为稀释载体的一种剂型。油类包括植物油（及其衍生物）或矿物油等。", "dataHash": "fm-doc-id-da4f00a08f4f371c"}, {"text": "水分散粒剂：又称干流动剂、水悬性颗粒剂。入水后，自动崩解，分散成悬浮液。", "dataHash": "fm-doc-id-7d6bfeadf56a29d9"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234389_n9", "label": "安全科学使用农药", "level": 2, "dataHash": "fm-doc-id-6cfad0b23cbc8b40", "description": [{"text": "（1）安全使用农药的五个黄金守则。", "dataHash": "fm-doc-id-ff0051b7ab5825aa"}, {"text": "时刻小心谨慎：使用农药时要小心谨慎，远离儿童和周围的人；不进食、喝水、抽烟，正确处置农药的运转和使用过程中产生的废弃物；避免高温时间施药，有效避暑，且防止药液蒸腾中毒。", "dataHash": "fm-doc-id-ffe3940d6666b5db"}, {"text": "阅读并正确理解农药标签：农药标签包含产品特性、风险和使用方法等重要的信息；包含紧急事故正确的处理方法；要理解标签上象形图的含义。", "dataHash": "fm-doc-id-bf70356ba3e945b2"}, {"text": "注意个人卫生：眼睛和皮肤溅到药液后，应立即用清水冲洗；喷药作业后，应彻底清洗身体与衣物，防护服应同其他衣服分开清洗。", "dataHash": "fm-doc-id-e7b56c69c877edf2"}, {"text": "施药器械及时维护：定期保养喷洒设备及其他配药设备；每次喷药后的管路残留可能影响下次作业，并导致出现药害、堵塞、腐蚀管路等情况；作业完成后，倒入清水，清洗喷洒系统装载装置，校准喷洒系统。", "dataHash": "fm-doc-id-782d36b4f2b5afd3"}, {"text": "佩戴防护设备：穿戴防护服设备，如眼罩、口罩、面罩等；注意防晒；配药时戴手套或面罩；依照标签建议，特殊情况应佩戴帽子、面罩、防护眼镜和防水围裙。", "dataHash": "fm-doc-id-30c82fff9987c594"}, {"text": "（2）科学合理地使用农药。", "dataHash": "fm-doc-id-359d8cb1e1545533"}, {"text": "根据病虫害特点选择恰当时间用药。选择合适时间进行施药。例如，对一些食叶性的害虫，可以在其密度明显上升，尚未造成危害之前，开始喷施，这样可取得比较明显的杀虫植保效果。", "dataHash": "fm-doc-id-af5fd733ee22f6c6"}, {"text": "针对需要防治的对象，对症（病、虫、草）下药。根据不同的防治作物对象与植物问题特点来选择具体的防治所需用药。例如，菊酯类的农药能防治很多害虫，但对螨类害虫效果不明显。", "dataHash": "fm-doc-id-4941bb28aea01746"}, {"text": "掌握农药的使用方法和用量，合理运用。根据病虫害发生规律，选用适当方法如撒毒土、拌种、喷雾等。采用正确的方法可以充分发挥农药的防治效果，而且能避免或减少杀伤有益生物。", "dataHash": "fm-doc-id-3f8746eebb121a2d"}, {"text": "科学合理地复配药剂和混用农药。科学合理复配和混合使用农药，可以提高防治效果，扩大防治范围，延缓病、虫、草害产生抗药性，降低防治成本。农药是化工药剂，错误的混用可能导致农药相互反应，降低药效。", "dataHash": "fm-doc-id-88c4c9b67e937ab2"}, {"text": "定期更换使用农药。同一个地方长期连续使用单一品种的农药，很容易使当地有害生物产生抗药性，需要定期更换农药。", "dataHash": "fm-doc-id-9d623f89cda5b94a"}, {"text": "正确掌握农药的药效作用时间与安全间隔期。各种药剂因其药用效果不同，分解、消失的速度不同，以及作物的生长趋势和季节等不同，具有不同的安全间隔期。", "dataHash": "fm-doc-id-7af84564486a224f"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "课程思政"}, {"id": "7989338958046234389_n10", "label": "无人机施药前准备", "level": 2, "dataHash": "fm-doc-id-0aeb2c4ee8a2b1d7", "description": [{"text": "（1）作业前的基本田间病虫情调查。", "dataHash": "fm-doc-id-2ca949436c7b2630"}, {"text": "作业前对病虫情的了解是对整体作业效果的负责，是用药记录的一部分。经济作物每次打药都应该附带用药记录。可以从以下维度参考评价田间情况：", "dataHash": "fm-doc-id-db0702fc1eae5f78"}, {"text": "询问农户：上次施药时间、用药基本情况、田间病虫情况、长势基本情况等。", "dataHash": "fm-doc-id-52c5858c548e2507"}, {"text": "询问零售商：近期该地区病虫压力、最近的药方是否管用、农药的销售情况。", "dataHash": "fm-doc-id-06e8a1ff642e8f4a"}, {"text": "根据自身能力观察田间表现、学习专业病虫知识、掌握主动施药方法。", "dataHash": "fm-doc-id-e1ef1cf6c0b368bf"}, {"text": "（2）病虫害严重情况下的处理意见。", "dataHash": "fm-doc-id-833ec2a36e688315"}, {"text": "评估病虫害情况：仔细观察并记录病虫害的种类、严重程度以及分布情况。", "dataHash": "fm-doc-id-0f08e6beae09a9b8"}, {"text": "咨询专家：分析病虫害情况，迅速咨询当地农业技术专家或植保部门，了解针对当前病虫害的最佳防治方法和推荐使用的农药种类。", "dataHash": "fm-doc-id-dc76c7cd951b611a"}, {"text": "选择适当的农药：根据病虫害的评估结果和专家的建议，选择适合的农药进行防治。注意选择对目标病虫害有效且对作物安全的农药，并遵循农药的使用说明和安全操作规程。", "dataHash": "fm-doc-id-5f567c4561067974"}, {"text": "（3）无人机作业安全注意事项。", "dataHash": "fm-doc-id-f832e58dd0f2f728"}, {"text": "注意附近的敏感对象。例如，作业区域周边存在蜜蜂、桑树和鱼塘等敏感对象，则有可能因农药影响敏感对象存活，从而发生经济纠纷。这时需考虑以下几个因素，切不可强行作业。一是风向，应使敏感对象处于上风向，降低风险；二是药剂，应挑选合适的农药降低对敏感对象的威胁；三是边界，应留出足够的安全边界。", "dataHash": "fm-doc-id-384ecb0674b731d6"}, {"text": "对待药剂需谨慎。作业时，要警惕没有标签的农药。不可使用高毒、剧毒农药，因药液浓度较高极易发生人员中毒。", "dataHash": "fm-doc-id-27c992f66321a244"}, {"text": "特定作业要注意。除草剂喷雾时，要注意风向、风速、周边作物等。", "dataHash": "fm-doc-id-713348483e2cad65"}, {"text": "杜绝高温作业。轻则影响药效，导致人员中暑；重则导致人员中毒。", "dataHash": "fm-doc-id-19cd9ee203d6a20b"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234389_n11", "label": "农药配置方法", "level": 2, "dataHash": "fm-doc-id-905e69f879677c39", "description": [{"text": "（1）稀释法。", "dataHash": "fm-doc-id-3f8fe8b1c796a12c"}, {"text": "常用的农药配置方法是稀释法。其中，二次稀释法被誉为最科学的方法。农林农药行业提倡使用二次稀释法。二次稀释法步骤：第一步，用少量水或稀释载体稀释混合农药制剂形成母液或母粉；第二步，根据所需农药浓度，将母液或母粉再稀释到所需浓度（图4.3.12）。", "dataHash": "fm-doc-id-ff5078d38272fb8b"}, {"text": "少量水混合农药—搅拌均匀形成母液—二次稀释混合搅拌，达到所需药液浓度。", "dataHash": "fm-doc-id-35c45f7da880dcad"}, {"text": "（2）农药的混配。", "dataHash": "fm-doc-id-bc1805d4257c020e"}, {"text": "农药的合理混用，不仅可以提高防治效果，而且可以延缓病虫产生抗药性。针对不同病虫害，采用农药混用，还可以减少施药次数，从而降低劳动成本。", "dataHash": "fm-doc-id-26dc739970bb758f"}, {"text": "·农药混配顺序：农药混配顺序要准确。叶面肥与农药等的混配顺序通常为：依次加入微肥、水溶肥、可湿性粉剂、水分散粒剂、悬浮剂、微乳剂、水乳剂、水、乳油（原则上农药混配不要超过三种），每加入一种要充分搅拌均匀，然后再加入下一种。先加水后加药，进行完美的二次稀释。无论混配什么药剂都应该注意“现配现用、不宜久放”（图4.3.13）。", "dataHash": "fm-doc-id-14a514c298d4d509"}, {"text": "农药混配原则：配好药液后应马上使用，在最短的时间内喷完。有些农药产品悬浮性和分散性不够好，药液容易发生沉淀、分层等现象，使药效逐步降低，甚至产生药害。", "dataHash": "fm-doc-id-64c57a41043f47c7"}, {"text": "农药混配注意事项：一是混用品种之间不产生不良的化学反应（如水解、碱解、酸解等），也不影响药液的物理性状，要保证正常药效或增效作用；二是不同农药品种混用后不能使作物产生药害；三是除酸碱性外，很多农药品种不能与含金属离子的药物混用；四是具有交互抗性的农药不宜混用；五是生物农药不能与杀菌剂混用。", "dataHash": "fm-doc-id-f5f2c9bc3cadba8a"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}], "edges": [{"source": "7989338958046234389", "target": "7989338958046234389_n1", "type": "父子", "description": "任务3 了解常见病虫害及农药基础知识包含常见作物病虫害知识"}, {"source": "7989338958046234389_n1", "target": "7989338958046234389_n2", "type": "父子", "description": "常见作物病虫害知识包含常见水稻病虫害"}, {"source": "7989338958046234389_n1", "target": "7989338958046234389_n3", "type": "父子", "description": "常见作物病虫害知识包含常见小麦病虫害"}, {"source": "7989338958046234389_n1", "target": "7989338958046234389_n4", "type": "父子", "description": "常见作物病虫害知识包含常见柑橘病虫害"}, {"source": "7989338958046234389_n1", "target": "7989338958046234389_n5", "type": "父子", "description": "常见作物病虫害知识包含常见苹果病虫害"}, {"source": "7989338958046234389", "target": "7989338958046234389_n6", "type": "父子", "description": "任务3 了解常见病虫害及农药基础知识包含农药基础知识"}, {"source": "7989338958046234389_n6", "target": "7989338958046234389_n7", "type": "父子", "description": "农药基础知识包含认识农药"}, {"source": "7989338958046234389_n6", "target": "7989338958046234389_n8", "type": "父子", "description": "农药基础知识包含农药剂型"}, {"source": "7989338958046234389_n6", "target": "7989338958046234389_n9", "type": "父子", "description": "农药基础知识包含安全科学使用农药"}, {"source": "7989338958046234389_n6", "target": "7989338958046234389_n10", "type": "父子", "description": "农药基础知识包含无人机施药前准备"}, {"source": "7989338958046234389_n6", "target": "7989338958046234389_n11", "type": "父子", "description": "农药基础知识包含农药配置方法"}]}}, {"lessonId": "7989338958046234390", "meta": {"lessonId": "7989338958046234390"}, "graph": {"nodes": [{"id": "7989338958046234390", "label": "任务1 了解背景知识", "level": 0, "dataHash": "fm-doc-id-e8db4b4f39c09bee", "displayCode": "UAS_P5T1", "projectTitle": "项目五 空地一体化测绘（空中部分）", "projectDataHash": "fm-doc-id-500790738810debf", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n1", "label": "测量学知识介绍", "level": 1, "dataHash": "fm-doc-id-8aec76922a23843b", "description": [{"text": "测量学的主要研究方向是地球的形状、大小以及地球表面各种形态的科学，其任务主要表现为：确定地球的形状和大小；确定地面点的平面位置和高程；将地球表面的起伏状态和其他信息测绘成图。", "dataHash": "fm-doc-id-efe3e91606922a09"}, {"text": "测量学在我国现代化建设中起着非常重要的作用。它不仅体现在国防建设中，还体现在地质采矿、农田水利、交通运输及城市建设工程中，体现在对地震、山体滑坡等灾害的监测和测量中。从工程建设的角度出发，其作用主要表现在工程建设的三个阶段，即规划设计阶段所需的地形资料和地形图，施工阶段进行必要的施工放样与施工监测，运营阶段进行建筑物的稳定性监测和变形情况分析等。", "dataHash": "fm-doc-id-803a620553d09b7a"}, {"text": "测量学是一门古老的科学。相传早在公元前21世纪夏禹治水时，就已采用了准、绳、规、矩等简单的测量工具。公元前18世纪，古埃及就进行过土地丈量。中国人发明的指南针、浑天仪，外国人发明的望远镜、显微镜和水准器，以及三角学的应用和地图投影技术的改进，大大推动了测量学的发展。特别是近几十年来，电子学和空间技术的飞速发展，使测量技术逐步趋于自动化和数字化，使数据处理趋于程序化。当前，测量学这门历史悠久的学科已焕发出新的活力。", "dataHash": "fm-doc-id-5b604ce494f51c57"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234390_n2", "label": "测量学的细分方向", "level": 1, "dataHash": "fm-doc-id-80fefae4ab6a54e3", "description": [{"text": "随着社会生产的发展和科学技术的进步，测量学随之发展成多个分支。", "dataHash": "fm-doc-id-ffd1e14e637c1b79"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234390_n3", "label": "大地测量学", "level": 2, "dataHash": "fm-doc-id-06a0a581d33aa2e9", "description": [{"text": "大地测量学是研究在地球表面大范围内建立国家大地控制网，精确测定地球形状和大小以及地球重力场的理论、技术和方法的学科。随着卫星定位技术的发展，大地测量学不仅为空间科学和军事服务，还将为研究地球的形状、大小以及地表形变和地震预报等提供可靠的资料。", "dataHash": "fm-doc-id-d3f32c82dcc60b75"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n4", "label": "地形测量学", "level": 2, "dataHash": "fm-doc-id-14ca4099bb9048d2", "description": [{"text": "地形测量学是研究将地球表面的起伏状态和其他信息测绘成图的理论、技术和方法的学科。各种比例尺地形图的测绘，为社会发展的规划设计提供了重要的资料。随着社会和经济的发展，地籍测量和房地产测量也得到迅猛发展，为地籍管理和房地产管理提供了有力的保障。", "dataHash": "fm-doc-id-656a3b7ce8130bf0"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n5", "label": "摄影测量学", "level": 2, "dataHash": "fm-doc-id-d60fb38bba82d068", "description": [{"text": "摄影测量学是研究利用摄影像片等手段测定物体的形状、大小及其空间位置的学科。由于摄影像片包含的信息全面细致，现已被广泛应用于其他科学领域。根据获取像片方式的不同，又分为地面摄影测量、航空摄影测量、航天摄影测量、水下摄影测量等。", "dataHash": "fm-doc-id-f2983c3aa10cef21"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n6", "label": "工程测量学", "level": 2, "dataHash": "fm-doc-id-f07911bde6cd7b52", "description": [{"text": "工程测量学是研究各项工程建设在规划设计、施工和竣工运营阶段所进行的各种测量工作的学科。它把各种测量理论应用于不同的工程建设，并研究各种测量新技术和新方法。", "dataHash": "fm-doc-id-87b2cef8176a8013"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n7", "label": "地图制图学", "level": 2, "dataHash": "fm-doc-id-94be7d1f120301f3", "description": [{"text": "地图制图学是研究地图及其制作理论、工艺和应用的学科。根据已测得的成果成图，编制各种基本图和专业地图，完成各种地图的复制和印刷出版。", "dataHash": "fm-doc-id-10c5df5790f05278"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n8", "label": "测绘的应用方向", "level": 1, "dataHash": "fm-doc-id-17cdd53e6b5f075c", "description": [{"text": "世界上许多国家正在建立民用无人机产业，并推动其得以广泛应用。中国无人机产业也取得了很大进展，其产品已经开始出口到国外高端市场。相关专家指出，随着无人机装备的发展和服务队伍的建设，我国已能够利用无人机为国民经济建设服务。无人机的发展已经进入社会应用的新时期。", "dataHash": "fm-doc-id-05e757028856fdfb"}, {"text": "基础测绘在国民经济和社会发展中，起着基础性、先行性、公益性的作用。航空摄影测量是基础测绘获取数据的最有效的途径之一，但局限于数据处理工作复杂、分辨率低，时效性和灵活性也远不能满足实际需求。无人机航摄系统作为传统航空摄影测量技术的有益补充，日益成为获取空间数据的重要手段，其具有机动灵活、高效快速、作业成本低的特点，已在困难地区大比例尺地形图测绘、应急救灾和土地执法监察等领域开展应用。为适应城镇发展的总体需求，提供综合地理、资源信息，各地区、各部门在综合规划、田野考古、国土整治监控、农田水利建设、基础设施建设、厂矿建设、居民小区建设、环保和生态建设等方面，无不需要最新、最完整的地形资料，这已成为各级政府部门和新建开发区亟待解决的问题。无人机测绘技术也可以被广泛应用于国家生态环境保护、矿产资源勘探、海洋环境监测、土地利用调查、水资源开发、农作物长势监测与估产、农业作业、自然灾害监测与评估、城市规划与市政管理、森林病虫害防护与监测、公共安全、国防事业、数字地球以及广告摄影等领域，并在这些领域有着广阔的市场需求。", "dataHash": "fm-doc-id-aa5e43042e346f58"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n9", "label": "无人机测绘的优势", "level": 1, "dataHash": "fm-doc-id-154199874e7a9494", "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234390_n10", "label": "安全性和可靠性", "level": 2, "dataHash": "fm-doc-id-df361b97caa8975a", "description": [{"text": "随着科学技术的进步，无人机技术已经有了较大的发展，在地形测量方面的可靠性已经有了较大的提高。在使用过程中，无人机可以充分发挥出无人机自身的优越性。不同于直升机等载人飞机，无人机的起落不需要专门的场地，在不同的地形中也可以正常运作，大大提高了无人机的使用效率。", "dataHash": "fm-doc-id-cd6d10c98c4693c1"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n11", "label": "成本较低，数据处理费用少", "level": 2, "dataHash": "fm-doc-id-658d951ae366a91c", "description": [{"text": "无人机的控制系统相对简单，无人机的造价要远低于普通的航拍飞机，起降也没有固定场地的需求。利用无人机航空摄影技术进行数据处理时，总的费用较低，性价比较高。此外，无人机驾驶员只需在地面通过遥感系统来进行操作，因此无人机驾驶员上岗执照的获取较为简单，使得驾驶员的上岗时间缩短。无人机通常采用的材料都是轻质量的碳纤维复合材料，其后期的维修、保养也较为简单便捷。", "dataHash": "fm-doc-id-aeee9f1700b1d9c6"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n12", "label": "机动灵活性", "level": 2, "dataHash": "fm-doc-id-a087d96367d409c7", "description": [{"text": "无人机相对于普通的航拍飞机而言，其体型更加娇小，升空的时间更短，不需要专门的升降起跑场地就可以快速升空，并且正常运行。通常情况下，在进行测量前会先给无人机制定出其在测量时的飞行路线，在进行测量时，无人机能够根据设定好的路线自动飞行。因其稳定性较好，不仅能够进行高强度的航拍工作，还能够提高航拍的准确性与精准度。由于无人机并不需要载人，在耗油量相同时，无人机与普通的航拍飞机相比能够飞得更远、飞的时间更长。", "dataHash": "fm-doc-id-7b005fb008ebf8e6"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n13", "label": "高分辨率、多角度的影像", "level": 2, "dataHash": "fm-doc-id-4a35f66517db43e1", "description": [{"text": "", "dataHash": "fm-doc-id-9cf37b9374f2837a"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n14", "label": "无人机测绘的不足", "level": 1, "dataHash": "fm-doc-id-d82142f8e09d14e6", "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234390_n15", "label": "飞行不够平稳", "level": 2, "dataHash": "fm-doc-id-175805a3c8d969e0", "description": [{"text": "机体轻是无人机的一大优点，但由于无人机机体很轻，当飞行高度升高时，容易受高空风力的影响，飞行不稳定。在测绘领域的应用中，无人机飞行会受风向和风速的影响，而无法进行低空拍摄作业，或拍摄的遥感影像无法达到精度要求。一般情况下，只有增加飞机的自身重量才能提高无人机的抗风性能，然而这样就无法满足现实起降要求。如何解决测绘无人机的起降技术和抗风性能，是目前测绘无人机的关键问题。", "dataHash": "fm-doc-id-fcd1b4e91791b5f4"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n16", "label": "传感器不够完善", "level": 2, "dataHash": "fm-doc-id-f7849c8290de9a07", "description": [{"text": "普通的无人机由于技术的限制和要求，尚不能搭载精度较高的传感器，这使得监测工作无法获取精度较高的信息和图像，无法满足大比例尺的测绘要求。", "dataHash": "fm-doc-id-874297a6404b971d"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n17", "label": "对通信系统的依赖性大", "level": 2, "dataHash": "fm-doc-id-b3a67538095a9bc5", "description": [{"text": "由于无人机是通过技术人员进行操作，利用传感器的传递信号来实现和完成的，无人机的控制程序对通信系统的依赖程度很高。无人机对GPS和通信系统的依赖使黑客很容易通过编码程序来干扰无人机的正常飞行，引发安全问题。", "dataHash": "fm-doc-id-cbcea220c3094272"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234390_n18", "label": "测绘与国家安全", "level": 1, "dataHash": "fm-doc-id-77859252a702cbe0", "description": [{"text": "测绘活动涉及国家安全利益，地理信息更是被各国视为“国之利器，不可以示人”。我们一定要时刻警惕非法测绘，同时作为测绘地理信息行业工作者我们更应该做好保密工作，不可有一丝疏忽，切实维护国家地理信息数据安全。", "dataHash": "fm-doc-id-5887611d5f5ba770"}, {"text": "信息化时代，测绘地理信息与国家安全的关联度越来越大，在维护政治、经济、军事、科技和其他非传统领域国家安全中发挥着重要作用。", "dataHash": "fm-doc-id-ec1ebdf6585b4669"}, {"text": "测绘工作事关国家主权、安全和发展利益。长期以来，测绘一直被世界各国视为“国之利器，不可以示人”。测绘为现代战争提供实施远程精确打击的地理信息，是赢得战争主动权的基础性工具，是赢得现代高技术战争胜利的重要因素。", "dataHash": "fm-doc-id-63ad81e0ccd80ff7"}, {"text": "作为国家战略性信息资源的重要内容，地理信息特别是重要军事设施、国家重要基础设施等敏感信息一旦泄露，不可逆转。其长期的潜在危害难以估量，将会对国家安全和利益造成无法挽回的损失。", "dataHash": "fm-doc-id-4100c3a9f59912c1"}, {"text": "危害测绘地理信息安全的行为，主要有以下三点。", "dataHash": "fm-doc-id-02c4a3f8e68b0e00"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点;课程思政"}, {"id": "7989338958046234390_n19", "label": "涉密测绘地理信息成果管理不当", "level": 2, "dataHash": "fm-doc-id-c9dff1d4a0d882c7", "description": [{"text": "未按规定保管、使用、存储涉密测绘地理信息成果，可能造成国家秘密泄露，包括但不限于：擅自复制、转借或转让涉密测绘成果，涉密和非涉密环境交叉使用存储介质，处理、存储涉密测绘成果的计算机使用无线设备或连接互联网和其他公共网络。", "dataHash": "fm-doc-id-67464928e0ade1d3"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "课程思政"}, {"id": "7989338958046234390_n20", "label": "非法测绘", "level": 2, "dataHash": "fm-doc-id-6d8c8f744ba2fead", "description": [{"text": "非法测绘包括外国的组织或个人未经批准在中国领域和海域从事测绘活动，以及一些地图爱好者将自家门口的军事禁区在卫星地图上加以精准标记并上传到网络，这些都对中国地理信息安全构成了极大威胁。", "dataHash": "fm-doc-id-cf9bfed84f64bf1e"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "课程思政"}, {"id": "7989338958046234390_n21", "label": "问题地图", "level": 2, "dataHash": "fm-doc-id-cd4e6fc508764ec1", "description": [{"text": "错绘中国国界线、漏绘中国重要岛屿，或在地图上登载敏感，甚至涉密地理信息的问题地图，极大损害了国家主权、安全和利益。", "dataHash": "fm-doc-id-9a7ac99e47610976"}, {"text": "根据《中华人民共和国测绘法》第六十五条：", "dataHash": "fm-doc-id-beb7d16b7770c8ef"}, {"text": "“违反本法规定，地理信息生产、保管、利用单位未对属于国家秘密的地理信息的获取、持有、提供、利用情况进行登记、长期保存的，给予警告，责令改正，可以并处二十万元以下的罚款；泄露国家秘密的，责令停业整顿，并处降低测绘资质等级或者吊销测绘资质证书；构成犯罪的，依法追究刑事责任。", "dataHash": "fm-doc-id-47b76e05d16a7706"}, {"text": "“违反本法规定，获取、持有、提供、利用属于国家秘密的地理信息的，给予警告，责令停止违法行为，没收违法所得，可以并处违法所得二倍以下的罚款；对直接负责的主管人员和其他直接责任人员，依法给予处分；造成损失的，依法承担赔偿责任；构成犯罪的，依法追究刑事责任。”", "dataHash": "fm-doc-id-77999511e8d28171"}, {"text": "我们须时刻牢记，测绘地理信息安全事关国家的主权、安全和利益，容不得半点马虎。守护测绘地理信息安全是每个公民神圣的责任，我们要通过铸牢全民安全意识、凝聚全民智慧力量，切实构筑起新时代测绘地理信息安全的牢固防线。", "dataHash": "fm-doc-id-271fa9f6bcbc745b"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "课程思政"}], "edges": [{"source": "7989338958046234390", "target": "7989338958046234390_n1", "type": "父子", "description": "任务1 了解背景知识包含测量学知识介绍"}, {"source": "7989338958046234390", "target": "7989338958046234390_n2", "type": "父子", "description": "任务1 了解背景知识包含测量学的细分方向"}, {"source": "7989338958046234390_n2", "target": "7989338958046234390_n3", "type": "父子", "description": "测量学的细分方向包含大地测量学"}, {"source": "7989338958046234390_n2", "target": "7989338958046234390_n4", "type": "父子", "description": "测量学的细分方向包含地形测量学"}, {"source": "7989338958046234390_n2", "target": "7989338958046234390_n5", "type": "父子", "description": "测量学的细分方向包含摄影测量学"}, {"source": "7989338958046234390_n2", "target": "7989338958046234390_n6", "type": "父子", "description": "测量学的细分方向包含工程测量学"}, {"source": "7989338958046234390_n2", "target": "7989338958046234390_n7", "type": "父子", "description": "测量学的细分方向包含地图制图学"}, {"source": "7989338958046234390", "target": "7989338958046234390_n8", "type": "父子", "description": "任务1 了解背景知识包含测绘的应用方向"}, {"source": "7989338958046234390", "target": "7989338958046234390_n9", "type": "父子", "description": "任务1 了解背景知识包含无人机测绘的优势"}, {"source": "7989338958046234390_n9", "target": "7989338958046234390_n10", "type": "父子", "description": "无人机测绘的优势包含安全性和可靠性"}, {"source": "7989338958046234390_n9", "target": "7989338958046234390_n11", "type": "父子", "description": "无人机测绘的优势包含成本较低，数据处理费用少"}, {"source": "7989338958046234390_n9", "target": "7989338958046234390_n12", "type": "父子", "description": "无人机测绘的优势包含机动灵活性"}, {"source": "7989338958046234390_n9", "target": "7989338958046234390_n13", "type": "父子", "description": "无人机测绘的优势包含高分辨率、多角度的影像"}, {"source": "7989338958046234390", "target": "7989338958046234390_n14", "type": "父子", "description": "任务1 了解背景知识包含无人机测绘的不足"}, {"source": "7989338958046234390_n14", "target": "7989338958046234390_n15", "type": "父子", "description": "无人机测绘的不足包含飞行不够平稳"}, {"source": "7989338958046234390_n14", "target": "7989338958046234390_n16", "type": "父子", "description": "无人机测绘的不足包含传感器不够完善"}, {"source": "7989338958046234390_n14", "target": "7989338958046234390_n17", "type": "父子", "description": "无人机测绘的不足包含对通信系统的依赖性大"}, {"source": "7989338958046234390", "target": "7989338958046234390_n18", "type": "父子", "description": "任务1 了解背景知识包含测绘与国家安全"}, {"source": "7989338958046234390_n18", "target": "7989338958046234390_n19", "type": "父子", "description": "测绘与国家安全包含涉密测绘地理信息成果管理不当"}, {"source": "7989338958046234390_n18", "target": "7989338958046234390_n20", "type": "父子", "description": "测绘与国家安全包含非法测绘"}, {"source": "7989338958046234390_n18", "target": "7989338958046234390_n21", "type": "父子", "description": "测绘与国家安全包含问题地图"}]}}, {"lessonId": "7989338958046234391", "meta": {"lessonId": "7989338958046234391"}, "graph": {"nodes": [{"id": "7989338958046234391", "label": "任务2 空地一体化测绘", "level": 0, "dataHash": "fm-doc-id-6fcac4c0d4963b36", "displayCode": "UAS_P5T2", "description": [{"text": "多旋翼无人机将机架、飞控系统、动力系统和通信系统等硬件组装后，为了实现无人机的良好飞行及功能要求，必须进行合理的调试，调试工作关系着飞行性能及安全。根据调试过程中是否需要安装螺旋桨，可分为无桨调试和有桨调试。", "dataHash": "fm-doc-id-2af08d01690b6525"}], "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234391_n1", "label": "无人机测绘相关知识介绍", "level": 1, "dataHash": "fm-doc-id-e799de63d8945221", "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234391_n2", "label": "地面分辨率", "level": 2, "dataHash": "fm-doc-id-3656b14c161020c5", "description": [{"text": "地面分辨率是衡量遥感图像（或影像）能有差别地区分开两个相邻地物的最小距离的能力。超过分辨率的限度，相邻两物体在图像（影像）上即表现为一个单一的目标。通常用单位长度内所能分辨出来的黑白相间的线对数（线对/毫米）来表示分辨率的大小。对于扫描图像，通常以像元的大小来表示其分辨率（能分辨的最小面积）。", "dataHash": "fm-doc-id-a5073afc1663996d"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234391_n3", "label": "地图比例尺", "level": 2, "dataHash": "fm-doc-id-9278d6b43232a51d", "description": [{"text": "地图比例尺是地图上的线段长度与实地相应线段经水平投影的长度之比。它表示地图图形的缩小程度，又称缩尺。一般地，地图比例尺越大，误差越小，图上测量精度越高。", "dataHash": "fm-doc-id-05d2c438afd391a0"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234391_n4", "label": "航向重叠度", "level": 2, "dataHash": "fm-doc-id-d56baa18006de5a5", "description": [{"text": "航向重叠：航摄像片沿飞行方向上相邻像片的重叠。航向重叠反映在航摄像片的影像上是以像幅边长的百分数表示的（图5.2.1右）。", "dataHash": "fm-doc-id-1182919f2dff98f2"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234391_n5", "label": "旁向重叠度", "level": 2, "dataHash": "fm-doc-id-c226c22a2f1367a0", "description": [{"text": "旁向重叠：两相邻航带之间的重叠称为旁向重叠（图5.2.1左）。", "dataHash": "fm-doc-id-c79b2f16cf462b48"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234391_n6", "label": "航向角", "level": 2, "dataHash": "fm-doc-id-9f5d8c74eb6c6576", "description": [{"text": "航向角是从正角度向东增加的局部北向旋转。俯仰角是指从局部的东北平面开始的旋转。正俯仰角在平面上方，负俯仰角在平面以下。横滚角是围绕局部东轴应用的第一个旋转。", "dataHash": "fm-doc-id-2af0f0b614a4984e"}, {"text": "航向是飞机的机头方向，航向角的其大小是用飞机纵轴的水平投影与地平面上某一基准线之间的夹角度量。并规定正航向角的计算方法是从基准线的正方向按顺时针方向量至定位线的正方向。用罗盘测量飞机航向，其实质就是用罗盘传感器来测定地平面上的基准线的位置。", "dataHash": "fm-doc-id-c0c4a925ab512419"}, {"text": "不同的罗盘采用不同的基准线。目前仪表罗盘所用的基准线有地球磁子午线、真子午线、飞行航线起点子午线或飞机转弯起点航线。", "dataHash": "fm-doc-id-0e14fc07208a7ac4"}, {"text": "通常这些基准线的正方向是指磁北线、真北线和飞行方向线。由于基准不同，航向分为真航向、磁航向、罗航向、大圆航向和陀螺航向。", "dataHash": "fm-doc-id-ba17e2a4299037fe"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234391_n7", "label": "无人机RTK技术", "level": 2, "dataHash": "fm-doc-id-0c1675ca4200a19c", "description": [{"text": "RTK（real time kinematic，实时动态）测量系统一般由三部分组成：GPS接收设备、数据传输系统和实施动态测量的软件系统。RTK测量技术是以载波相位观测量为依据的，有快速高精度定位功能的载波相位差分测量技术。它能够实时获得测站在指定坐标系中的三维定位结果，且具有厘米级的定位精度。", "dataHash": "fm-doc-id-80c6fa5c13c59849"}, {"text": "RTK测量的工作原理是：将一台接收机置于基准站上，另一台或几台接收机置于载体（称为移动站）上，基准站和移动站同时接收同一时间、同一GPS卫星发射的信号，基准站所获得的观测值与已知位置信息进行比较，得到GPS差分改正值。然后将这个改正值通过无线电数据链电台及时传递给共视卫星的移动站，精化其GPS观测值，从而得到经差分改正后移动站较准确的实时位置（图5.2.2）。", "dataHash": "fm-doc-id-a6dd182ead832dc2"}, {"text": "目前主流的厂商RTK的定位平面精度可达8mm+1ppm，高程精度可达15mm+1ppm。基站与移动站之间的通信方式主要有电台和网络两种，电台信号稳定，网络信号传输距离远，各有优点。", "dataHash": "fm-doc-id-0f5e595b0914d631"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "难点"}, {"id": "7989338958046234391_n8", "label": "无人机PPK技术", "level": 2, "dataHash": "fm-doc-id-c57134506de3c4c5", "description": [{"text": "PPK（post-processing kinematic，动态后处理）技术的工作原理是利用一台进行同步观测的基准站接收机和至少一台流动接收机，对GPS卫星进行同步观测；也就是基准站保持连续观测，初始化后的流动站迁至下一个待定点，在迁站过程中需要保持对卫星的连续跟踪，以便将整周模糊度传递至待定点。", "dataHash": "fm-doc-id-55eeab316512bcda"}, {"text": "基准站和流动站同步接收的数据在计算机中进行线性组合，形成虚拟的载波相位观测量，确定接收机之间的相对位置，最后引入基准站的已知坐标，从而获得流动站的三维坐标。", "dataHash": "fm-doc-id-ef6aaed544eee280"}, {"text": "PPK技术是最早的GPS动态差分技术方式（又称半动态法、准动态相对定位法、走走停停法），它与RTK技术的主要区别在于：在基准站和流动站之间，不必像RTK那样，建立实时数据传输，而是在定位观测后，对两台GPS接收机所采集的定位数据进行测量后的联合处理，从而计算出流动站在对应时间上的坐标位置，其基准站和流动站之间的距离没有严格的限制（图5.2.3）。它的优点是定位精度高、作业效率高、作业半径大、易操作。", "dataHash": "fm-doc-id-e656222afd70ce35"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "难点"}, {"id": "7989338958046234391_n9", "label": "无人机的精度（像控点与检查点）", "level": 2, "dataHash": "fm-doc-id-2e8e58039fb56ca7", "description": [{"text": "航空摄影测量的目的是对目标区域进行测量，获取目标区域的地理信息，通常情况下需要地面控制点（又称为外业控制点、野外控制点等）对拍摄的影像进行位置和姿态标定，这个过程称为绝对定向。如果对成果的位置精度要求不高，可以不需要地面控制点，但专业的测绘生产都需要地面控制点进行定向（图5.2.4）。", "dataHash": "fm-doc-id-de5a2b6c9a0e46c1"}, {"text": "地面控制点有两个重要的用途：其一作为定向点使用，用于求解像片成像时的位置和姿态；其二作为检查点使用，用于检查生产成果的精度。检查方式是在成果数据中找到检查点的影像位置（需要立体像对中的位置），测量其坐标，然后与控制点坐标进行比对。本章将对地面控制点的含义、获取方式等进行叙述。", "dataHash": "fm-doc-id-716e4374dedf45ab"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "难点"}], "edges": [{"source": "7989338958046234391", "target": "7989338958046234391_n1", "type": "父子", "description": "任务2 空地一体化测绘包含无人机测绘相关知识介绍"}, {"source": "7989338958046234391_n1", "target": "7989338958046234391_n2", "type": "父子", "description": "无人机测绘相关知识介绍包含地面分辨率"}, {"source": "7989338958046234391_n1", "target": "7989338958046234391_n3", "type": "父子", "description": "无人机测绘相关知识介绍包含地图比例尺"}, {"source": "7989338958046234391_n1", "target": "7989338958046234391_n4", "type": "父子", "description": "无人机测绘相关知识介绍包含航向重叠度"}, {"source": "7989338958046234391_n1", "target": "7989338958046234391_n5", "type": "父子", "description": "无人机测绘相关知识介绍包含旁向重叠度"}, {"source": "7989338958046234391_n1", "target": "7989338958046234391_n6", "type": "父子", "description": "无人机测绘相关知识介绍包含航向角"}, {"source": "7989338958046234391_n1", "target": "7989338958046234391_n7", "type": "父子", "description": "无人机测绘相关知识介绍包含无人机RTK技术"}, {"source": "7989338958046234391_n1", "target": "7989338958046234391_n8", "type": "父子", "description": "无人机测绘相关知识介绍包含无人机PPK技术"}, {"source": "7989338958046234391_n1", "target": "7989338958046234391_n9", "type": "父子", "description": "无人机测绘相关知识介绍包含无人机的精度（像控点与检查点）"}]}}, {"lessonId": "7989338958046234392", "meta": {"lessonId": "7989338958046234392"}, "graph": {"nodes": [{"id": "7989338958046234392", "label": "任务3 作业流程", "level": 0, "dataHash": "fm-doc-id-6959bfe3c11ab8fe", "displayCode": "UAS_P5T3", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234392_n1", "label": "项目准备", "level": 1, "dataHash": "fm-doc-id-5b16b73e5596184a", "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "重点"}, {"id": "7989338958046234392_n2", "label": "设备清单", "level": 2, "dataHash": "fm-doc-id-7d83db17400486bf", "description": [{"text": "在项目开始前，我们需要针对项目的要求进行设备整理。一般情况下，我们需要准备一份对应的清单，防止设备遗漏。物品汇总清单通常包括以下几类。", "dataHash": "fm-doc-id-321d0bd851d1cd0b"}, {"text": "（1）测绘无人机及对应无人机载荷（如可见光相机、激光雷达等）。", "dataHash": "fm-doc-id-7bb28db1c8293265"}, {"text": "（2）测绘无人机的辅助用具或设备（如电池、充电器、风速计等）。", "dataHash": "fm-doc-id-5862173f6a7bcbf2"}, {"text": "（3）地面测绘相关设备（如RTK测量仪、像控点标记等）。", "dataHash": "fm-doc-id-1fc234a0928c933a"}, {"text": "（4）劳保用品（如手套、防晒用具等）。", "dataHash": "fm-doc-id-9678e2fe39282aa2"}], "knowledgeCategory": "事实性", "cognitiveDimension": "记忆"}, {"id": "7989338958046234392_n3", "label": "人员分工", "level": 2, "dataHash": "fm-doc-id-1c18ea0b5ef8e937", "description": [{"text": "项目开始前，我们需要根据项目的难度进行人员分工。一般情况下，人员分工大致包括以下几个方向。", "dataHash": "fm-doc-id-2017e8077272dff4"}, {"text": "（1）无人机操作员，负责操控无人机，并及时向地面站操作员反馈无人机的实际飞行情况。无人机操作员一般为项目的现场实施负责人。", "dataHash": "fm-doc-id-33413c6aa252f37c"}, {"text": "（2）地面站操作员，负责控制地面站，上传飞行任务，并实时向无人机操作员反馈无人机的飞行数据。", "dataHash": "fm-doc-id-bbc7ca710064f0f4"}, {"text": "（3）地勤人员，负责在起飞前对无人机进行调整，确保无人机的各项功能和参数都达到起飞要求；在降落后，负责对无人机进行现场回收，以及回收后的检修维护。通常情况下，地勤人员负责配合内业人员或现场实施负责人，在测绘区域内进行像控点布置和参数测量。", "dataHash": "fm-doc-id-f96b1c6080ad9c75"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234392_n4", "label": "工作初步计划", "level": 2, "dataHash": "fm-doc-id-c697238fb6dcfe49", "description": [{"text": "项目开始前，我们需要根据项目要求制订一份工作计划。一般情况下，工作计划需要包含以下几方面的内容。", "dataHash": "fm-doc-id-57d205e1d34deec8"}, {"text": "（1）任务高度。", "dataHash": "fm-doc-id-415a0d660ea28a3c"}, {"text": "（2）飞行速度。", "dataHash": "fm-doc-id-2052881a884fe455"}, {"text": "（3）航向重叠度和旁向重叠度。", "dataHash": "fm-doc-id-4eb354af9be818cc"}, {"text": "（4）地面分辨率。", "dataHash": "fm-doc-id-77f4d73141009a7d"}, {"text": "（5）相机参数。", "dataHash": "fm-doc-id-591a16818429f99d"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234392_n5", "label": "现场勘探", "level": 1, "dataHash": "fm-doc-id-57b06d470807545b", "description": [{"text": "抵达项目现场后，我们需要根据现场的实际情况，调整出发前的工作计划。一般调整的方向包括以下几点。", "dataHash": "fm-doc-id-9c92fdd151e03045"}, {"text": "（1）起飞点的实际位置。", "dataHash": "fm-doc-id-1b4026a9b5244883"}, {"text": "（2）根据地形走势调整航向。", "dataHash": "fm-doc-id-f2cd62265bd8a968"}, {"text": "（3）根据现场风向调整首末航点的位置。", "dataHash": "fm-doc-id-af791ae9754a12ed"}, {"text": "（4）根据现场风速调整飞行速度。", "dataHash": "fm-doc-id-b51836f28a83e867"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234392_n6", "label": "数据采集", "level": 1, "dataHash": "fm-doc-id-f4aa1ba616f1edea", "description": [{"text": "（1）抵达起飞点后，地勤人员配合无人机操作员（同时也是任务队长）进行无人机组装和检查。地勤人员负责清理一片起飞场地，地面站操作员负责组装地面站设备。", "dataHash": "fm-doc-id-0ca4204b2b50f0bb"}, {"text": "（2）无人机组装完成后，地勤人员配合无人机操作员，完成无人机系统的初始化和罗盘校准。", "dataHash": "fm-doc-id-3de68b8fb73270aa"}, {"text": "（3）初始化和校准完成后，无人机操作员配合地面站操作员，完成无人机和地面站的连接。", "dataHash": "fm-doc-id-cfad0540d7c8a03e"}, {"text": "（4）无人机操作员启动无人机（但不起飞），检查螺旋桨、电机、相机等是否正常。", "dataHash": "fm-doc-id-78ae4d080334d4ae"}, {"text": "（5）地面站操作员检查飞行任务参数，确认后上传任务并示意无人机操作员准备完成。地勤人员确认现场、周围有没有影响无人机的飞行因素（围观人群、车辆等），确认后分别示意无人机操作员准备完成。", "dataHash": "fm-doc-id-a26bc28efd623a9d"}, {"text": "（6）《无人机测绘作业飞前检查单》全部填写完毕后，无人机操作员下令起飞，地面站人员点击“开始飞行”，并确认无人机按预设参数进行作业。无人机操作员盯住无人机，确认无人机在起飞过程中安全。地勤人员巡视周围环境，保障起飞阶段安全。", "dataHash": "fm-doc-id-e653d0fc85699353"}, {"text": "（7）任务过程中，地面站操作员需要关注无人机是否在航线上飞行，如遇到参数隐患，须第一时间告知无人机操作员。无人机操作员根据地面站操作员的反馈，判断是否继续任务。", "dataHash": "fm-doc-id-6387b6393ba29354"}, {"text": "（8）飞行降落阶段，地面站操作员须向无人机操作员同步飞机的返航方向、返航高度和返航电量。无人机操作员在发现无人机踪迹后，须第一时间告知已发现无人机的位置。地面地勤人员在收到无人机操作员发出的信息后，应第一时间确认无人机降落环境的情况（无行人或其他事物干扰无人机返航和降落）。", "dataHash": "fm-doc-id-672bd0c06da271ed"}, {"text": "（9）无人机降落后，无人机操作员需要和地面站操作员沟通，确认飞机是否加安全锁。锁定完成后，地勤人员负责给无人机断电，并配合地面站操作员，复制无人机采集数据。", "dataHash": "fm-doc-id-8d05cb9bb62a0eba"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "重点"}, {"id": "7989338958046234392_n7", "label": "数据处理", "level": 1, "dataHash": "fm-doc-id-9b9ec8a922b00377", "description": [{"text": "在项目结束后，外业工作人员将数据（照片、POS数据和像控点坐标数据）复制至U盘，转交给内业工程师进行处理。", "dataHash": "fm-doc-id-f3c5ea2eb4c63b1a"}, {"text": "内业工程师通过发现一些曝光不合格以及拍摄模糊的照片，从中选取有效照片和相应POS数据，并导入计算机中进行数据的加工处理。", "dataHash": "fm-doc-id-2485a0be492c278e"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用", "tags": "重点"}, {"id": "7989338958046234392_n8", "label": "无人机测绘注意事项", "level": 1, "dataHash": "fm-doc-id-1b0723839e3a1f9b", "description": [{"text": "（1）定期检查相关设备。", "dataHash": "fm-doc-id-8417871cc640a3ea"}, {"text": "在使用无人机遥感技术进行测绘前，要想提高其测绘质量，工作人员还需定期检查和调试其相关设备。", "dataHash": "fm-doc-id-2ab330437c94349a"}, {"text": "①应确保相关设备符合相关的质量标准，且都是经过检定合格的设备，并根据工程测绘的实际需要适当调整设备的使用。", "dataHash": "fm-doc-id-fe8a32106211ef24"}, {"text": "②要对其通信设备、地面电台、电源系统、记录系统等相关设备进行定期检查。例如，连接航摄平台进行通电检查等，从而确保这些设备和系统具备良好的运行状态。", "dataHash": "fm-doc-id-f5220642866f2f14"}, {"text": "③在进行遥感测绘工作时，还应检查像片的重叠度、航线弯曲度、倾角、旋角以及影像的质量。例如，在检查影像质量时，可目测其清晰度、色彩等效果。", "dataHash": "fm-doc-id-b35e61ce2bf4d75d"}, {"text": "（2）严格控制飞行和摄影质量。", "dataHash": "fm-doc-id-7d3efbde233d8a6f"}, {"text": "为提高无人机拍摄工作的效率与水平，在实际使用中，相关操作员还应严格控制无人机飞行和摄影的质量。", "dataHash": "fm-doc-id-a4c5ff19840301bf"}, {"text": "①需要严格按照规定的时间进场，并明确相关的起飞和降落方式等，还应控制好飞行速度，进而获取更加高清的测绘影像。", "dataHash": "fm-doc-id-b44c20e2afda08f8"}, {"text": "②应设计和控制好无人机飞行的高度，掌握好拍摄区域实际航高与设计航高之间的高度差，并将其控制在合理范围内。还应控制好无人机的飞行状态，避免因GPS定位系统等产生信号混乱现象而影响拍摄的准确性。同时，在无人机飞行过程中还应控制好其上升和下降的飞行速率。除此之外，工作人员还应规划并制定出完善的安全保护方案，从而保证无人机在飞行过程中的安全。在进行拍摄时，应确保没有航摄遗漏的现象发生，若有遗漏则需要进行补摄。", "dataHash": "fm-doc-id-f6f179a673ba4c1f"}, {"text": "（3）优化像控点测量流程。", "dataHash": "fm-doc-id-4e47a3efd9dea3f2"}, {"text": "为提高无人机遥感技术拍摄像控点布设工作的有效性，需要不断优化像控点测量的流程。", "dataHash": "fm-doc-id-4af25eed4cb16f55"}, {"text": "①应根据工程需要明确具体的拍摄区域和范围，并检验拍摄区域自由网的效果，快速生成自由网快拼图等。", "dataHash": "fm-doc-id-f2a3b2d49529619f"}, {"text": "②应根据测量区域的地形地势特点等设计并制作出像控点测量布设方案，并确保像控点像片的质量。在进行数据采集和处理时，相关工作人员需要注意不能将原始观测记录进行删除或修改，也不能在无人机数据处理等系统中设定任何能够对数据进行重新加工组合的操作指令，从而保存真实的原始工程测绘数据，以便日后能够进行科学的调整等。", "dataHash": "fm-doc-id-f8b887436afabd92"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}], "edges": [{"source": "7989338958046234392", "target": "7989338958046234392_n1", "type": "父子", "description": "任务3 作业流程包含项目准备"}, {"source": "7989338958046234392_n1", "target": "7989338958046234392_n2", "type": "父子", "description": "项目准备包含设备清单"}, {"source": "7989338958046234392_n1", "target": "7989338958046234392_n3", "type": "父子", "description": "项目准备包含人员分工"}, {"source": "7989338958046234392_n1", "target": "7989338958046234392_n4", "type": "父子", "description": "项目准备包含工作初步计划"}, {"source": "7989338958046234392", "target": "7989338958046234392_n5", "type": "父子", "description": "任务3 作业流程包含现场勘探"}, {"source": "7989338958046234392", "target": "7989338958046234392_n6", "type": "父子", "description": "任务3 作业流程包含数据采集"}, {"source": "7989338958046234392", "target": "7989338958046234392_n7", "type": "父子", "description": "任务3 作业流程包含数据处理"}, {"source": "7989338958046234392", "target": "7989338958046234392_n8", "type": "父子", "description": "任务3 作业流程包含无人机测绘注意事项"}]}}, {"lessonId": "7989338958046234393", "meta": {"lessonId": "7989338958046234393"}, "graph": {"nodes": [{"id": "7989338958046234393", "label": "任务1 了解背景知识", "level": 0, "dataHash": "fm-doc-id-e8db4b4f39c09bee", "displayCode": "UAS_P6T1", "projectTitle": "项目六 空地一体化测绘（地面部分）", "projectDataHash": "fm-doc-id-b8cd87c447a905e3", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n1", "label": "地面高精度采集相关知识介绍", "level": 1, "dataHash": "fm-doc-id-b7d6250d29710bd1", "description": [{"text": "三维扫描仪（3D scanner）是一种科学仪器，用来侦测并分析现实世界中物体或环境的形状（几何构造）与外观数据（如颜色、表面反照率等性质）。收集到的数据常被用来进行三维重建计算，在虚拟世界中创建实际物体的数字模型。这些模型具有相当广泛的用途，在工业设计、瑕疵检测、逆向工程、机器人导引、地貌测量、医学信息、生物信息、刑事鉴定、数字文物典藏、电影制片、游戏创作素材等领域都可见其应用。三维扫描仪的制作并非依赖单一技术，各种不同的重建技术都有其优缺点，成本与售价也有高低之分。并无一体通用之重建技术，仪器与方法往往受限于物体的表面特性。例如，光学技术不易处理闪亮（高反照率）、镜面或半透明的表面，而激光技术不适用于脆弱或易变质的表面。常用的三维扫描仪根据传感方式的不同，分为接触式和非接触式两种。", "dataHash": "fm-doc-id-4bbdf7a53480c881"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234393_n2", "label": "接触式扫描仪", "level": 2, "dataHash": "fm-doc-id-1a1ea6eda3fb3194", "description": [{"text": "接触式扫描仪，顾名思义，需要与被扫描物体直接接触（图6.1.1）。通过探测头反馈回来的光电信号转换为数字面形信息，从而实现对物体面形的扫描和测量。", "dataHash": "fm-doc-id-a37846ad46b0e717"}, {"text": "优点：：·测量数据精准、可达微米级别。·不受物体颜色、光照限制。·适用于外形简单的物体测量。", "dataHash": "fm-doc-id-9c095ecda1ebb500"}, {"text": "缺点：：·易损伤探头和被测物体。·不能检测软质物体，应用范围受限。·扫描速度慢（受机械运动限制）。·被测工件受三坐标大小限制。·受环境温度、湿度影响。·只能获取关键点。·不能反映整个零部件的形状。", "dataHash": "fm-doc-id-59973bf419f15879"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n3", "label": "非接触式扫描仪", "level": 2, "dataHash": "fm-doc-id-71218d9baf5c7770", "description": [{"text": "非接触式扫描仪，它通常指扫描元件与被扫描物体不进行直接接触，采用这种解决方案的扫描仪即被称为非接触式扫描仪（图6.1.2）。非接触式扫描设备是一种利用某种与物体表面仿生互相作用的物理现象，如光、声和电磁等，来获取物体表面的三维坐标信息的工具。", "dataHash": "fm-doc-id-571e3b41d5c1c8fb"}, {"text": "优点：：·无须进行扫描头半径补偿。·扫描速度快，不必逐点扫描，扫描面积大，数据较为完整。·可以直接扫描材质较软以及不适合直接接触式扫描的物体，如橡胶、纸制品、工艺品、文物等。", "dataHash": "fm-doc-id-c3d751bb6af1a2e5"}, {"text": "缺点：：·大多数非接触式光学扫描头都是靠工件表面对光的反射接收数据的，因此对工件表面的反光程度、颜色等有较高的要求。·扫描精度较低，特别是相对接触式扫描仪扫描数据而言。·对于一些细节位置，如边界、缝隙、曲率变化较大的曲面容易丢失数据。·扫描时，扫描头角度与被扫描物体之间有角度限制，否则会增大扫描误差。·易受环境光线及散光的影响，故噪声较大，噪声信号的处理比较困难。", "dataHash": "fm-doc-id-11a6294f6e22e31e"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n4", "label": "激光扫描仪", "level": 1, "dataHash": "fm-doc-id-10784be6e027d828", "description": [{"text": "三维激光扫描仪按照扫描平台的不同可以分为机载式激光扫描仪、固定式激光扫描仪、手持型激光扫描仪。", "dataHash": "fm-doc-id-0915d3c99ba0a18b"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n5", "label": "机载式激光扫描仪", "level": 2, "dataHash": "fm-doc-id-33c7584c4d842976", "description": [{"text": "所谓机载式激光扫描仪，是基于车载平台，由全球定位系统、惯性导航系统结合地面三维激光扫描系统组成的（图6.1.3）。地面三维激光扫描系统，类似传统测量中的全站仪。系统由激光扫描仪及控制系统、内置数码相机、后期处理软件等组成。与全站仪不同之处在于，机载式激光扫描仪采集的不是离散的单点三维坐标，而是一系列的“点云”数据。其特点为扫描范围大、速度快、精度高，具有良好的野外操作性能。", "dataHash": "fm-doc-id-3d646c79e64af198"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n6", "label": "固定式激光扫描仪", "level": 2, "dataHash": "fm-doc-id-2530e1d4af1d7d41", "description": [{"text": "固定式激光扫描仪能够自动、精确、高效获取研究对象的三维地理坐标和立体影像数据，可以提供详细的垂直结构信息，对目标的定量分析提供数据支撑（图6.1.4）。目前，地基激光雷达被广泛应用于工业设计与施工测绘、采石采矿、古建筑维护与修复、变形监测、事故调查、逆向工程应用、地质研究及农作物生长监测等领域。", "dataHash": "fm-doc-id-67781b7e4faf16ef"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n7", "label": "手持型激光扫描仪", "level": 2, "dataHash": "fm-doc-id-261e935401bf0759", "description": [{"text": "手持型激光扫描仪透过三角形测距法建构出3D图形：透过手持式设备，对待测物发射出激光光点或线性激光光点（图6.1.5）。以两个或两个以上的侦测器（电偶组件或位置感测组件）测量待测物的表面到手持激光产品的距离，还需要借助特定引用点——通常是具黏性、可反射的贴片——用于扫描仪在空间中定位及校准。这些扫描仪获得的数据，会被导入计算机中，并由软件转换成3D模型。手持型激光扫描仪，通常还会综合被动式扫描（可见光）获得的数据（如待测物的结构、色彩分布），建构出更完整的待测物3D模型。", "dataHash": "fm-doc-id-e2970ab34729a48b"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234393_n8", "label": "结构光扫描仪", "level": 1, "dataHash": "fm-doc-id-bee7b9315bdb5d11", "description": [{"text": "结构光扫描仪是由投影仪和摄像机组成的一套系统结构（图6.1.6）。投影仪用于将特定的光信息投射到物体表面和背景上，然后由摄像机采集。根据物体引起的光信号变化，来获取物体表面的数据信息。", "dataHash": "fm-doc-id-d773b318c6e983ee"}, {"text": "如今，许多用于3D打印的手持式3D扫描仪都使用结构光技术。该技术还使用三角测量，但它是通过将光图案投射到物体上进行扫描而不是利用激光线（或点）来工作的。使用LCD投影仪或其他稳定光源将图案投影在物体上，稍微偏离投影仪的一个或多个传感器（或相机）观察光图案的形状并计算视场中每个点的距离。在扫描过程中使用的结构光可以是白色或蓝色，并且光图案通常由一系列条纹组成，但也可以由点或其他形状的矩阵组成（图6.1.7）。", "dataHash": "fm-doc-id-95724913063f6415"}, {"text": "这种类型的设备就像激光扫描仪在短距离上工作一样，可以手持或安装在三脚架上。", "dataHash": "fm-doc-id-f2d85f57732f4e36"}, {"text": "结构光技术的好处是扫描速度快。扫描约在2 s内完成，扫描区域也非常大。就像激光扫描仪一样，结构光扫描仪非常准确，并提供高分辨率。", "dataHash": "fm-doc-id-2f80dbda3108c9a9"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}], "edges": [{"source": "7989338958046234393", "target": "7989338958046234393_n1", "type": "父子", "description": "任务1 了解背景知识包含地面高精度采集相关知识介绍"}, {"source": "7989338958046234393_n1", "target": "7989338958046234393_n2", "type": "父子", "description": "地面高精度采集相关知识介绍包含接触式扫描仪"}, {"source": "7989338958046234393_n1", "target": "7989338958046234393_n3", "type": "父子", "description": "地面高精度采集相关知识介绍包含非接触式扫描仪"}, {"source": "7989338958046234393", "target": "7989338958046234393_n4", "type": "父子", "description": "任务1 了解背景知识包含激光扫描仪"}, {"source": "7989338958046234393_n4", "target": "7989338958046234393_n5", "type": "父子", "description": "激光扫描仪包含机载式激光扫描仪"}, {"source": "7989338958046234393_n4", "target": "7989338958046234393_n6", "type": "父子", "description": "激光扫描仪包含固定式激光扫描仪"}, {"source": "7989338958046234393_n4", "target": "7989338958046234393_n7", "type": "父子", "description": "激光扫描仪包含手持型激光扫描仪"}, {"source": "7989338958046234393", "target": "7989338958046234393_n8", "type": "父子", "description": "任务1 了解背景知识包含结构光扫描仪"}]}}, {"lessonId": "7989338958046234394", "meta": {"lessonId": "7989338958046234394"}, "graph": {"nodes": [{"id": "7989338958046234394", "label": "任务2 应用领域", "level": 0, "dataHash": "fm-doc-id-914f7bc63bc0cd89", "displayCode": "UAS_P6T2", "description": [{"text": "空地一体化测绘应用广泛，其主要应用方面为：工业领域应用、文物领域应用、医疗领域应用、游戏建模应用和影视特效应用。本章主要学习各个方面的应用场景和方法。", "dataHash": "fm-doc-id-ebe188f47de47eb9"}], "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234394_n1", "label": "工业领域应用", "level": 1, "dataHash": "fm-doc-id-e5131932303f22dd", "description": [{"text": "（1）产品设计（逆向工程）。", "dataHash": "fm-doc-id-1a04978f9c14468d"}, {"text": "三维扫描仪应用在逆向工程（reverse engineering）上。逆向工程是在设计图不完整，甚至没有设计图或CAD模型的情况下，利用各种数字化技术和CAD技术，根据已有的物理模型（或称零件的原型）重构原型的CAD模型的过程。也就是说，通过三维扫描仪将现有的产品形状绘制到计算机中，可以辅助工程师进行产品的三维CAD设计，然后进行产品的设计、修改和制造。主要是可以跳过产品尺寸测量和绘制2D图纸的过程，直接进行三维建模。", "dataHash": "fm-doc-id-f249e04c31458eb8"}, {"text": "（2）产品检测（三维检测）。", "dataHash": "fm-doc-id-19963eacc99a7a98"}, {"text": "一般生产出来的产品可能有变形或尺寸上的误差。此时，如果利用3D扫描就可以扫描出产品的形状。可以由照相式三维扫描仪或手持式三维扫描仪进行三维扫描。将扫描得到的点云图像与原型的CAD模型进行对比，进行全尺寸检测，分析产品与原设计产品的差异。能够简单、快速、准确地检测复杂形状和位置误差，提高产品的生产质量。", "dataHash": "fm-doc-id-dbd1dce5c064678c"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234394_n2", "label": "文物领域应用", "level": 1, "dataHash": "fm-doc-id-38ebd57e9ba88368", "description": [{"text": "（1）文物数字化应用。", "dataHash": "fm-doc-id-d012d516c24ec5db"}, {"text": "（2）文物修复应用。", "dataHash": "fm-doc-id-8117bd7349d2afc4"}, {"text": "（3）文物保护应用。", "dataHash": "fm-doc-id-12995467496f93ab"}], "knowledgeCategory": "事实性", "cognitiveDimension": "理解"}, {"id": "7989338958046234394_n3", "label": "医疗领域应用", "level": 1, "dataHash": "fm-doc-id-b500247c8ec516cc", "description": [{"text": "三维扫描技术，可方便、有效地获取被测物体表面的三维坐标并重建三维图像，具有速度快、精度高、信息量大、无辐射、非接触、安全、可视化等优点，在医学表面测绘中表现出突出优势，在口腔、整形、矫形等方面具有广阔的前景。三维激光扫描技术目前在口腔科的应用已经日渐成熟，在鼻整形、耳假体制作、唇裂修复、假肢接受腔制作等方面已经获得了初步应用。随着三维扫描技术和处理软件的日益成熟，结合其他成像技术和三维打印技术，相信未来它在颅骨修复、个性化外固定支具和隐形式助听器外形成型、烧伤后皮肤移植、微创手术等临床应用方面会获得日益广泛的应用（图6.2.1）。", "dataHash": "fm-doc-id-cda28268fc371b8e"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234394_n4", "label": "游戏建模领域应用", "level": 1, "dataHash": "fm-doc-id-1993ddc2405e6a30", "description": [{"text": "随着实景三维与虚拟现实技术的加速融合，通过倾斜摄影技术实现的三维重现不再局限于传统的测绘行业，开始在文化行业得到更多应用。传统的游戏建模方式通常需消耗较高的人力成本，一个项目甚至需要以年为单位完成相应的建模工作。而在实景三维重建技术的支持下，建模工作量大、耗时长的问题得到了有效的改善。实景三维重建技术不仅大大缩减了游戏场景的建模成本，大幅提高了建模效率，还能为大家呈现出一场极为震撼的视觉盛宴。", "dataHash": "fm-doc-id-d9d8afacfec76ccb"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234394_n5", "label": "影视特效领域应用", "level": 1, "dataHash": "fm-doc-id-5135b747055e3eac", "description": [{"text": "随着现代电影、电视作品不断发展，特效已经成为其重要的一部分，并且特效节约环保，不需要一些现实的布景等。使用多媒体计算机模拟运动、造型等，可以建立三维物体造型，达到真实的效果。在数字三维的创作中，创作效率越高，往往越不能保证画面效果的质量。而贴图在影视当中的作用，就是在高效率下，也能避免画面质量的流失。贴图技术是一种虚拟3D技术，是目前先进的表现技术。在光的照射下，凹凸信息有相应的阴影、高光。模型的多边形数量并不改变，也能获得多边形的细节。贴图的应用不仅可以展示物体模型表面的颜色、光泽、纹理等，而且能够提升模型的视觉效果，以及模型的质量。", "dataHash": "fm-doc-id-34fe30227b76df84"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}], "edges": [{"source": "7989338958046234394", "target": "7989338958046234394_n1", "type": "父子", "description": "任务2 应用领域包含工业领域应用"}, {"source": "7989338958046234394", "target": "7989338958046234394_n2", "type": "父子", "description": "任务2 应用领域包含文物领域应用"}, {"source": "7989338958046234394", "target": "7989338958046234394_n3", "type": "父子", "description": "任务2 应用领域包含医疗领域应用"}, {"source": "7989338958046234394", "target": "7989338958046234394_n4", "type": "父子", "description": "任务2 应用领域包含游戏建模领域应用"}, {"source": "7989338958046234394", "target": "7989338958046234394_n5", "type": "父子", "description": "任务2 应用领域包含影视特效领域应用"}]}}, {"lessonId": "7989338958046234395", "meta": {"lessonId": "7989338958046234395"}, "graph": {"nodes": [{"id": "7989338958046234395", "label": "任务3 空地一体化测绘数据处理", "level": 0, "dataHash": "fm-doc-id-5a212612ffb35635", "displayCode": "UAS_P6T3", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234395_n1", "label": "概念普及", "level": 1, "dataHash": "fm-doc-id-696c46df08dac2ee", "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234395_n2", "label": "模型修复", "level": 2, "dataHash": "fm-doc-id-cbc4044f0b2c829d", "description": [{"text": "实世界的实体，也可以是虚构的物体。任何自然界存在的东西都可以用三维模型表示。模型修复就是利用专业软件修理扫描完成的模型，将扫描所得的点云数据创建成多边形模型和网络。依据点云数据和图像数据进行专业处理，修补模型上的漏洞，重叠三角形的清理等最终得到一个完整无缺的多边形模型。也有为了有效修补逆向工程得到的三角网格模型中缺失的复杂孔洞，提出一种基于孔洞边界边收缩的修补算法。提取边界边，接着计算与边界点相关的三角面法矢夹角以确定收缩方向，再计算边界边与其相邻边距离的平均值以确定收缩距离，然后收缩边界边并细化得到一条新边界，再根据给出的方法在提取的边界边与收缩得到的边界边之间构造新三角面片。设定终止条件，不断迭代，构造出完整的三角面片，完成模型的修补（图6.3.1）。", "dataHash": "fm-doc-id-80e128deb96cf6b7"}, {"text": "模型修复的功能：\n（1）手动修补模型：在计算机上观察模型时会发现扫描完的模型上存在许多孔洞，不同的修补软件修补孔洞的命令可能会不同，但是操作方式和最终要达成的效果都是大同小异的，即修补模型数据上的孔洞处，得到一个完整的模型，以方便后续的处理。\n（2）自动修补模型：一些软件上有可以自己检测到模型的孔洞处的命令，它会自动选中有问题的地方进行修复，修补模型上的空缺，最终修补出一个完整的模型。\n（3）调整模型的坐标：在三维软件当中，都存在着xyz坐标系，由于扫描数据的坐标随机性，数据导入软件后，坐标系也是随机的。为了提高建造模型的精度，要在修补完模型后进行对齐坐标系的操作，即将扫描数据的坐标系与建模的坐标系对齐。在对齐坐标后，就能更加清楚快捷地查看一个模型的不同角度视图，提高工作效率。", "dataHash": "fm-doc-id-b5b56abfa519db4d", "sourceHashes": [{"text": "模型修复的功能：", "dataHash": "fm-doc-id-b5b56abfa519db4d"}, {"text": "（1）手动修补模型：在计算机上观察模型时会发现扫描完的模型上存在许多孔洞，不同的修补软件修补孔洞的命令可能会不同，但是操作方式和最终要达成的效果都是大同小异的，即修补模型数据上的孔洞处，得到一个完整的模型，以方便后续的处理。", "dataHash": "fm-doc-id-b0823a2941a580ca"}, {"text": "（2）自动修补模型：一些软件上有可以自己检测到模型的孔洞处的命令，它会自动选中有问题的地方进行修复，修补模型上的空缺，最终修补出一个完整的模型。", "dataHash": "fm-doc-id-46bb858f164ae3a7"}, {"text": "（3）调整模型的坐标：在三维软件当中，都存在着xyz坐标系，由于扫描数据的坐标随机性，数据导入软件后，坐标系也是随机的。为了提高建造模型的精度，要在修补完模型后进行对齐坐标系的操作，即将扫描数据的坐标系与建模的坐标系对齐。在对齐坐标后，就能更加清楚快捷地查看一个模型的不同角度视图，提高工作效率。", "dataHash": "fm-doc-id-6402b6e25e14d52d"}]}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234395_n3", "label": "模型贴图", "level": 2, "dataHash": "fm-doc-id-d5beefbeaff64c61", "description": [{"text": "模型贴图又称纹理映射或纹理贴图，就是将二维影像映射到高精度三维模型上的过程。贴图是材质应用到表面的一种模板，使用贴图可以模拟纹理，应用设计、反射、折射和其他效果。简单来说，就是把一幅图像贴到三维模型物体的表面上来增强真实感，还原其真实纹理，完善模型造型，使三维模型更接近现实。它也可以和光照计算、图像混合等技术结合起来形成许多非常漂亮的效果。纹理贴图几乎能满足任何制作的需要，只要现实生活中有的，纹理贴图都可以表现。它是靠输入外来的纹理素材来达到制作的目的，是真实感图像制作的一个重要部分。运用它可以方便地制作出极具真实感的图形，而不必花过多时间来考虑物体的表面细节（图6.3.2）。", "dataHash": "fm-doc-id-27f358bfe50b47b7"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234395_n4", "label": "知识拓展", "level": 1, "dataHash": "fm-doc-id-e5b518261517553f", "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234395_n5", "label": "贴图控制点", "level": 2, "dataHash": "fm-doc-id-3e45fbd3541d27d4", "description": [{"text": "贴图控制点也可以叫作贴图对应点。一般地，我们把在全等图形中，互相重合的、相等的边或角对应的点叫作对应点。我们在贴图过程中需要寻找两个区域当中位置一致对应的特征点，使它们完全重合进行贴图映射（图6.3.3）。", "dataHash": "fm-doc-id-b931e10c3ccbaa88"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234395_n6", "label": "纹理处理", "level": 2, "dataHash": "fm-doc-id-383b0229109d49d9", "description": [{"text": "当贴图映射完成后，我们会发现有一些拉伸、模糊的纹理，这个时候需要对这种纹理进行处理，手动处理映射完成的图像，保留清晰、正确的纹理，再对拉伸、碎片、模糊和错误纹理进行删除和局部位置调整，最终达到与原图纹理一致的效果。", "dataHash": "fm-doc-id-a94c203c0b8e4e49"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234395_n7", "label": "羽化", "level": 2, "dataHash": "fm-doc-id-9760d8f66eb4a713", "description": [{"text": "羽化是令选区内外衔接部分虚化，起到渐变的作用，从而达到自然衔接的效果，是PS及其他版本中的处理图片的重要工具。运用过程中，具体的羽化值完全取决于经验。因此，掌握这个工具的关键是经常练习。羽化值越大，虚化范围越宽。羽化值越小，虚化范围越窄。我们可以根据实际情况进行调节。把羽化值设置小一点，反复羽化是羽化的一个技巧（图6.3.4）。", "dataHash": "fm-doc-id-bfbab1b72f127e42"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}], "edges": [{"source": "7989338958046234395", "target": "7989338958046234395_n1", "type": "父子", "description": "任务3 空地一体化测绘数据处理包含概念普及"}, {"source": "7989338958046234395_n1", "target": "7989338958046234395_n2", "type": "父子", "description": "概念普及包含模型修复"}, {"source": "7989338958046234395_n1", "target": "7989338958046234395_n3", "type": "父子", "description": "概念普及包含模型贴图"}, {"source": "7989338958046234395", "target": "7989338958046234395_n4", "type": "父子", "description": "任务3 空地一体化测绘数据处理包含知识拓展"}, {"source": "7989338958046234395_n4", "target": "7989338958046234395_n5", "type": "父子", "description": "知识拓展包含贴图控制点"}, {"source": "7989338958046234395_n4", "target": "7989338958046234395_n6", "type": "父子", "description": "知识拓展包含纹理处理"}, {"source": "7989338958046234395_n4", "target": "7989338958046234395_n7", "type": "父子", "description": "知识拓展包含羽化"}]}}, {"lessonId": "7989338958046234396", "meta": {"lessonId": "7989338958046234396"}, "graph": {"nodes": [{"id": "7989338958046234396", "label": "任务4 应用案例", "level": 0, "dataHash": "fm-doc-id-3dd7fa0092e54d88", "displayCode": "UAS_P6T4", "description": [{"text": "贞观十七年（643年）废黎州，黎阳县改属卫州。是年在浮丘山巅始凿石窟造像。此后，开耀、永淳、如意等年间又有续雕，窟内雕佛像990余个，后人称为“千佛洞”。", "dataHash": "fm-doc-id-d4f1a0b2b2a11391"}, {"text": "北窟洞口高150cm，阔3m，进深170m，穹窿顶，饰有藻井。窟内雕有大小佛像120余尊，都已无头，洞内壁上刊有宋代嘉祐年间、明代成化年间题记。这是两座石窟中最晚的题记。", "dataHash": "fm-doc-id-924e3e2cb25231d1"}, {"text": "小山头的南、北、西三面凿有很多佛龛，多为唐代造像。有元、明、清各代题记，均有一定的书法价值。", "dataHash": "fm-doc-id-b1928c5ec1c453b5"}, {"text": "千佛洞石窟造像虽大部分残损，但它还保留着盛唐时期的石刻艺术作品，是一批珍贵的文化遗产。1963年被公布为省级重点文物保护单位。2001年被国务院公布为全国重点文物保护单位。", "dataHash": "fm-doc-id-99c029af878ca105"}], "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234396_n1", "label": "空中数据采集", "level": 1, "dataHash": "fm-doc-id-d4f3327e74a7a4e7", "description": [{"text": "通过摄影测量这一技术，建立一个高精度的数字文化文档，也是为了和时间比赛，把世界文化遗产的雄伟风貌给永久留存下来。历史上，因为种种原因损毁的文化遗产不计其数。比如，2001年阿富汗的巴米扬大佛由于战乱受到毁坏，还有2019年法国的巴黎圣母院因为火灾受到了严重的破坏，这些都是很遗憾的事情。因为古建筑总会随着时间流逝老化和破损，所以除了对它们进行实物的保护以外，还可以通过数字化的手段在信息上永久保存这些文化遗产，保存人类文明的印记。", "dataHash": "fm-doc-id-6c081e098e559840"}, {"text": "拍摄千佛洞需要光线均匀、柔和的阴天，这样后期可以给主体添加任何方向的光效，而不会在前期就被锁定掉。在参数设置方面，需要使用合适的快门速度来避免动态模糊，不然后期就会算不出来，调小光圈来保持足够的景深。", "dataHash": "fm-doc-id-2ba7e6f5ac2d70ec"}, {"text": "首先获得建筑群的粗模，这样才能在粗模的基础上来进行精细的航线规划，可以在软件中标定需要采集的范围还有精度，然后软件会自动生成粗模航线来自动执飞，得到粗模数据之后就使用专业的三维合成软件将粗模航线照片导入，经过调整参数软件会自动进行解算，一段时间后得到一幅点云图，通过软件矫正每一个面，算出法线和贴图。于是就获得了千佛洞的粗模（图6.4.1）。", "dataHash": "fm-doc-id-8b3abc1da679d9c7"}, {"text": "下一步就是对这个复杂表面规划精细的三维航线，这时需要把场景每个关键性的建筑拆分出去作为单体分别设计航线。接着可以开始拍摄这个关键性的建筑，在规划拍摄路径时，需要一个技巧，即需要多个不同方位和角度的照片，并保证照片和照片之间至少有70%的重叠率。这样就不会漏掉任何一个角度，最后在获得所有照片后就可以重建出精模，如法炮制获得每个关键性建筑的精模。", "dataHash": "fm-doc-id-943dfb708a7eb6d0"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234396_n2", "label": "地面数据采集", "level": 1, "dataHash": "fm-doc-id-12b3f43c88e708a7", "description": [{"text": "在实地采样过程中，石窟实际形态的多样性与复杂性大大增加了数据采集的难度。在普通方法无法实施的情况下，团队使用了各种高科技手段。例如，针对石窟表面的坑洼、死角以及部分色彩缺失造成的采样难题，团队巧妙地采用三维扫描技术等，精准地获得了石窟的表面信息（图6.4.2）。", "dataHash": "fm-doc-id-dae8a89c70905c38"}, {"text": "二维采集应想好洞内结构构造，确认采集思路，再根据现场实际情况确认采集方法。大型采集现场应先确认采集焦距，在同一焦距下尽可能地使照片纹理有明显重叠，确保后续工作顺利完成（图6.4.3）。", "dataHash": "fm-doc-id-c7ef5d4baf88d334"}, {"text": "在这份工作中，信息的处理与计算同样棘手。由于石窟表面凹凸不平，扫描仪扫描出的数据并不完整，存在孔洞。本项目就是利用处理软件修复孔洞，首先掌握千佛洞孔洞特征的分析思路，检查是否修复完全，其次进行创建坐标、对齐坐标的操作，最后导出数据模型，保持三维数据的完整性（图6.4.4）。", "dataHash": "fm-doc-id-de7529d0db1b5825"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}, {"id": "7989338958046234396_n3", "label": "空地一体化", "level": 1, "dataHash": "fm-doc-id-37192514fe640449", "description": [{"text": "后期将千佛洞表面模型与内部精细模型相结合，通过后期渲染软件调整光影氛围，最终将浩气凛然的千佛洞给呈现出来（图6.4.5、图6.4.6）。", "dataHash": "fm-doc-id-707401a5f76428a5"}, {"text": "洞窟内的佛都与现实一致，虽然没有头，但大多都衣饰飘逸，线条流畅，体格健美。就连进入洞窟的侧门两边也都被雕成了石佛，仔细拉近可看到佛像纹理细致入微。", "dataHash": "fm-doc-id-7dae9715c2c14eb7"}], "knowledgeCategory": "程序性", "cognitiveDimension": "应用"}], "edges": [{"source": "7989338958046234396", "target": "7989338958046234396_n1", "type": "父子", "description": "任务4 应用案例包含空中数据采集"}, {"source": "7989338958046234396", "target": "7989338958046234396_n2", "type": "父子", "description": "任务4 应用案例包含地面数据采集"}, {"source": "7989338958046234396", "target": "7989338958046234396_n3", "type": "父子", "description": "任务4 应用案例包含空地一体化"}]}}, {"lessonId": "7989338958046234397", "meta": {"lessonId": "7989338958046234397"}, "graph": {"nodes": [{"id": "7989338958046234397", "label": "任务1 无人机应急救援背景与现状", "level": 0, "dataHash": "fm-doc-id-1d169e306e221243", "displayCode": "UAS_P7T1", "projectTitle": "项目七 无人机应急救援", "projectDataHash": "fm-doc-id-6270643e5fac49a7", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234397_n1", "label": "应急救援的功能", "level": 1, "dataHash": "fm-doc-id-55aa04bdf47fd289", "description": [{"text": "应急救援是应急管理的重要内容，它的功能更加直接、具体、直观。应急救援分为直接功能和间接功能。", "dataHash": "fm-doc-id-f2b7d148b0e6c672"}, {"text": "其直接功能如下。：（1）预防事故的发生。（2）减轻事故危害。（3）避免、减少人员伤亡。（4）减少财产损失。（5）减少对环境的破坏。（6）保障企业生产的物质基础。（7）维护社会稳定。", "dataHash": "fm-doc-id-1510aa86181ebb46"}, {"text": "其间接功能如下。：（1）创造巨大的经济效益。（2）提高企业的市场竞争力。（3）创造良好的社会效益。", "dataHash": "fm-doc-id-29940adc1b9b9e32"}, {"text": "应急救援的功能特性：直接性、间接性、不确定性和多效性。", "dataHash": "fm-doc-id-1dbca1502fd7c816"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234397_n2", "label": "无人机应急救援的优势与现状", "level": 1, "dataHash": "fm-doc-id-7c760a0f5ca8009b", "description": [{"text": "我国将消防救援无人机技术应用于城市、森林消防和各类应急救援中，越来越凸显其重要性。消防救援无人机搭载相应载荷在林区巡护、卫星热点侦察、火场侦察等方面发挥了很好的作用，并在应急预案的制定、快速响应机制的建立、现场火情存档与取证等方面展现出重要作用。", "dataHash": "fm-doc-id-bcb0fabbbb907943"}, {"text": "其优势包含以下几点。", "dataHash": "fm-doc-id-319581a1f9d39218"}, {"text": "（1）行动反应迅速。", "dataHash": "fm-doc-id-71873764fb5b0d9d"}, {"text": "消防救援旋翼无人机具备垂直起降、高空定点悬停、360°自旋等技术特点，对地理环境没有特殊要求，可以无视交通堵塞情况，飞行速度快，转弯半径可操控性强，能够在空中直线到达应急救援任务区域位置，快速展开侦察和辅助救援工作。例如，在西南某山区发生森林火灾，地面分队从集结点出发翻山越岭用了10h才到达直线距离2km外的火场，而用无人机仅需8min就可到达火场上方开展作业（图7.1.1）。", "dataHash": "fm-doc-id-7ba7434e11e4f6cf"}, {"text": "（2）装备使用便携。", "dataHash": "fm-doc-id-fe84a7d71e921692"}, {"text": "无人机的操作相对于大型飞机或者直升机是非常简单的。操作员可通过使用遥控器和地面站来操控无人机的飞行动作，通过远距离音视频传输，接收无人机传输数据，实时掌握现场情况，以便全方位远程监控。在操作过程中，可以随时改变飞行方向，只需要几分钟就可以按照指定的飞行路线快速飞往现场（图7.1.2）。", "dataHash": "fm-doc-id-609e11790c4a3a21"}, {"text": "（3）侦测分辨率高。", "dataHash": "fm-doc-id-a462fffd0e4ac9c3"}, {"text": "无人机侦测与人工侦测、卫星遥感侦测相比，具有多种优势。人工侦测受地形、地物影响大，有视觉盲点，观察的范围十分有限，侦察的效率非常低；卫星遥感侦测因高度高、重返周期长，分辨率较低；而无人机侦测，通过挂载各种可见光、红外摄像、热成像等设备，可以从空中全面而独特的视角抵近侦测，时空分辨率高，实现精准侦测（图7.1.3）。", "dataHash": "fm-doc-id-b6cd35e8d5a6017c"}, {"text": "（4）环境适应性强。", "dataHash": "fm-doc-id-ade3f1982d3c2138"}, {"text": "与有人机相比，消防救援无人机能够搭载多种任务平台，针对各类任务需要装备侦测系统、定位系统、全景设备、中继通信平台等，可以满足复杂环境中救援工作的需求。无人机可在高危险任务中代替有人机，降低存在的安全隐患。例如，火灾现场的情况往往是复杂多变的，而无人机对起降场地没有特别高的要求，可以快速地起飞降落。在运用过程中它还能够克服高度、烟雾、温度、风力等各种复杂危险的因素，有效地避免火场环境所带来的影响，并且它还可以到达消防员无法到达的区域执行任务。例如，火场通常伴随着浓烟甚至毒气，消防员很难进入或者无法进入，但是无人机可以进入，这样不仅可以得到更加真实有效的火场数据，为灭火救援提供更好的依据，而且保证了消防员的生命安全，使后续的灭火救援顺利进行（图7.1.4）。", "dataHash": "fm-doc-id-df2f79e28455ccd0"}, {"text": "（5）使用成本低廉。", "dataHash": "fm-doc-id-200e894c652fc680"}, {"text": "无人机目前在应急救援中应用较广泛，除了便捷、高效，其使用成本低也是很重要的因素。与有人机相比，无人机的优势有：一是其制造成本较低。无人机由于无人在空中，不需考虑生命支持系统，因此制造成本较有人机大大降低。目前轻小型无人机从几千元至数十万元不等，大载重无人机也只是百万级。二是维护成本较低。结构简单的无人机使用寿命较长，可以使用新型轻质高强度材料，不易损坏，且更换容易。三是所需配套成本较低，无须庞大的机务维护人员和设备提供保障。此外，无人机使用过程中调度快速，容易普及配备，并且能够伴随救援队伍开展救援，从而提高救援的科学性、安全性、高效性，间接地降低了灾害事故的损失。", "dataHash": "fm-doc-id-37529770caed5431"}, {"text": "无人机在应急救援中的应用现状如下。", "dataHash": "fm-doc-id-1f1ff7bb5a6aadfb"}, {"text": "（1）应用越来越广泛。", "dataHash": "fm-doc-id-dbbf22f78bec052f"}, {"text": "（2）配备越来越普及。", "dataHash": "fm-doc-id-11f496d7e22fdf61"}, {"text": "（3）用途比较单一。", "dataHash": "fm-doc-id-236e6f64ceeaa060"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234397_n3", "label": "无人机技术装备及消防救援应用发展趋势", "level": 1, "dataHash": "fm-doc-id-796eb71f6c3ae0fe", "description": [{"text": "随着无人机技术装备的发展，无人机必将在消防救援中发挥越来越重要的作用。无人机在侦察监测、通信中继、救援保障等任务中发挥快速、高效、安全的优势，可以显著提高救援的科学性、安全性和救援效率。", "dataHash": "fm-doc-id-1c35675a98dead26"}, {"text": "无人机技术装备的发展趋势如下。：（1）平台大型化。（2）控制集群化。（3）作业智能化。（4）配备体系化。（5）保障系统化。", "dataHash": "fm-doc-id-075632983dd6e620"}, {"text": "无人机消防救援应用发展趋势如下。：（1）系统运行网络化。（2）态势感知实时化。（3）空地协同一体化。", "dataHash": "fm-doc-id-1480d83558916f6f"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}], "edges": [{"source": "7989338958046234397", "target": "7989338958046234397_n1", "type": "父子", "description": "任务1 无人机应急救援背景与现状包含应急救援的功能"}, {"source": "7989338958046234397", "target": "7989338958046234397_n2", "type": "父子", "description": "任务1 无人机应急救援背景与现状包含无人机应急救援的优势与现状"}, {"source": "7989338958046234397", "target": "7989338958046234397_n3", "type": "父子", "description": "任务1 无人机应急救援背景与现状包含无人机技术装备及消防救援应用发展趋势"}]}}, {"lessonId": "7989338958046234398", "meta": {"lessonId": "7989338958046234398"}, "graph": {"nodes": [{"id": "7989338958046234398", "label": "任务2 无人机在应急救援具体场景中的应用", "level": 0, "dataHash": "fm-doc-id-a26a3267828ef464", "displayCode": "UAS_P7T2", "knowledgeCategory": "元认知", "cognitiveDimension": "理解"}, {"id": "7989338958046234398_n1", "label": "无人机在建筑火灾救援中的应用", "level": 1, "dataHash": "fm-doc-id-2c738fc6518f3ffb", "description": [{"text": "建筑物按使用性质可分为居住建筑、公共建筑、工业建筑、农业建筑等。据统计，我国每年发生建筑火灾约30万起，多数建筑火灾造成交通拥堵、扑救困难、伤亡惨重等后果。随着无人机载重能力、稳定性能、安全等性能的提升，无人机在建筑火灾救援中发挥越来越重要的作用。", "dataHash": "fm-doc-id-fcab42c05653f860"}, {"text": "无人机在建筑火灾救援中主要有以下几个方面的应用。", "dataHash": "fm-doc-id-eefa34b88b6b554e"}, {"text": "（1）现场灾情侦察。", "dataHash": "fm-doc-id-2952f6c93e74787f"}, {"text": "建筑火灾救援中，无人机的侦察监测任务主要是判断起火建筑、起火物资、燃烧程度、交通道路、现场环境等。无人机的侦察监测可以全方位地进行，可不间断监测燃烧范围，辅助评估蔓延趋势，搜索被困人员，监测邻近爆炸、毒害等重点部位信息，使灭火救援作战达到“救人第一、科学施救”的指导思想。无人机起飞后，拍摄多张照片并自动拼接一线的全景照片，后台可拖动、放大查看一线现场照片，完成360°无死角观察。", "dataHash": "fm-doc-id-4d1227f63292ded7"}, {"text": "（2）现场视频回传。", "dataHash": "fm-doc-id-a529c88858c5224a"}, {"text": "无人机可将现场空中俯拍画面接入现场指挥车，通过卫星等方式，回传到指挥中心。指挥中心通过一线空中视频画面，可对救灾现场进行统筹和指挥。", "dataHash": "fm-doc-id-134b7d0a1d69d97f"}, {"text": "无人机可悬停于现场，直观了解一线灾情，最高飞行高度可达500m，对大范围的灾区，可进行较为直观的图像采集。", "dataHash": "fm-doc-id-5aad913e95e929c8"}, {"text": "（3）定位火点。", "dataHash": "fm-doc-id-8cde23e9388aab93"}, {"text": "消防员抵达火灾现场，快速操作无人机，飞抵火场上空进行侦察，利用无人机的可见光与红外热成像相结合，进行火场测温，快速定位火点，将信息回传至后台指挥中心，实现信息共享。", "dataHash": "fm-doc-id-88c8409755aac455"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解", "tags": "重点"}, {"id": "7989338958046234398_n2", "label": "无人机在危险化学品事故救援中的应用", "level": 1, "dataHash": "fm-doc-id-478c8d5ffbb7ef71", "description": [{"text": "危险化学品事故是指因危险化学品造成人员伤亡、财产损失或环境污染的事故。危险化学品事故危害大、易伤亡、处置难。无人机机动灵活、操作简便、成本较低，在危险化学品事故救援中发挥了独特作用。随着无人机性能的提升，其在危险化学品事故救援中发挥的作用越来越凸显。常见的危险化学品主要有液化石油气、氯气、氨气、易燃可燃液体等。不同的危险化学品理化性质各异，同一种危险化学品在不同状态、不同温度，其危险性也各异。其应用主要体现在以下几个方面上。", "dataHash": "fm-doc-id-9adbe07c53bb37e9"}, {"text": "（1）侦察监测。", "dataHash": "fm-doc-id-495b1dc01261c7df"}, {"text": "无人机在危险化学品事故救援中的侦察监测任务是侦察事故现场范围、重点部位、蔓延趋势，监测事故现场的空气、水质、气象、温度等信息，为现场指挥部提供决策的依据，提高救援效率。", "dataHash": "fm-doc-id-a4f32b086d219365"}, {"text": "（2）环境侦检。", "dataHash": "fm-doc-id-e74d5ccdaf427e27"}, {"text": "危险化学品事故救援现场，无人机可利用红外线热成像等进行环境温度侦检，搭载的高性能模拟图像传输系统可以实时传输红外线热成像的影像并可实时测绘出现场的温度信息，利用热成像模块判明现场高温中心位置、事故扩散蔓延趋势等，并进行精确定位，帮助消防员及时判明事故发展态势。", "dataHash": "fm-doc-id-6c66e82d9fe074bb"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234398_n3", "label": "无人机在森林火灾救援中的应用", "level": 1, "dataHash": "fm-doc-id-50ef86866b4fcfd9", "description": [{"text": "森林火灾一直是一个世界性难题。全球每年发生森林火灾20多万起，烧毁的森林面积约占全球总面积的1‰以上。森林火灾发生地域通常其地形和环境较为复杂，道路交通、网络通信条件差，火灾处置救助较为困难。无人机具有体积小、造价低、使用方便、对环境要求低的特点，可凭借自身优势与森林火灾救援任务深度结合，完成灾情侦测、物资投送、通信中继、辅助灭火等任务，对于提高救援效率具有重要意义。其实际应用方式具体如下。", "dataHash": "fm-doc-id-8be69b4e5518882a"}, {"text": "（1）灾情侦测。", "dataHash": "fm-doc-id-5efa2f908f8e0609"}, {"text": "在森林灭火救援行动中，采用无人机开展灾情侦测，获取灾情信息，为科学安全高效开展灭火救援行动提供了重要的信息决策参考。在森林灭火救援行动中开展灾情侦测，按照实时性和侦测手段可分为实时监测与航测勘察。", "dataHash": "fm-doc-id-4aac022d6812051b"}, {"text": "（2）物资投送。", "dataHash": "fm-doc-id-d037c79bb96148b8"}, {"text": "在森林灭火救援行动中，往往需要大量的保障人员翻山越岭，运送食物、饮用水、灭火用水、油料等，费时费力，效率低下。利用无人机进行灭火救援物资投送时，高效、快速是无人机在森林灭火救援应用中一个重要的方向。", "dataHash": "fm-doc-id-a5c82ee07d6c468c"}, {"text": "（3）通信中继。", "dataHash": "fm-doc-id-40d51e8ebcc00fd0"}, {"text": "森林灭火救援地形环境复杂，受植被影响，通信距离短、盲区多。通过无人机中继可以有效扩大通信覆盖范围。", "dataHash": "fm-doc-id-8670be7d224d3137"}, {"text": "（4）无人机灭火。", "dataHash": "fm-doc-id-6a7f46c97e23ad44"}, {"text": "森林灭火救援行动危险性高。近年来发生多起消防员伤亡事故，令人悲痛。利用无人机灭火可以减少人与火直接对抗，特别是在起火的初期，利用无人机可以早发现并快速出动打击。无人机灭火对悬崖、陡坡、飞火等特殊类火点可以快速高效处置，提高处置效率，减少人员伤亡。", "dataHash": "fm-doc-id-70aa95e3e2cd74c7"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234398_n4", "label": "无人机在地震灾害救援中的应用", "level": 1, "dataHash": "fm-doc-id-ee5c9dcc8de86e51", "description": [{"text": "地震灾害发生时，往往会伴随山体滑坡、堰塞湖、建筑物倒塌等灾情发生。交通受阻，电力、网络条件被破坏，救助处置对时间效率要求高。在地震灾害中，可通过无人机快速侦察灾情、获取灾害现场信息，开展灾区测绘、评估灾情情况，展开辅助救援、投送紧急物资，对于制定救援方案、实施救援行动、争取“黄金”救援时间具有重要意义。无人机在地震中应用的主要方式如下。", "dataHash": "fm-doc-id-78e4ec1dbc916cb3"}, {"text": "（1）灾情侦察。", "dataHash": "fm-doc-id-79b83289113c33b7"}, {"text": "地震灾害发生后，灾区地貌发生巨大变化，余震频繁发生。山体滑坡、泥石流等造成的建筑、公路、桥梁等的变化，使普通救援方式对灾情的实时监测十分困难。无人机可凭借不受道路、地形限制的优点快速到达灾区，开展灾情侦察任务，并回传灾情信息，为救援行动展开提供参考。", "dataHash": "fm-doc-id-c7e745e1943f61a5"}, {"text": "（2）灾区航测。", "dataHash": "fm-doc-id-9abbf8966f2ec3b1"}, {"text": "无人机灾区航测是地震灾害监测中的一种重要应用方式。在山体滑坡、泥石流等灾害中，通过无人机航测可以快速获取灾害区域的倾斜摄影影像数据，并经过专业软件处理生成实景三维模型，用于灾害体距离、面积、体积等精确量测，为制定救援方案提供依据。在地震灾害中，通过无人机航测获取二维正射影像图或实景三维模型，可为重大地震灾害救援及灾后恢复重建提供技术支持和决策依据。", "dataHash": "fm-doc-id-5c72e063f7d67f9a"}, {"text": "（3）辅助救援。", "dataHash": "fm-doc-id-e42753acd074fcce"}, {"text": "地震灾害中，无人机辅助救援主要包括辅助照明、物资投送、防疫消毒、通信中继等。", "dataHash": "fm-doc-id-d012529bd065264f"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}, {"id": "7989338958046234398_n5", "label": "无人机在洪涝灾害救援中的应用", "level": 1, "dataHash": "fm-doc-id-401de883a56d4653", "description": [{"text": "洪涝灾害往往具有发生区域面积大、断网断电、交通不便等特点，是夏季常见的主要灾害之一。在洪涝灾害中，通过无人机可以实现灾情的快速侦测、被困人员的快速搜索、轻小型救援物资器材的快速投送等，通过大型长航时无人机还可以实现大范围的应急通信保障，对于灾区信息互通具有重要意义。随着无人机抗风、抗雨能力的增强与整体性能的提升，无人机在洪涝灾害救援中也发挥着越来越重要的作用。其应用如下。", "dataHash": "fm-doc-id-acf6088e7cc470e7"}, {"text": "（1）灾情侦察。", "dataHash": "fm-doc-id-79b83289113c33b7"}, {"text": "（2）应急航测。", "dataHash": "fm-doc-id-f4b1f969b7e4da13"}, {"text": "（3）人员搜救。", "dataHash": "fm-doc-id-dded61de16936448"}, {"text": "（4）灾情评估。", "dataHash": "fm-doc-id-3a1906499dbc758a"}, {"text": "（5）灾后防疫消杀。", "dataHash": "fm-doc-id-209535270b9f2bcb"}], "knowledgeCategory": "概念性", "cognitiveDimension": "理解"}], "edges": [{"source": "7989338958046234398", "target": "7989338958046234398_n1", "type": "父子", "description": "任务2 无人机在应急救援具体场景中的应用包含无人机在建筑火灾救援中的应用"}, {"source": "7989338958046234398", "target": "7989338958046234398_n2", "type": "父子", "description": "任务2 无人机在应急救援具体场景中的应用包含无人机在危险化学品事故救援中的应用"}, {"source": "7989338958046234398", "target": "7989338958046234398_n3", "type": "父子", "description": "任务2 无人机在应急救援具体场景中的应用包含无人机在森林火灾救援中的应用"}, {"source": "7989338958046234398", "target": "7989338958046234398_n4", "type": "父子", "description": "任务2 无人机在应急救援具体场景中的应用包含无人机在地震灾害救援中的应用"}, {"source": "7989338958046234398", "target": "7989338958046234398_n5", "type": "父子", "description": "任务2 无人机在应急救援具体场景中的应用包含无人机在洪涝灾害救援中的应用"}]}}];

const COL_W = 300;      // 层级横向间距
const NODE_H = 62;      // 单节点占位高度
const V_GAP = 16;       // 兄弟节点垂直间距
const canvas = document.getElementById('canvas');
const edgesSvg = document.getElementById('edges');
const detail = document.getElementById('detail');
const metaEl = document.getElementById('meta');

let current = null;      // 当前数据集
